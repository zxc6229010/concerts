<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜後台帳號申請</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      box-shadow:var(--shadow); padding:18px; margin-bottom:18px;
    }
    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      height:44px; padding:10px 18px; border-radius:999px;
      border:1px solid var(--line); background:#fff; color:#111;
      font-weight:900; font-size:16px; cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

    label{ font-weight:900; display:block; margin:12px 0 6px; }
    input[type="text"], textarea, select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }
    textarea{ min-height:110px; resize:vertical; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:999px;
      padding:8px 12px; font-weight:900; font-size:14px; background:#fff;
    }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .warn{ color:#b91c1c; font-weight:900; }
    .ok{ color:#166534; font-weight:900; }

    .page{ opacity:0; transform: translateY(6px); transition: opacity .22s ease, transform .22s ease; }
    .page.on{ opacity:1; transform: translateY(0); }
    .page.leaving{ opacity:0; transform: translateY(6px); }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>後台帳號申請</h1>
            <div class="sub">
              填寫申請後會進入審核流程。<br/>
              <span class="mono">申請資料會永久留存</span>，審核結果也會記錄。
            </div>
            <div class="sub" style="margin-top:8px;">
              登入：<span id="email" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>
      </div>

      <div class="card" id="statusCard" style="display:none;"></div>

      <div class="card" id="formCard" style="display:none;">
        <div class="row">
          <div>
            <div class="pill">申請資料</div>
            <div class="sub" style="margin-top:8px;">
              你可以先選擇想申請的身分，並回答平台管理員設定的提問。
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="reloadBtn">重新載入題目</button>
            <button class="btn" id="submitBtn">送出申請</button>
          </div>
        </div>

        <label>想申請的角色</label>
        <select id="desiredRole">
          <option value="org_admin">組織管理員（org_admin）</option>
          <option value="org_staff">組織服務人員（org_staff）</option>
          <option value="org_super">組織超級管理員（org_super）</option>
        </select>
        <div class="sub" style="margin-top:6px;">※ 是否通過與角色分派以平台審核結果為準。</div>

        <label style="margin-top:14px;">希望加入的組織 / 校園（可不填）</label>
        <input id="desiredOrg" type="text" placeholder="例如：KMHS / 你們組織代號（選填）" />
        <div class="sub" style="margin-top:6px;">你也可以先不填，讓平台管理員在審核時分派。</div>

        <div id="questions"></div>

        <div class="sub" style="margin-top:12px;">
          <span class="ok">提醒：</span>送出後可再次申請（每次申請都會留存紀錄）。
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    const pageRoot = document.getElementById("pageRoot");

    
    const db = window.db;

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const statusCard = document.getElementById("statusCard");
    const formCard = document.getElementById("formCard");

    const emailEl = document.getElementById("email");
    const reloadBtn = document.getElementById("reloadBtn");
    const submitBtn = document.getElementById("submitBtn");
    const desiredRoleEl = document.getElementById("desiredRole");
    const desiredOrgEl = document.getElementById("desiredOrg");
    const questionsEl = document.getElementById("questions");

    let currentQuestions = [];

    const esc = AppUI.esc;

    const norm = AppUI.norm;

    window.doLogout = async () => {
      try { await firebase.auth().signOut(); }
      catch(e){ console.error(e); AppUI.toast("登出失敗（請看 Console）", "warn"); }
    };

    const DEFAULT_Q = [
      {
        id: "default_q1",
        label: "你是誰？（姓名 / 單位）",
        type: "text",
        placeholder: "例如：王小明／公關組",
        required: true,
        enabled: true,
        sort: 10
      },
      {
        id: "default_q2",
        label: "你為什麼需要後台權限？",
        type: "textarea",
        placeholder: "請簡述用途",
        required: true,
        enabled: true,
        sort: 20
      },
      {
        id: "default_q3",
        label: "你希望負責的工作內容",
        type: "textarea",
        placeholder: "例如：核銷、服務台、名單管理…",
        required: false,
        enabled: true,
        sort: 30
      }
    ];

    function normalizeQuestion(docId, raw){
      const q = raw || {};
      return {
        id: norm(docId || q.id),
        label: norm(q.label),
        type: norm(q.type) === "textarea" ? "textarea" : "text",
        placeholder: norm(q.placeholder),
        required: q.required === true,
        enabled: q.enabled !== false,
        sort: Number(q.sort || 0) || 0
      };
    }

    async function loadQuestions(){
      try{
        let snap;
        try{
          snap = await db.collection("system")
            .doc("adminAccessForm")
            .collection("questions")
            .orderBy("sort", "asc")
            .get();
        }catch(orderErr){
          console.warn("questions orderBy failed, fallback to unsorted get:", orderErr);
          snap = await db.collection("system")
            .doc("adminAccessForm")
            .collection("questions")
            .get();
        }

        const list = [];
        snap.forEach(doc => {
          const q = normalizeQuestion(doc.id, doc.data());
          if (!q.enabled) return;
          if (!q.label) return;
          list.push(q);
        });

        list.sort((a, b) => a.sort - b.sort || a.label.localeCompare(b.label, "zh-Hant"));

        return list.length ? list : DEFAULT_Q;
      }catch(e){
        console.warn("load questions failed:", e);
        return DEFAULT_Q;
      }
    }

    function renderQuestions(qs){
      currentQuestions = qs.slice();

      questionsEl.innerHTML = `<div class="sub" style="margin-top:14px;"><span class="pill">提問</span></div>`;

      qs.forEach(q => {
        const fieldHtml = q.type === "textarea"
          ? `<textarea data-qid="${esc(q.id)}" placeholder="${esc(q.placeholder || "")}"></textarea>`
          : `<input type="text" data-qid="${esc(q.id)}" placeholder="${esc(q.placeholder || "")}" />`;

        questionsEl.insertAdjacentHTML("beforeend", `
          <label>${esc(q.label)}${q.required ? ' <span class="warn">*</span>' : ''}</label>
          ${fieldHtml}
        `);
      });
    }

    function getAnswerElement(qid){
      return questionsEl.querySelector(`[data-qid="${CSS.escape(qid)}"]`);
    }

    function readAnswers(qs){
      const answers = {};
      for (const q of qs){
        const el = getAnswerElement(q.id);
        answers[q.id] = norm(el ? el.value : "");
      }
      return answers;
    }

    function validate(qs, answers){
      for (const q of qs){
        if (q.required && !norm(answers[q.id])) {
          return `請填寫：${q.label}`;
        }
      }
      return "";
    }

    function clearAnswers(qs){
      qs.forEach(q => {
        const el = getAnswerElement(q.id);
        if (el) el.value = "";
      });
    }

    function showStatusBox(html){
      statusCard.style.display = "block";
      statusCard.innerHTML = html;
    }

    async function submitRequest(user){
  const qs = currentQuestions || [];
  const answers = readAnswers(qs);
  const err = validate(qs, answers);
  if (err) return AppUI.toast(err, "warn");

  submitBtn.disabled = true;
  const old = submitBtn.textContent;
  submitBtn.textContent = "送出中…";

  try{
    // 先檢查是否已有待審核申請
    let pendingSnap;
    try{
      pendingSnap = await db.collection("adminAccessRequests")
        .where("uid", "==", user.uid)
        .where("status", "==", "pending")
        .limit(1)
        .get();
    }catch(queryErr){
      console.error("pending query failed:", queryErr);
      throw new Error("目前無法檢查待審核申請，請稍後再試");
    }

    if (!pendingSnap.empty) {
      AppUI.toast("你目前已有待審核的申請，請先等待平台管理員審核。", "warn");
      return;
    }

    const payload = {
      uid: user.uid,
      email: user.email || "",
      createdAt: new Date(),
      status: "pending",
      desiredRole: norm(desiredRoleEl.value),
      desiredOrg: norm(desiredOrgEl.value),
      answers
    };

    const ref = await db.collection("adminAccessRequests").add(payload);

    showStatusBox(`
      <h1 style="margin:0 0 6px; font-size:22px;">已送出申請</h1>
      <div class="sub">
        狀態：<span class="pill">pending</span><br/>
        申請編號：<span class="mono">${esc(ref.id)}</span><br/>
        你可以回主選單，等待平台管理員審核。
      </div>
    `);

    clearAnswers(qs);

  }catch(e){
    console.error(e);
    AppUI.toast(e.message || "送出失敗（可能是 Firestore Rules 權限不足）", "warn");
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = old;
  }
}

        showStatusBox(`
          <h1 style="margin:0 0 6px; font-size:22px;">已送出申請</h1>
          <div class="sub">
            狀態：<span class="pill">pending</span><br/>
            申請編號：<span class="mono">${esc(ref.id)}</span><br/>
            你可以回主選單，等待平台管理員審核。
          </div>
        `);

        clearAnswers(qs);

      }catch(e){
        console.error(e);
        AppUI.toast("送出失敗（可能是 Firestore Rules 權限不足）", "warn");
      }finally{
        submitBtn.disabled = false;
        submitBtn.textContent = old;
      }
    }

    async function reloadQuestionsAndRender(){
      reloadBtn.disabled = true;
      const old = reloadBtn.textContent;
      reloadBtn.textContent = "載入中…";
      try{
        const qs = await loadQuestions();
        renderQuestions(qs);
      }finally{
        reloadBtn.disabled = false;
        reloadBtn.textContent = old;
      }
    }

    async function boot(){
      const user = firebase.auth().currentUser;
      if (!user) return;

      emailEl.textContent = user.email || "-";
      formCard.style.display = "block";

      await reloadQuestionsAndRender();

      reloadBtn.onclick = reloadQuestionsAndRender;
      submitBtn.onclick = () => submitRequest(user);

      showStatusBox(`
        <h1 style="margin:0 0 6px; font-size:22px;">申請說明</h1>
        <div class="sub">
          送出後會進入審核。審核紀錄與申請內容都會留存。<br/>
          題目內容由平台管理員動態設定，重新載入可取得最新版本。
        </div>
      `);
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        AppUI.showGate(gate, app, { title: "後台帳號申請", msg: "請先登入後再填寫申請。", showEmailLogin: true });
        return;
      }
      gate.style.display = "none";
      app.style.display = "block";
      if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }
      await boot();
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
</html>
