  <style>

/* ── shared.css inlined ── */
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }


/* ── topnav.css inlined ── */
/* topnav.css — 前台頂部導覽列 */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: #f5f7fb; }

#frontNav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.07);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.fn-brand {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: #111;
  font-size: 14px; font-weight: 900;
  flex-shrink: 0;
}
.fn-brand-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.fn-links {
  display: flex; align-items: center; gap: 2px;
  flex: 1; overflow: hidden;
}
.fn-link {
  padding: 6px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  text-decoration: none; color: #555;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.fn-link:hover { background: #f0f4ff; color: #3b82f6; }
.fn-link.fn-active { background: #eff6ff; color: #2563eb; font-weight: 800; }
.fn-user {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto; flex-shrink: 0;
}
.fn-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.fn-email { font-size: 12px; color: #666; }
.fn-logout {
  padding: 5px 12px; border-radius: 8px;
  background: #f5f5f5; border: none;
  font-size: 12px; font-weight: 700; color: #555;
  cursor: pointer; transition: background .12s;
}
.fn-logout:hover { background: #ffe4e4; color: #b91c1c; }

/* 讓 .wrap 不再有很大的 margin-top */
body > .wrap, #frontWrap > .wrap {
  padding-top: 20px !important;
}
@media (max-width: 640px) {
  #frontNav { padding: 0 14px; }
  .fn-links { display: none; }
}

<body>
  <div class="wrap">
    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <h1 id="eventTitle">活動報名</h1>
        <div class="sub">
          活動 ID：<span id="eventIdText" class="mono">-</span><br>
          目前登入：<span id="who" class="mono">-</span>
        </div>
      </div>

      <div class="card">
        <h2>資格判斷</h2>
        <div id="statusArea" class="statusBox" style="margin-top:12px;">
          讀取中…
        </div>
      </div>

      <div class="card hidden" id="inviteCard">
        <h2>邀請碼報名</h2>
        <div class="sub">
          若你不是名單內使用者，或尚未完成校園驗證，可輸入邀請碼取得報名資格。
        </div>

        <label>邀請碼</label>
        <input id="inviteCode" type="text" placeholder="請輸入邀請碼" />

        <div class="actions">
          <button class="btn btn-primary" id="inviteBtn">驗證邀請碼</button>
        </div>

        <div class="sub" id="inviteMsg" style="margin-top:12px;">-</div>
      </div>

      <div class="card hidden" id="registerCard">
        <h2>正式報名</h2>
        <div class="sub" id="registerSourceMsg">你已具備報名資格。</div>

        <div class="actions">
          <button class="btn btn-primary" id="registerBtn">確認報名</button>
        </div>

        <div class="sub" id="registerMsg" style="margin-top:12px;">-</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    const db = window.db;
    const esc = AppUI.esc;

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const who = document.getElementById("who");
    const eventIdText = document.getElementById("eventIdText");
    const eventTitle = document.getElementById("eventTitle");

    const statusArea = document.getElementById("statusArea");
    const inviteCard = document.getElementById("inviteCard");
    const inviteCode = document.getElementById("inviteCode");
    const inviteBtn = document.getElementById("inviteBtn");
    const inviteMsg = document.getElementById("inviteMsg");

    const registerCard = document.getElementById("registerCard");
    const registerSourceMsg = document.getElementById("registerSourceMsg");
    const registerBtn = document.getElementById("registerBtn");
    const registerMsg = document.getElementById("registerMsg");

    let currentUser = null;
    let currentEventId = "";
    let eligibilityState = null;
    let invitePassed = false;



    function getEventIdFromUrl(){
      const id = new URLSearchParams(location.search).get("eventId");
      return String(id || "").trim();
    }

    async function loadEventBasic(eventId){
      try{
        const snap = await db.collection("events").doc(eventId).get();
        if (!snap.exists) {
          eventTitle.textContent = "活動報名";
          return;
        }
        const data = snap.data() || {};
        eventTitle.textContent = data.title || "活動報名";
      }catch(e){
        console.error(e);
      }
    }

    async function checkEventEligibility(uid, eventId){
      // 讀取 users/{uid}（student-verify 寫入的位置）
      const userSnap = await db.collection("users").doc(uid).get();

      if (!userSnap.exists) {
        return { status: "unverified", canRegister: false, canUseInviteCode: true,
                 reason: "尚未建立會員資料" };
      }

      const u = userSnap.data() || {};
      const schoolId  = norm(u.verifiedSchoolId || "");
      const verifyKey = norm(u.verifyKey || "");

      if (!schoolId || !verifyKey) {
        return { status: "unverified", canRegister: false, canUseInviteCode: true,
                 reason: "尚未完成校園身份驗證" };
      }

      // 讀取活動設定：確認此活動是否開放此學校
      const eventSnap = await db.collection("events").doc(eventId).get();
      if (!eventSnap.exists) {
        return { status: "not_eligible", canRegister: false, canUseInviteCode: true,
                 reason: "活動不存在" };
      }

      const evt = eventSnap.data() || {};
      const ownerSchoolId = norm(evt.ownerSchoolId || evt.schoolId || "");

      // 若活動限定學校，確認學校相符
      if (ownerSchoolId && ownerSchoolId !== "__global__" && ownerSchoolId !== schoolId) {
        return { status: "not_eligible", canRegister: false, canUseInviteCode: true,
                 reason: "此活動限定其他學校的學生報名" };
      }

      // 查 partnerSchools records：用 verifyKey 作為 docId
      const recRef  = db.collection("partnerSchools").doc(schoolId)
                        .collection("records").doc(verifyKey);
      const recSnap = await recRef.get();

      if (!recSnap.exists) {
        return { status: "not_eligible", canRegister: false, canUseInviteCode: true,
                 reason: "你的驗證資料在名單中不存在，請重新驗證或洽承辦單位" };
      }

      // 已通過名單比對
      return {
        status: "eligible",
        canRegister: true,
        canUseInviteCode: false,
        reason: "",
        schoolId,
        verifyKey,
      };
    }

    function renderEligibility(result){
      eligibilityState = result;
      inviteCard.classList.add("hidden");
      registerCard.classList.add("hidden");
      invitePassed = false;
      inviteMsg.textContent = "-";
      registerMsg.textContent = "-";

      if (result.status === "eligible") {
        statusArea.innerHTML = `
          <div class="ok">你符合本活動名單資格，可直接報名。</div>
        `;
        registerCard.classList.remove("hidden");
        registerSourceMsg.textContent = "你已符合本活動名單資格。";
        return;
      }

      if (result.status === "not_eligible") {
        statusArea.innerHTML = `
          <div class="warn">你目前不符合本活動名單資格。</div>
          <div class="sub" style="margin-top:8px;">
            可能原因：不在活動名單中、不是本校生，或此名單目前未開放報名。<br>
            你仍可改用邀請碼報名。
          </div>
        `;
        if (result.canUseInviteCode) {
          inviteCard.classList.remove("hidden");
        }
        return;
      }

      if (result.status === "unverified") {
        const eventId = getEventIdFromUrl();
        statusArea.innerHTML = `
          <div class="info">你尚未完成校園身份驗證。</div>
          <div class="sub" style="margin-top:8px;">
            完成驗證後即可自動判斷報名資格，或直接使用邀請碼報名。<br>
            <a href="student-verify.html" style="font-weight:900;">前往校園驗證 →</a>
          </div>
        `;
        if (result.canUseInviteCode) {
          inviteCard.classList.remove("hidden");
        }
        return;
      }

      statusArea.innerHTML = `<div class="warn">無法判斷資格</div>`;
    }

    async function validateInviteCode(eventId, code){
      const q = await db.collection("events")
        .doc(eventId)
        .collection("inviteCodes")
        .where("code", "==", code)
        .where("enabled", "==", true)
        .limit(1)
        .get();

      if (q.empty) {
        return { ok:false, reason:"邀請碼無效" };
      }

      const doc = q.docs[0];
      const data = doc.data() || {};

      const maxUses = Number(data.maxUses || 0);
      const usedCount = Number(data.usedCount || 0);

      if (maxUses > 0 && usedCount >= maxUses) {
        return { ok:false, reason:"邀請碼使用次數已滿", ref: doc.ref, data };
      }

      return { ok:true, ref: doc.ref, data };
    }

    async function useInviteCode(){
      const code = inviteCode.value.trim();
      if (!code) return AppUI.toast("請輸入邀請碼", "warn");

      inviteBtn.disabled = true;
      const oldText = inviteBtn.textContent;
      inviteBtn.textContent = "驗證中…";

      try{
        const result = await validateInviteCode(currentEventId, code);

        if (!result.ok) {
          invitePassed = false;
          registerCard.classList.add("hidden");
          inviteMsg.innerHTML = `<span class="warn">${esc(result.reason)}</span>`;
          return;
        }

        invitePassed = true;
        inviteMsg.innerHTML = `<span class="ok">邀請碼驗證成功，你可使用邀請碼報名。</span>`;
        registerCard.classList.remove("hidden");
        registerSourceMsg.textContent = "你已通過邀請碼驗證。";
      }catch(e){
        console.error(e);
        invitePassed = false;
        registerCard.classList.add("hidden");
        inviteMsg.innerHTML = `<span class="warn">邀請碼驗證失敗</span>`;
      }finally{
        inviteBtn.disabled = false;
        inviteBtn.textContent = oldText;
      }
    }

    async function submitRegistration(){
      if (!currentUser) return AppUI.toast("請先登入", "warn");

      const fromEligible = eligibilityState && eligibilityState.status === "eligible";
      const fromInvite   = invitePassed === true;

      if (!fromEligible && !fromInvite) {
        AppUI.toast("你目前沒有可用的報名資格", "warn");
        return;
      }

      registerBtn.disabled  = true;
      const oldText          = registerBtn.textContent;
      registerBtn.textContent = "送出中…";

      try {
        const ordersCol = db.collection("events").doc(currentEventId).collection("orders");

        // Check duplicate
        const existing = await ordersCol.where("uid", "==", currentUser.uid).limit(1).get();
        if (!existing.empty) {
          registerMsg.innerHTML = `<span class="info">你已報名此活動。<a href="member.html" style="font-weight:900; margin-left:6px;">查看票券 →</a></span>`;
          return;
        }

        if (fromInvite) {
          // Use transaction to atomically create order + increment usedCount
          const codeVal  = inviteCode.value.trim();
          const codeQuery = await db.collection("events").doc(currentEventId)
            .collection("inviteCodes")
            .where("code", "==", codeVal)
            .where("enabled", "==", true)
            .limit(1).get();

          if (codeQuery.empty) {
            registerMsg.innerHTML = `<span class="warn">邀請碼已失效，請重新驗證。</span>`;
            return;
          }

          const codeRef  = codeQuery.docs[0].ref;
          const orderRef = ordersCol.doc();

          await db.runTransaction(async tx => {
            const codeSnap = await tx.get(codeRef);
            if (!codeSnap.exists) throw new Error("邀請碼已不存在");
            const cd = codeSnap.data() || {};
            const max  = Number(cd.maxUses   || 0);
            const used = Number(cd.usedCount || 0);
            if (max > 0 && used >= max) throw new Error("邀請碼使用次數已滿");

            tx.set(orderRef, {
              uid:          currentUser.uid,
              email:        currentUser.email || "",
              source:       "invite",
              inviteCode:   codeVal,
              inviteCodeId: codeQuery.docs[0].id,
              registeredAt: new Date(),
              checkedIn:    false,
            });
            tx.update(codeRef, { usedCount: used + 1, lastUsedAt: new Date() });
          });

        } else {
          // Eligible roster registration
          const orderRef = ordersCol.doc();
          await orderRef.set({
            uid:             currentUser.uid,
            email:           currentUser.email || "",
            source:          "verifiedSchool",
            verifiedSchoolId: eligibilityState.schoolId  || "",
            verifyKey:        eligibilityState.verifyKey || "",
            registeredAt:    new Date(),
            checkedIn:       false,
          });
        }

        registerMsg.innerHTML = `
          <span class="ok">🎉 報名成功！</span>
          <a href="member.html" style="font-weight:900; margin-left:8px;">查看票券 →</a>
        `;
        registerBtn.style.display = "none";
        AppUI.toast("報名成功！", "ok");

      } catch(e) {
        console.error(e);
        registerMsg.innerHTML = `<span class="warn">報名失敗：${esc(e.message || e)}</span>`;
      } finally {
        registerBtn.disabled    = false;
        registerBtn.textContent = oldText;
      }
    }

    inviteBtn.onclick = useInviteCode;
    registerBtn.onclick = submitRegistration;

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        AppUI.showGate(gate, app, { title: "請先登入", msg: "你需要先登入網站帳號，才能進行活動報名。" });
        return;
      }

      currentEventId = getEventIdFromUrl();

      if (!currentEventId) {
        AppUI.showGate(gate, app, { title: "缺少活動 ID", msg: "請從正確的活動連結進入。" });
        return;
      }

      gate.style.display = "none";
      app.style.display = "block";

      who.textContent = user.email || user.uid || "-";
      eventIdText.textContent = currentEventId;

      await loadEventBasic(currentEventId);

      try{
        const result = await checkEventEligibility(user.uid, currentEventId);
        renderEligibility(result);
      }catch(e){
        console.error(e);
        statusArea.innerHTML = `<span class="warn">讀取資格失敗</span>`;
      }
    });
  </script>
<script>
/* ── shared.js inlined ── */
(function () {
  "use strict";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  if (typeof firebase === "undefined") {
    console.error("shared.js 需要先載入 Firebase compat SDK");
    return;
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function norm(s) {
    return String(s ?? "").trim();
  }

  function tsToText(ts) {
    try {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString("zh-Hant", { hour12: false });
    } catch (e) {
      return "-";
    }
  }

  function pageIn(el) {
    if (!el) return;
    requestAnimationFrame(() => el.classList.add("on"));
  }

  function go(href, pageEl) {
    const root = pageEl || document.getElementById("pageRoot");
    if (root) root.classList.add("leaving");
    setTimeout(() => {
      location.href = href;
    }, 140);
  }

  function initPageLinks(pageEl) {
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href, pageEl);
    });
  }

  function toast(msg, type = "ok", duration = 3000) {
    let el = document.getElementById("_appToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "_appToast";
      el.style.cssText = [
        "position:fixed",
        "left:50%",
        "bottom:24px",
        "transform:translateX(-50%) translateY(10px)",
        "min-width:220px",
        "max-width:360px",
        "padding:12px 20px",
        "border-radius:999px",
        "box-shadow:0 10px 30px rgba(0,0,0,.15)",
        "font-size:14px",
        "font-weight:900",
        "text-align:center",
        "z-index:99999",
        "opacity:0",
        "pointer-events:none",
        "transition:opacity .2s ease, transform .2s ease"
      ].join(";");
      document.body.appendChild(el);
    }

    const theme = {
      ok: { bg: "#166534", color: "#fff" },
      warn: { bg: "#b91c1c", color: "#fff" },
      info: { bg: "#1d4ed8", color: "#fff" },
      neutral: { bg: "#111", color: "#fff" }
    }[type] || { bg: "#111", color: "#fff" };

    el.style.background = theme.bg;
    el.style.color = theme.color;
    el.textContent = msg;

    clearTimeout(el._timer);
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    });

    el._timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(10px)";
    }, duration);
  }

  function showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = true, extraBtns = "" } = {}) {
    if (!gateEl) return;
    if (appEl) appEl.style.display = "none";
    gateEl.style.display = "block";

    gateEl.innerHTML = `
      <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
      <div class="sub">${msg}</div>

      ${showEmailLogin ? `
        <div style="margin-top:16px; max-width:380px; display:grid; gap:10px;">
          <input id="_loginEmail" type="text" placeholder="帳號（Email）"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <input id="_loginPassword" type="password" placeholder="密碼"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <button class="btn btn-primary" id="_loginBtn" type="button">登入</button>
          <div id="_loginMsg" style="display:none; color:#b91c1c; font-size:13px;"></div>
        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
