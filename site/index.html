<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>校園演唱會購票系統</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="topnav.css" />
  <style>
    body { background: #0d0d0d; color: #fff; }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(168,85,247,.15) 0%, transparent 60%),
        #0d0d0d;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo-icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .site-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.5px;
      color: #fff;
      margin: 0 0 8px;
    }
    .site-sub {
      font-size: 15px;
      color: rgba(255,255,255,.5);
    }

    /* Main action cards */
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    @media (max-width: 400px) {
      .actions-grid { grid-template-columns: 1fr; }
    }

    .action-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .12s ease;
      backdrop-filter: blur(10px);
    }
    .action-card:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.2);
      transform: translateY(-2px);
    }
    .action-card:active { transform: translateY(0); }

    .action-card.primary {
      background: #fff;
      border-color: #fff;
      color: #000;
      grid-column: 1 / -1;
    }
    .action-card.primary:hover {
      background: #f0f0f0;
      border-color: #f0f0f0;
    }

    .card-icon  { font-size: 28px; }
    .card-title { font-size: 15px; font-weight: 900; }
    .card-desc  { font-size: 12px; opacity: .65; line-height: 1.5; }

    /* Events list (loaded dynamically) */
    .events-section {
      width: 100%;
      max-width: 480px;
      margin-top: 28px;
    }
    .events-label {
      font-size: 12px;
      color: rgba(255,255,255,.4);
      font-weight: 900;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }
    .event-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      margin-bottom: 8px;
      text-decoration: none;
      color: #fff;
      transition: background .12s ease;
    }
    .event-row:hover { background: rgba(255,255,255,.08); }
    .event-row-title { font-size: 14px; font-weight: 900; flex: 1; }
    .event-row-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(99,102,241,.25);
      color: #a5b4fc;
      white-space: nowrap;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
      text-align: center;
    }
    .footer a { color: rgba(255,255,255,.35); text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,.6); }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-area">
      <div class="logo-icon">🎤</div>
      <h1 class="site-title">校園演唱會購票系統</h1>
      <p class="site-sub">請選擇你要使用的功能</p>
    </div>

    <div class="actions-grid">
      <!-- 學生主入口 -->
      <a class="action-card primary" href="event-register.html">
        <span class="card-icon">🎟️</span>
        <span class="card-title">活動報名 / 購票</span>
        <span class="card-desc">選擇活動、完成校園驗證或輸入邀請碼後報名</span>
      </a>

      <a class="action-card" href="member.html">
        <span class="card-icon">🎓</span>
        <span class="card-title">我的票券</span>
        <span class="card-desc">查看報名記錄與入場 QR Code</span>
      </a>

      <a class="action-card" href="guest.html">
        <span class="card-icon">🔑</span>
        <span class="card-title">邀請碼報名</span>
        <span class="card-desc">使用主辦方提供的邀請碼直接報名</span>
      </a>
    </div>

    <!-- 公開活動列表 -->
    <div class="events-section" id="eventsSection" style="display:none;">
      <div class="events-label">即將舉辦的活動</div>
      <div id="eventsList"></div>
    </div>

    <div class="footer">
      <a href="dashboard.html">管理後台</a>
      　｜　
      <a href="staff-checkin.html">工作人員入場</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script src="topnav.js"></script>
  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    const db = window.db;
    const { esc, norm } = AppUI;

    async function loadEvents() {
      try {
        const snap = await db.collection("events")
          .where("status", "==", "published")
          .orderBy("createdAt", "desc")
          .limit(5)
          .get();

        if (snap.empty) return;

        const section = document.getElementById("eventsSection");
        const list    = document.getElementById("eventsList");

        snap.forEach(doc => {
          const d     = doc.data() || {};
          const title = norm(d.title || doc.id);
          const row   = document.createElement("a");
          row.className = "event-row";
          row.href      = `event-register.html?eventId=${encodeURIComponent(doc.id)}`;
          row.innerHTML = `
            <span class="event-row-title">${esc(title)}</span>
            <span class="event-row-badge">報名中</span>
          `;
          list.appendChild(row);
        });

        section.style.display = "block";
      } catch (_) {
        // Not critical - just don't show the section
      }
    }

    loadEvents();
  </script>
</body>
</html>
