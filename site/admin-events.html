<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>後台｜活動管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet" href="sidebar.css"/>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
  background:#f6f7fb;
}

/* gate */
body.gate-mode{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#gateWrap{
  width:100%;
  max-width:400px;
}

.gate-card{
  background:#fff;
  padding:24px;
  border-radius:14px;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:12px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* app */
#app{
  display:none;
}

/* 主內容 */
#appWrap{
  background:#fff;
  border-radius:20px;
  padding:20px;
}

/* header */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.section{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
}

</style>
</head>

<body class="gate-mode">

<!-- 登入 -->
<div id="gateWrap">
  <div class="gate-card">
    <h3>登入</h3>
    <input id="loginEmail" placeholder="Email"/>
    <input id="loginPassword" type="password" placeholder="密碼"/>
    <button id="loginBtn" class="btn">登入</button>
    <div id="gateMsg"></div>
  </div>
</div>

<!-- 主系統 -->
<div id="app">
  <div id="appWrap">

    <div class="topbar">
      <h2>活動管理</h2>
      <button id="logoutBtn">登出</button>
    </div>

    <div class="section">
      <h3>測試畫面（你的功能照舊）</h3>
      <p>這裡先確保 sidebar 正常</p>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="sidebar.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "concert-1ff7e.firebaseapp.com",
  projectId: "concert-1ff7e",
  ...
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const gateWrap = document.getElementById("gateWrap");
const app = document.getElementById("app");

function showApp(user){
  document.body.classList.remove("gate-mode");
  gateWrap.style.display="none";
  app.style.display="block";

  SidebarShow(user.email,"admin");
}

function showGate(){
  document.body.classList.add("gate-mode");
  gateWrap.style.display="block";
  app.style.display="none";
}

loginBtn.onclick = async ()=>{
  try{
    await auth.signInWithEmailAndPassword(
      loginEmail.value,
      loginPassword.value
    );
  }catch(e){
    gateMsg.innerText = e.message;
  }
};

logoutBtn.onclick = ()=>auth.signOut();

auth.onAuthStateChanged(user=>{
  if(user){
    showApp(user);
  }else{
    showGate();
  }
});
</script>

</body>
</html>
