<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜活動管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="sidebar.css" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --r:18px;
    }

    body{
      margin:0;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    body.gate-mode{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #app{
      display:none;
    }

    /* 主內容 */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .section{
      background:#fff;
      border-radius:18px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.05);
    }

    .btn{
      padding:10px 18px;
      border-radius:999px;
      border:1px solid #ddd;
      background:#fff;
      cursor:pointer;
      font-weight:900;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:768px){
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>

<body class="gate-mode">

<!-- 登入 -->
<div id="gateWrap">
  <div style="text-align:center;margin-bottom:20px;">
    <div style="font-size:32px;">🎟️</div>
    <div style="font-weight:900;">活動管理</div>
  </div>

  <input id="loginEmail" placeholder="Email" style="width:100%;margin-bottom:10px;">
  <input id="loginPassword" type="password" placeholder="Password" style="width:100%;margin-bottom:10px;">
  <button id="loginBtn" class="btn" style="width:100%;">登入</button>

  <div id="gateMsg" style="color:red;margin-top:10px;"></div>
</div>

<!-- 主系統 -->
<div id="app">
  <div id="appWrap">

    <div class="topbar">
      <div>
        <div style="font-size:20px;font-weight:900;">活動管理</div>
        <div id="dashUserEmail"></div>
      </div>
      <button id="logoutBtn" class="btn">登出</button>
    </div>

    <div class="section">
      <div style="font-weight:900;margin-bottom:10px;">建立活動</div>

      <input id="title" placeholder="活動名稱" style="width:100%;margin-bottom:10px;">
      <input id="location" placeholder="地點" style="width:100%;margin-bottom:10px;">

      <button id="saveBtn" class="btn btn-primary">儲存</button>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script src="sidebar.js"></script>

<script>
const firebaseConfig = {
  apiKey: "xxx",
  authDomain: "xxx",
  projectId: "xxx"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const gateWrap = document.getElementById("gateWrap");
const app = document.getElementById("app");

function showGate(msg=""){
  document.body.classList.add("gate-mode");
  gateWrap.style.display="block";
  app.style.display="none";
  document.getElementById("gateMsg").innerText = msg;
}

function showApp(user){
  document.body.classList.remove("gate-mode");
  document.body.classList.add("sidebar-layout");

  gateWrap.style.display="none";
  app.style.display="block";

  // 🔥 sidebar 啟動
  window.SidebarShow(user.email, "platform_super");

  document.getElementById("dashUserEmail").innerText = user.email;
}

document.getElementById("loginBtn").onclick = async ()=>{
  try{
    const email = loginEmail.value;
    const pass = loginPassword.value;
    await auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    showGate(e.message);
  }
};

document.getElementById("logoutBtn").onclick = ()=>auth.signOut();

auth.onAuthStateChanged(user=>{
  if(!user) return showGate();
  showApp(user);
});
</script>

</body>
</html>
