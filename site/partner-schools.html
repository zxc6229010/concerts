<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜特約校園管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />


  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b) * 1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    body.gate-mode{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:var(--bg);
    }

    #gateWrap{
      width:100%;
      max-width:420px;
    }

    .gate-card{
      background:#fff;
      border-radius:16px;
      padding:26px 26px 22px;
      box-shadow:0 4px 24px rgba(0,0,0,.08);
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
      color:#444;
    }

    .field input{
      width:100%;
      padding:12px 14px;
      border:1.5px solid #dde1e7;
      border-radius:10px;
      font-size:14px;
      background:#fff;
      outline:none;
      transition:border-color .15s;
    }

    .field input:focus{
      border-color:#2563eb;
    }

    .gate-msg{
      margin-top:12px;
      font-size:13px;
      line-height:1.6;
      color:#dc2626;
      display:none;
      white-space:pre-wrap;
    }

    #app{
      display:none;
      width:100%;
      min-height:100vh;
    }

    #appWrap{
      display:block;
      width:100%;
    }

    #adminMain{
      flex:1;
      min-width:0;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:0 0 16px;
      border-bottom:1px solid #f0f0f0;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-left{
      min-width:0;
    }

    .topbar-title{
      font-size:20px;
      font-weight:900;
      margin:0 0 3px;
      color:#111;
    }

    .topbar-sub{
      font-size:13px;
      color:#888;
      margin:0;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .user-chip{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .user-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 0 2px rgba(34,197,94,.2);
    }

    .user-text{
      text-align:right;
    }

    .user-name{
      font-size:14px;
      font-weight:800;
      color:#111;
    }

    .user-email{
      font-size:12px;
      color:#888;
      margin-top:1px;
    }

    .page{
      width:100%;
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:22px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }

    label{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      font-weight:900;
    }

    input[type="text"],
    textarea{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .form-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
    }

    .switch{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }

    .switch:first-child{
      margin-top:0;
    }

    .switch input{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 auto;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:var(--btn-fs);
      font-weight:900;
      line-height:1;
      text-decoration:none;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b) * 1.25);
      font-size:15px;
    }

    .btn-danger{
      border-color:rgba(239,68,68,.35);
      background:#fff;
      color:#b91c1c;
    }

    .form-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .item-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .logo{
      width:44px;
      height:44px;
      flex:0 0 auto;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      object-fit:cover;
    }

    .logo-fallback{
      width:44px;
      height:44px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:900;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:6px;
    }

    .badge{
      display:inline-flex;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
    }

    .right-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:flex-start;
      gap:10px;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    .edit-panel{
      display:none;
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .edit-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      margin-top:10px;
    }

    .empty-text{
      color:var(--muted);
      font-size:14px;
      padding:8px 0;
    }

    @media (max-width:760px){
      .topbar{
        align-items:flex-start;
        flex-direction:column;
      }

      .topbar-right{
        width:100%;
        justify-content:space-between;
      }

      .form-grid,
      .edit-grid{
        grid-template-columns:1fr;
      }
    }
  
/* ── shared.css inlined ── */
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }


/* ── sidebar.css inlined ── */
#adminSidebar{
  width:220px;
  background:#fff;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  padding:16px;
  border-right:1px solid #eee;
}

#app{
  margin-left:220px;
}
</style>

      const email = String(loginEmail.value || "").trim();
      const password = String(loginPassword.value || "");

      if (!email) {
        showGate("請輸入 Email");
        loginEmail.focus();
        return;

        showGate("請輸入密碼");

      loginBtn.disabled = true;

        await auth.signInWithEmailAndPassword(email, password);

      }finally{

      return String(text || "")
        .split("\n")
        .map(v => String(v || "").trim().toLowerCase())
        .filter(Boolean);
    }

    function domainsToText(arr) {
      return Array.isArray(arr) ? arr.join("\n") : "";

      if (window.AppUI && AppUI.toast) AppUI.toast(msg, type);

    function canDelete() {
      return currentRole === "platform_super";

    function canEdit() {
      return currentRole === "platform_super" || currentRole === "platform_admin";
    }

    function updateAddButtonState() {
      const hasName = (nameEl.value || "").trim().length > 0;
      const hasMethod = mStudentId.checked || mGoogle.checked;
      addBtn.disabled = !(hasName && hasMethod && canEdit());
    }

    nameEl.addEventListener("input", updateAddButtonState);

    function sortSchools(docs) {
      return docs.sort((a, b) => {
        const nameA = String(a.data().name || "").trim().toLowerCase();
        const nameB = String(b.data().name || "").trim().toLowerCase();
        return nameA.localeCompare(nameB, "zh-Hant");
      });
    }

    async function loadList() {
      listEl.innerHTML = `<div class="empty-text">載入中…</div>`;

      try {
        const snap = await db.collection("partnerSchools").get();

          const methods = Array.isArray(school.authMethods) ? school.authMethods : [];

                      ${
                        methods.length
                          ? methods.map(method => `<span class="badge">${esc(method)}</span>`).join("")
                          : `<span class="badge">（未設定）</span>`
                      }
                      <span class="badge">${verificationEnabled ? "校園驗證開啟" : "校園驗證關閉"}</span>
                    </div>

                    <div class="small" style="margin-top:8px;">
                      允許信箱後綴：
                      <span class="mono">${esc(allowedEmailDomains.length ? allowedEmailDomains.join(", ") : "（未設定）")}</span>
                    </div>
                  </div>
                </div>

                <div class="right-actions">
                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEnabled('${esc(id)}', ${enabled})"
                    ${canEdit() ? "" : "disabled"}
                  >
                    ${enabled ? "停用" : "啟用"}
                  </button>

                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEdit('${esc(id)}')"
                    ${canEdit() ? "" : "disabled"}
                  >
                    編輯
                  </button>

                  <button
                    class="btn btn-sm btn-danger"
                    type="button"
                    onclick="removeSchool('${esc(id)}', '${esc(name)}')"
                    ${canDelete() ? "" : "disabled"}
                  >
                    移除
                  </button>

                  <a class="btn btn-sm" href="admin-studentslist-import.html?schoolId=${encodeURIComponent(id)}">
                    匯入名單
                  </a>
                </div>
              </div>

              <div class="edit-panel" id="edit-${esc(id)}">
                <div class="small">修改完之後按「儲存」即可。</div>

                <div class="edit-grid">
                  <div>
                    <label>學校名稱</label>
                    <input type="text" id="editName-${esc(id)}" value="${esc(name)}" />

                    <label style="margin-top:12px;">校徽圖片網址（選填）</label>
                    <input type="text" id="editLogo-${esc(id)}" value="${esc(logoUrl)}" placeholder="https://..." />

                    <label style="margin-top:12px;">允許驗證的信箱後綴（每行一個，不要加 @）</label>
                    <textarea id="editDomains-${esc(id)}" placeholder="例：

    async function addSchool() {
      const name = (nameEl.value || "").trim();
      const logoUrl = (logoEl.value || "").trim();
      const allowedEmailDomains = parseDomains(allowedEmailDomainsEl.value);
      const verificationEnabled = !!verificationEnabledEl.checked;

      if (!name) {
        toast("請輸入學校名稱", "warn");
        nameEl.focus();
        return;
      }

      const methods = [];
      if (mStudentId.checked) methods.push("student_id");
      if (mGoogle.checked) methods.push("google");

      if (!methods.length) {
        toast("請至少選擇一種認證方式", "warn");
        return;
      }

      addBtn.disabled = true;
      const oldText = addBtn.textContent;
      addBtn.textContent = "新增中…";

      try {
        await db.collection("partnerSchools").add({
          name,
          logoUrl,
          enabled: true,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          createdAt: new Date(),
          createdBy: currentUser ? currentUser.uid : ""
        });

        nameEl.value = "";
        logoEl.value = "";
        allowedEmailDomainsEl.value = "";
        verificationEnabledEl.checked = true;
        mStudentId.checked = false;
        mGoogle.checked = false;

        updateAddButtonState();
        await loadList();
        toast("新增成功", "ok");
      } catch (e) {
        console.error(e);
        toast("新增失敗：" + (e.message || e), "warn");
      } finally {
        addBtn.textContent = oldText;
        updateAddButtonState();
      }
    }

    window.toggleEnabled = async (id, enabledNow) => {
      if (!canEdit()) return;

      try {
        await db.collection("partnerSchools").doc(id).update({
          enabled: !enabledNow,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""

        await loadList();

        console.error(e);
        toast("變更失敗：" + (e.message || e), "warn");

    window.toggleEdit = (id) => {
      const panel = document.getElementById(`edit-${id}`);
      if (!panel) return;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    window.saveEdit = async (id) => {
      if (!canEdit()) return;

      const name = (document.getElementById(`editName-${id}`)?.value || "").trim();
      const logoUrl = (document.getElementById(`editLogo-${id}`)?.value || "").trim();
      const allowedEmailDomains = parseDomains(document.getElementById(`editDomains-${id}`)?.value || "");
      const verificationEnabled = !!document.getElementById(`editVerification-${id}`)?.checked;
      const useStudent = !!document.getElementById(`editMStudent-${id}`)?.checked;
      const useGoogle = !!document.getElementById(`editMGoogle-${id}`)?.checked;

      if (!name) {
        toast("學校名稱不能為空", "warn");
        return;
      }

      if (!useStudent && !useGoogle) {
        toast("請至少選擇一種認證方式", "warn");
        return;
      }

      const methods = [];
      if (useStudent) methods.push("student_id");
      if (useGoogle) methods.push("google");

      try {
        await db.collection("partnerSchools").doc(id).update({
          name,
          logoUrl,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        toast("儲存失敗：" + (e.message || e), "warn");
      }
    };

    window.removeSchool = async (id, name) => {
      if (!canDelete()) return;

      const ok = confirm(`確定要移除「${name}」嗎？\n此動作無法復原。`);
      if (!ok) return;

      try {
        await db.collection("partnerSchools").doc(id).delete();
        await loadList();
      } catch (e) {
        console.error(e);
        toast("移除失敗：" + (e.message || e), "warn");

    };

    reloadBtn.addEventListener("click", loadList);
    addBtn.addEventListener("click", addSchool);

    auth.onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        currentRole = "";
        showGate("");
        return;

      gateMsg.textContent = "驗證中…";
      gateMsg.style.display = "block";

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          showGate("你的帳號尚未被授權為後台管理員。");
          return;

        const userData = userDoc.data() || {};

        if (userData.enabled !== true) {
          showGate("此帳號已被停用，請聯絡系統管理員。");
          return;
        }

        currentRole = String(userData.role || "").trim();

        if (!["platform_super", "platform_admin"].includes(currentRole)) {
          showGate("你沒有權限管理特約校園。");
          return;
        }

        dashUserName.textContent = currentRole || "管理員";
        dashUserEmail.textContent = user.email || "-";

        showApp();
        updateAddButtonState();
        await loadList();
      } catch (err) {
        console.error(err);
        showGate("無法讀取權限資料，請查看 Console。");
      }
    });

        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
<script>
/* ── sidebar.js inlined ── */
(function () {
  "use strict";

  const NAV = [
    { e:"🏠", t:"總覽",           d:"系統狀態與提醒",         h:"dashboard.html" },
    { e:"🎟️", t:"活動管理",       d:"建立活動 / 票種",        h:"admin-events.html" },
    { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷",   h:"admin-event-orders.html" },
    { e:"🏫", t:"特約校園管理",     d:"校園設定 / 停用",        h:"partner-schools.html" },
    { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定",     h:"admin-studentslist-import.html" },
    { e:"🔎", t:"會員查詢",         d:"查詢帳號與驗證狀態",     h:"admin-member-lookup.html" },
    { e:"🧑‍💼", t:"後台帳號管理",   d:"建立、審核、派發",       h:"admin-staff-users.html" },
    { e:"🏢", t:"全組織管理",      d:"各校管理人員一覽",       h:"admin-org-overview.html" },
    { e:"👥", t:"組織團隊",        d:"管理員 / 服務員 / 組別", h:"org-team.html" },
    { e:"✅", t:"核銷掃碼",        d:"掃碼核銷指定活動",       h:"staff-checkin.html" },
    { e:"🛠️", t:"服務中心核銷",    d:"條碼槍查詢與核銷",       h:"admin-checkin-assist.html" },
    { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂",      h:"admin-dashboard-settings.html" },
    { e:"🧪", t:"身分測試切換",    d:"模擬其他帳號",            h:"admin-impersonate.html" },
    { e:"📝", t:"後台帳號申請",    d:"填寫申請",                h:"request-access.html" }
  ];

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[m]));

  const cur = location.pathname.split("/").pop() || "";

  function buildSidebar(role, email) {
    const nav = NAV.map((n) => `
      <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
        <div class="sb-item-icon">${n.e}</div>
        <div class="sb-item-text">
          <div class="sb-item-label">${esc(n.t)}</div>
          <div class="sb-item-desc">${esc(n.d)}</div>
        </div>
      </a>
    `).join("");

    const wrapper = document.createElement("aside");
    wrapper.id = "adminSidebar";
    wrapper.className = "sb-visible";
    wrapper.innerHTML = `
      <a class="sb-brand" href="dashboard.html">
        <div class="sb-brand-icon">🎤</div>
        <div>
          <div class="sb-brand-name">演唱會購票系統</div>
          <div class="sb-brand-sub">Admin Panel</div>
        </div>
      </a>

      <div class="sb-nav">
        ${nav}
      </div>

      <div class="sb-footer-info" id="sbFooterInfo">
        <div>${esc(email || "-")}</div>
        <div>角色：${esc(role || "-")}</div>
      </div>

      <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
    `;
    return wrapper;
  }

  function buildHamburger() {
    const btn = document.createElement("button");
    btn.id = "sbToggle";
    btn.type = "button";
    btn.setAttribute("aria-label", "開啟選單");
    btn.innerHTML = "☰";
    return btn;
  }

  function buildOverlay() {
    const overlay = document.createElement("div");
    overlay.id = "sbOverlay";
    return overlay;
  }

  function ensureLayout(role, email) {
    const app = document.getElementById("app");
    if (!app) return;

    if (document.getElementById("adminSidebar")) {
      updateSidebarInfo(email, role);
      return;
    }

    const appWrap = document.getElementById("appWrap");
    if (!appWrap) return;

    const sidebar = buildSidebar(role, email);
    const overlay = buildOverlay();
    const toggle = buildHamburger();

    app.insertBefore(toggle, app.firstChild);
    app.insertBefore(overlay, app.firstChild.nextSibling);
    app.insertBefore(sidebar, app.firstChild.nextSibling.nextSibling);

    document.body.classList.add("sidebar-layout");

    toggle.addEventListener("click", () => {
      sidebar.classList.toggle("sb-open");
      overlay.classList.toggle("sb-open");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("sb-open");
      overlay.classList.remove("sb-open");
    });

    const logoutBtn = document.getElementById("sbLogoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        try {
          if (typeof firebase !== "undefined" && firebase.auth) {
            await firebase.auth().signOut();
          }
        } catch (e) {
          console.error(e);
          alert("登出失敗");
        }
      });
    }

    updateSidebarInfo(email, role);
  }

  function updateSidebarInfo(email, role) {
    const footer = document.getElementById("sbFooterInfo");
    if (footer) {
      footer.innerHTML = `
        <div>${esc(email || "-")}</div>
        <div>角色：${esc(role || "-")}</div>
      `;
    }
  }

  window.SidebarShow = function (email, role) {
    document.body.classList.remove("gate-mode");
    document.body.classList.add("sidebar-layout");
    ensureLayout(role, email);

    const sidebar = document.getElementById("adminSidebar");
    if (sidebar) {
      sidebar.classList.add("sb-visible");
    }
  };

  window.SidebarHide = function () {
    const sidebar = document.getElementById("adminSidebar");
    const overlay = document.getElementById("sbOverlay");

    document.body.classList.remove("sidebar-layout");

    if (sidebar) {
      sidebar.classList.remove("sb-open");
    }

    if (overlay) {
      overlay.classList.remove("sb-open");
    }
  };
})();
</script>
</body>
</html>
