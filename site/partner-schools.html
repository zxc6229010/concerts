<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜特約校園管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b) * 1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:48px 32px;
    }

    @media (max-width:640px){
      .wrap{ padding:28px 16px; }
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:22px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
    }

    label{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      font-weight:900;
    }

    input[type="text"],
    textarea{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:16px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .form-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
    }

    @media (max-width:640px){
      .form-grid{ grid-template-columns:1fr; }
    }

    .switch{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }

    .switch:first-child{ margin-top:0; }

    .switch input{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 auto;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:var(--btn-fs);
      font-weight:900;
      line-height:1;
      text-decoration:none;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b) * 1.25);
      font-size:15px;
    }

    .btn-danger{
      border-color:rgba(239,68,68,.35);
      background:#fff;
      color:#b91c1c;
    }

    .form-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .item-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:44px;
      height:44px;
      flex:0 0 auto;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      object-fit:cover;
    }

    .logo-fallback{
      width:44px;
      height:44px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:900;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:6px;
    }

    .badge{
      display:inline-flex;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
    }

    .right-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:flex-start;
      gap:10px;
    }

    .edit-panel{
      display:none;
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .edit-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      margin-top:10px;
    }

    @media (max-width:640px){
      .edit-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="loginGate" class="section"></div>

    <div id="adminApp" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>特約校園管理</h1>
            <div class="sub">新增、停用、編輯特約校園資料</div>
          </div>

          <div style="text-align:right;">
            <div class="small" id="who"></div>
            <div style="margin-top:8px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap;">
              <button id="logoutBtn" class="btn btn-sm" type="button">登出</button>
            </div>
          </div>
        </div>

        <div id="editorWrap">
          <div class="form-grid">
            <div>
              <label>學校名稱（必填）</label>
              <input id="schoolName" type="text" placeholder="例：A學校" />

              <label style="margin-top:12px;">校徽圖片網址（選填）</label>
              <input id="schoolLogoUrl" type="text" placeholder="https://...（貼圖片網址）" />
              <div class="small" style="margin-top:8px;">這裡只會存圖片網址，不會上傳檔案。</div>

              <label style="margin-top:12px;">允許驗證的信箱後綴（每行一個，不要加 @）</label>
              <textarea id="allowedEmailDomains" placeholder="例：
gm.tgsh.tn.edu.tw
mail.tgsh.tn.edu.tw"></textarea>
              <div class="small" style="margin-top:8px;">校園身分驗證時，會用這些後綴檢查學校信箱。</div>
            </div>

            <div>
              <label>允許認證方式（至少選 1 種）</label>
              <div class="form-box">
                <div class="switch">
                  <input id="mStudentId" type="checkbox" />
                  <span>學號（student_id）</span>
                </div>
                <div class="switch">
                  <input id="mGoogle" type="checkbox" />
                  <span>Google（google）</span>
                </div>
              </div>

              <label style="margin-top:12px;">校園驗證設定</label>
              <div class="form-box">
                <div class="switch">
                  <input id="verificationEnabled" type="checkbox" checked />
                  <span>開啟校園身分驗證（verificationEnabled）</span>
                </div>
              </div>

              <div class="sub" style="margin-top:12px;">
                提示：前台只會顯示 enabled = true 的學校。
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button id="reloadBtn" class="btn" type="button">重新載入</button>
            <button id="addBtn" class="btn btn-primary" type="button" disabled>新增校園</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>校園清單</h2>
        <div id="list" class="list"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    const db = window.db;

    const loginGate = document.getElementById("loginGate");
    const adminApp = document.getElementById("adminApp");
    const whoEl = document.getElementById("who");
    const logoutBtn = document.getElementById("logoutBtn");

    const listEl = document.getElementById("list");
    const nameEl = document.getElementById("schoolName");
    const logoEl = document.getElementById("schoolLogoUrl");
    const allowedEmailDomainsEl = document.getElementById("allowedEmailDomains");
    const verificationEnabledEl = document.getElementById("verificationEnabled");
    const reloadBtn = document.getElementById("reloadBtn");
    const addBtn = document.getElementById("addBtn");

    const mStudentId = document.getElementById("mStudentId");
    const mGoogle = document.getElementById("mGoogle");

    let currentRole = "";
    let currentUser = null;

    const esc = AppUI.esc;

    const escAttr = AppUI.esc;

    function parseDomains(text) {
      return String(text || "")
        .split("\n")
        .map(v => String(v || "").trim().toLowerCase())
        .filter(Boolean);
    }

    function domainsToText(arr) {
      return Array.isArray(arr) ? arr.join("\n") : "";
    }

    const doLogout = AppAuth.logout;

    logoutBtn.addEventListener("click", doLogout);

    function canDelete() {
      return currentRole === "platform_super";
    }

    function canEdit() {
      return currentRole === "platform_super" || currentRole === "platform_admin";
    }

    function updateAddButtonState() {
      const hasName = (nameEl.value || "").trim().length > 0;
      const hasMethod = mStudentId.checked || mGoogle.checked;
      addBtn.disabled = !(hasName && hasMethod && canEdit());
    }

    nameEl.addEventListener("input", updateAddButtonState);
    logoEl.addEventListener("input", updateAddButtonState);
    allowedEmailDomainsEl.addEventListener("input", updateAddButtonState);
    verificationEnabledEl.addEventListener("change", updateAddButtonState);
    mStudentId.addEventListener("change", updateAddButtonState);
    mGoogle.addEventListener("change", updateAddButtonState);

    function sortSchools(docs) {
      return docs.sort((a, b) => {
        const nameA = String(a.data().name || "").trim().toLowerCase();
        const nameB = String(b.data().name || "").trim().toLowerCase();
        return nameA.localeCompare(nameB, "zh-Hant");
      });
    }

    async function loadList() {
      listEl.innerHTML = `<div class="small">載入中…</div>`;

      try {
        const snap = await db.collection("partnerSchools").get();
        const docs = sortSchools(snap.docs.slice());

        if (!docs.length) {
          listEl.innerHTML = `<div class="small">目前沒有資料</div>`;
          return;
        }

        listEl.innerHTML = docs.map((doc) => {
          const school = doc.data() || {};
          const id = doc.id;

          const name = school.name || "未命名學校";
          const logoUrl = String(school.logoUrl || "").trim();
          const enabled = school.enabled === true;
          const methods = Array.isArray(school.authMethods) ? school.authMethods : [];
          const verificationEnabled = school.verificationEnabled === true;
          const allowedEmailDomains = Array.isArray(school.allowedEmailDomains) ? school.allowedEmailDomains : [];
          const fallback = String(name).slice(0, 1);

          return `
            <div class="item" id="row-${escAttr(id)}">
              <div class="item-top">
                <div class="item-left">
                  ${
                    logoUrl
                      ? `<img
                          class="logo"
                          src="${escAttr(logoUrl)}"
                          alt="logo"
                          onerror="this.outerHTML='<div class=\\'logo-fallback\\'>${esc(fallback)}</div>'"
                        >`
                      : `<div class="logo-fallback">${esc(fallback)}</div>`
                  }

                  <div style="min-width:0;">
                    <div style="font-weight:900;">${esc(name)}</div>
                    <div class="small" style="margin-top:4px;">
                      狀態：${enabled ? "啟用" : "停用"}
                    </div>

                    <div class="badges">
                      ${
                        methods.length
                          ? methods.map(method => `<span class="badge">${esc(method)}</span>`).join("")
                          : `<span class="badge">（未設定）</span>`
                      }
                      <span class="badge">${verificationEnabled ? "校園驗證開啟" : "校園驗證關閉"}</span>
                    </div>

                    <div class="small" style="margin-top:8px;">
                      允許信箱後綴：
                      <span class="mono">${esc(allowedEmailDomains.length ? allowedEmailDomains.join(", ") : "（未設定）")}</span>
                    </div>
                  </div>
                </div>

                <div class="right-actions">
                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEnabled('${escAttr(id)}', ${enabled})"
                    ${canEdit() ? "" : "disabled"}
                  >
                    ${enabled ? "停用" : "啟用"}
                  </button>

                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEdit('${escAttr(id)}')"
                    ${canEdit() ? "" : "disabled"}
                  >
                    編輯
                  </button>

                  <button
                    class="btn btn-sm btn-danger"
                    type="button"
                    onclick="removeSchool('${escAttr(id)}', '${escAttr(name)}')"
                    ${canDelete() ? "" : "disabled"}
                  >
                    移除
                  </button>

                  <a class="btn btn-sm" href="admin-studentslist-import.html?schoolId=${encodeURIComponent(id)}">
                    匯入名單
                  </a>
                </div>
              </div>

              <div class="edit-panel" id="edit-${escAttr(id)}">
                <div class="small">修改完之後按「儲存」即可。</div>

                <div class="edit-grid">
                  <div>
                    <label>學校名稱</label>
                    <input type="text" id="editName-${escAttr(id)}" value="${escAttr(name)}" />

                    <label style="margin-top:12px;">校徽圖片網址（選填）</label>
                    <input type="text" id="editLogo-${escAttr(id)}" value="${escAttr(logoUrl)}" placeholder="https://..." />

                    <label style="margin-top:12px;">允許驗證的信箱後綴（每行一個，不要加 @）</label>
                    <textarea id="editDomains-${escAttr(id)}" placeholder="例：
gm.tgsh.tn.edu.tw
mail.tgsh.tn.edu.tw">${esc(domainsToText(allowedEmailDomains))}</textarea>
                  </div>

                  <div>
                    <label>允許認證方式</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editMStudent-${escAttr(id)}" ${methods.includes("student_id") ? "checked" : ""} />
                        <span>學號（student_id）</span>
                      </div>
                      <div class="switch">
                        <input type="checkbox" id="editMGoogle-${escAttr(id)}" ${methods.includes("google") ? "checked" : ""} />
                        <span>Google（google）</span>
                      </div>
                    </div>

                    <label style="margin-top:12px;">校園驗證設定</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editVerification-${escAttr(id)}" ${verificationEnabled ? "checked" : ""} />
                        <span>開啟校園身分驗證（verificationEnabled）</span>
                      </div>
                    </div>

                    <div class="form-actions" style="justify-content:flex-end; margin-top:12px;">
                      <button class="btn btn-sm" type="button" onclick="toggleEdit('${escAttr(id)}')">取消</button>
                      <button class="btn btn-sm btn-primary" type="button" onclick="saveEdit('${escAttr(id)}')" ${canEdit() ? "" : "disabled"}>儲存</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        console.error(e);
        listEl.innerHTML = `<div class="small">讀取失敗，請查看 Console。</div>`;
        AppUI.toast("讀取校園清單失敗：" + (e.message || e), "warn");
      }
    }

    async function addSchool() {
      const name = (nameEl.value || "").trim();
      const logoUrl = (logoEl.value || "").trim();
      const allowedEmailDomains = parseDomains(allowedEmailDomainsEl.value);
      const verificationEnabled = !!verificationEnabledEl.checked;

      if (!name) {
        AppUI.toast("請輸入學校名稱", "warn");
        nameEl.focus();
        return;
      }

      const methods = [];
      if (mStudentId.checked) methods.push("student_id");
      if (mGoogle.checked) methods.push("google");

      if (!methods.length) {
        AppUI.toast("請至少選擇一種認證方式", "warn");
        return;
      }

      addBtn.disabled = true;
      const oldText = addBtn.textContent;
      addBtn.textContent = "新增中…";

      try {
        await db.collection("partnerSchools").add({
          name,
          logoUrl,
          enabled: true,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          createdAt: new Date(),
          createdBy: currentUser ? currentUser.uid : ""
        });

        nameEl.value = "";
        logoEl.value = "";
        allowedEmailDomainsEl.value = "";
        verificationEnabledEl.checked = true;
        mStudentId.checked = false;
        mGoogle.checked = false;

        updateAddButtonState();
        await loadList();
        AppUI.toast("新增成功", "ok");
      } catch (e) {
        console.error(e);
        AppUI.toast("新增失敗：" + (e.message || e), "warn");
      } finally {
        addBtn.textContent = oldText;
        updateAddButtonState();
      }
    }

    window.toggleEnabled = async (id, enabledNow) => {
      if (!canEdit()) return;

      try {
        await db.collection("partnerSchools").doc(id).update({
          enabled: !enabledNow,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        AppUI.toast("變更失敗：" + (e.message || e), "warn");
      }
    };

    window.toggleEdit = (id) => {
      const panel = document.getElementById(`edit-${id}`);
      if (!panel) return;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    window.saveEdit = async (id) => {
      if (!canEdit()) return;

      const name = (document.getElementById(`editName-${id}`)?.value || "").trim();
      const logoUrl = (document.getElementById(`editLogo-${id}`)?.value || "").trim();
      const allowedEmailDomains = parseDomains(document.getElementById(`editDomains-${id}`)?.value || "");
      const verificationEnabled = !!document.getElementById(`editVerification-${id}`)?.checked;
      const useStudent = !!document.getElementById(`editMStudent-${id}`)?.checked;
      const useGoogle = !!document.getElementById(`editMGoogle-${id}`)?.checked;

      if (!name) {
        AppUI.toast("學校名稱不能為空", "warn");
        return;
      }

      if (!useStudent && !useGoogle) {
        AppUI.toast("請至少選擇一種認證方式", "warn");
        return;
      }

      const methods = [];
      if (useStudent) methods.push("student_id");
      if (useGoogle) methods.push("google");

      try {
        await db.collection("partnerSchools").doc(id).update({
          name,
          logoUrl,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        AppUI.toast("儲存失敗：" + (e.message || e), "warn");
      }
    };

    window.removeSchool = async (id, name) => {
      if (!canDelete()) return;

      const ok = confirm(`確定要移除「${name}」嗎？\n此動作無法復原。`);
      if (!ok) return;

      try {
        await db.collection("partnerSchools").doc(id).delete();
        await loadList();
      } catch (e) {
        console.error(e);
        AppUI.toast("移除失敗：" + (e.message || e), "warn");
      }
    };

    reloadBtn.addEventListener("click", loadList);
    addBtn.addEventListener("click", addSchool);

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        AppUI.showGate(gate, app, { title: "特約校園管理", msg: "請先登入後台帳號。", showEmailLogin: true });
        return;
      }

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          AppUI.showGate(gate, app, { title: "尚未授權", msg: "你的帳號尚未被授權為後台管理員。", showEmailLogin: false });
          return;
        }

        const userData = userDoc.data() || {};

        if (userData.enabled !== true) {
          AppUI.showGate(gate, app, { title: "帳號已停用", msg: "此帳號已被停用，請聯絡系統管理員。", showEmailLogin: false });
          return;
        }

        currentRole = String(userData.role || "").trim();

        if (!["platform_super", "platform_admin"].includes(currentRole)) {
          AppUI.showGate(gate, app, { title: "權限不足", msg: "你沒有權限管理特約校園。", showEmailLogin: false });
          return;
        }

        whoEl.textContent = `${user.email || ""}｜${currentRole}`;

        loginGate.style.display = "none";
        adminApp.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }

        updateAddButtonState();
        await loadList();
      } catch (err) {
        console.error(err);
        AppUI.showGate(gate, app, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
