<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>校園驗證結果</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="topnav.css" />
  <style>
    .wrap { max-width: 540px; }
    .result-icon { font-size: 56px; text-align: center; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="wrap page" id="pageRoot">
    <div class="card" id="resultCard">
      <div class="result-icon" id="icon">⏳</div>
      <h1 id="title" style="text-align:center;">驗證中，請稍候…</h1>
      <div class="sub" id="msg" style="text-align:center; margin-top:8px;"></div>
      <div id="actions" style="display:none; margin-top:20px; display:flex; flex-direction:column; gap:10px; align-items:center;">
        <a class="btn btn-primary" href="member.html">查看我的票券</a>
        <a class="btn" href="index.html">回首頁</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script src="topnav.js"></script>
  <script>
    AppUI.pageIn(document.getElementById("pageRoot") || document.querySelector(".wrap.page"));
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    const { pageIn } = AppUI;
    pageIn(document.getElementById("pageRoot"));

    const iconEl    = document.getElementById("icon");
    const titleEl   = document.getElementById("title");
    const msgEl     = document.getElementById("msg");
    const actionsEl = document.getElementById("actions");

    function showResult(ok, title, msg) {
      iconEl.textContent    = ok ? "✅" : "❌";
      titleEl.textContent   = title;
      msgEl.innerHTML       = msg;
      actionsEl.style.display = "flex";
    }

    async function run() {
      const token = new URLSearchParams(location.search).get("token");

      if (!token) {
        showResult(false, "缺少驗證 Token", "請由正確的驗證信件連結進入此頁面。");
        return;
      }

      try {
        const res  = await fetch("/api/confirmCampusVerification", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ token }),
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) { data = { error: raw || "驗證失敗" }; }

        if (!res.ok) throw new Error(data.error || `驗證失敗（${res.status}）`);

        showResult(true, "校園身分綁定成功",
          "之後每場活動都會自動依照你的綁定資料判斷報名資格。<br/>你可以前往「我的票券」查看報名記錄。"
        );
      } catch (e) {
        console.error(e);
        showResult(false, "驗證失敗", `錯誤訊息：${e.message || "未知錯誤"}<br/>請重新點擊驗證信中的連結，或洽貴校承辦單位。`);
      }
    }

    run();
  </script>
</body>
</html>
