<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜Dashboard 顯示設定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --btn-h:44px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:var(--btn-h);
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn-primary{ background:#111; color:#fff; border-color:#111; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:14px;
      background:#fff;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }

    .roleBox{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
      padding:16px;
    }
    .roleTitle{
      margin:0 0 10px;
      font-size:16px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .roleHint{ color:var(--muted); font-size:13px; line-height:1.6; margin-top:-2px; }

    .feat{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px dashed var(--line);
    }
    .feat:first-of-type{ border-top:none; }

    .featName{
      font-weight:900;
      font-size:14px;
      line-height:1.4;
    }
    .featNote{
      color:rgba(17,17,17,.55);
      font-size:12px;
      line-height:1.5;
      margin-top:6px;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      min-width:160px;
      padding-top:2px;
    }
    .check{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      background:#fff;
      user-select:none;
      white-space:nowrap;
    }
    .check input{ width:18px; height:18px; margin:0; }

    .mutedLine{
      height:1px; background:rgba(17,17,17,.08); margin:14px 0;
    }

    .pinnedHint{
      margin-top:10px;
      background:#f1f2f6;
      border:1px solid rgba(17,17,17,.12);
      border-radius:14px;
      padding:10px 12px;
      color:rgba(17,17,17,.78);
      font-size:13px;
      line-height:1.6;
    }
  
/* ── sidebar.css inlined ── */
#adminSidebar{
  width:220px;
  background:#fff;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  padding:16px;
  border-right:1px solid #eee;
}

#app{
  margin-left:220px;
}
</style>
</head>

<body>
  <div class="wrap">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <!-- Header -->
      <div class="card">
        <div class="row">
          <div>
            <h1>Dashboard 選單管理</h1>
            <div class="sub">
              在這裡決定「各身分」在 Dashboard 會看到哪些功能，以及哪些要置頂。<br/>
              （組織端只能在平台允許的範圍內做子集合，不能超過你設定的上限）
            </div>
            <div class="sub" style="margin-top:10px;">
              登入：<span id="email" class="mono">-</span>｜
              身分：<span id="role" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>

        <div class="pinnedHint">
          📌 <b>置頂</b>：會顯示在 Dashboard 最上方灰底區塊。<br/>
          置頂必須先勾選「顯示」才可設定。
        </div>
      </div>

      <!-- Actions -->
      <div class="card">
        <div class="row">
          <div>
            <span class="pill">選單顯示設定</span>
            <div class="sub" style="margin-top:8px;">
              勾選「顯示」＝該身分看的到；勾選「置頂」＝出現在最上方。
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn btn-primary" id="saveBtn">儲存設定</button>
          </div>
        </div>
      </div>

      <div class="grid" id="rolesGrid"></div>

      <div class="card">
        <div class="sub">
          儲存後會立刻生效；如果 Dashboard 有「勾選但看不到」，通常是該功能 id 沒被登錄到功能清單。
          這頁會把未登錄的也列出來，方便你查。
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    
    const db = window.db;

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const rolesGrid = document.getElementById("rolesGrid");
    const reloadBtn = document.getElementById("reloadBtn");
    const saveBtn = document.getElementById("saveBtn");

    const esc = AppUI.esc;


    window.doLogout = async () => {
      try { await firebase.auth().signOut(); }
      catch(e){ console.error(e); AppUI.toast("登出失敗（請看 Console）", "warn"); }
    };

    // ✅ 功能清單（要跟 dashboard.html 的 FEATURES 對齊）
    // 這裡只顯示大標題（你要的），不顯示小英文說明。
    const FEATURES = [
      { id:"admin-events",          title:"🎟️ 活動管理" },
      { id:"partner-schools",       title:"🏫 特約校園管理" },
      { id:"import-verify",         title:"📥 名單匯入 / 驗證設定" },
      { id:"member-lookup",         title:"🔎 會員查詢" },
      { id:"admin-orders",          title:"🧾 訂單 / 報名資料" },
      { id:"admin-user-assign",     title:"🧑‍💼 人事派發 / 審核" },
      { id:"admin-org-overview",    title:"🏢 全組織管理狀況" },
      { id:"org-team",              title:"👥 組織團隊 / 工作組別" },
      { id:"staff-scan",            title:"✅ 核銷人員掃碼" },
      { id:"service-checkin",       title:"🛠️ 服務中心查詢 / 核銷" },
      { id:"dash-settings",         title:"⚙️ Dashboard 顯示設定" },
      { id:"admin-impersonate",     title:"🧪 身分/學校測試切換" },
      { id:"request-access",        title:"📝 後台帳號申請" },
      { id:"invite-code",           title:"🔑 邀請碼輸入" }
    ];

    const FEATURE_MAP = new Map(FEATURES.map(x => [x.id, x]));

    const ROLES = [
      { id:"platform_super", name:"平台超級管理員" },
      { id:"platform_admin", name:"平台管理員" },
      { id:"org_super",      name:"組織超級管理員" },
      { id:"org_admin",      name:"組織管理員" },
      { id:"org_staff",      name:"組織服務人員" }
    ];

    const CFG_REF = db.collection("system").doc("dashboard");

    // state
    let cfg = null; // { roles: { roleId: { featureId: {visible,pinned} } } }

    function ensureCfgSkeleton(){
      if (!cfg) cfg = {};
      if (!cfg.roles) cfg.roles = {};
      ROLES.forEach(r => { if (!cfg.roles[r.id]) cfg.roles[r.id] = {}; });
    }

    function setRoleFeature(roleId, featureId, patch){
      ensureCfgSkeleton();
      if (!cfg.roles[roleId]) cfg.roles[roleId] = {};
      if (!cfg.roles[roleId][featureId]) cfg.roles[roleId][featureId] = { visible:false, pinned:false };
      cfg.roles[roleId][featureId] = { ...cfg.roles[roleId][featureId], ...patch };
    }

    function getRoleCfg(roleId){
      ensureCfgSkeleton();
      const r = cfg.roles[roleId];
      return (r && typeof r === "object") ? r : {};
    }

    function collectAllFeatureIds(){
      // ✅ 讓「未登錄功能」也出現在 UI（避免設定有但找不到）
      const ids = new Set(FEATURES.map(f => f.id));
      ensureCfgSkeleton();
      for (const [roleId, roleCfg] of Object.entries(cfg.roles || {})){
        if (!roleCfg || typeof roleCfg !== "object") continue;
        for (const fid of Object.keys(roleCfg)){
          ids.add(fid);
        }
      }
      return Array.from(ids);
    }

    function normalizeRoleCfg(){
      // ✅ 確保每個 role/feature 都有 visible/pinned
      ensureCfgSkeleton();
      const allIds = collectAllFeatureIds();
      ROLES.forEach(r => {
        allIds.forEach(fid => {
          const now = cfg.roles[r.id][fid] || {};
          cfg.roles[r.id][fid] = {
            visible: now.visible === true,
            pinned:  now.pinned === true
          };
          // pinned 必須 visible
          if (cfg.roles[r.id][fid].pinned === true && cfg.roles[r.id][fid].visible !== true) {
            cfg.roles[r.id][fid].pinned = false;
          }
        });
      });
    }

    function render(){
      rolesGrid.innerHTML = "";

      const allIds = collectAllFeatureIds();
      // 先用已登錄順序，最後再接未登錄
      const ordered = [
        ...FEATURES.map(f => f.id),
        ...allIds.filter(id => !FEATURE_MAP.has(id))
      ];

      ROLES.forEach(r => {
        const roleId = r.id;
        const roleCfg = getRoleCfg(roleId);

        const html = `
          <div class="roleBox" data-role="${esc(roleId)}">
            <div class="roleTitle">
              <span>${esc(r.name)} <span class="mono" style="font-size:12px; font-weight:900; color:rgba(17,17,17,.55);">${esc(roleId)}</span></span>
              <span class="pill">可置頂</span>
            </div>
            <div class="roleHint">
              勾選「顯示」＝該身分看的到；勾選「置頂」＝出現在 Dashboard 最上方灰底區。
            </div>

            <div style="margin-top:10px;">
              ${ordered.map(fid => {
                const meta = FEATURE_MAP.get(fid);
                const title = meta ? meta.title : "🧩 未登錄功能";
                const fc = roleCfg[fid] || {};
                const visible = fc.visible === true;
                const pinned = fc.pinned === true;

                return `
                  <div class="feat">
                    <div style="min-width:0;">
                      <div class="featName">${esc(title)}</div>
                      ${meta ? `` : `<div class="featNote mono">featureId：${esc(fid)}</div>`}
                    </div>

                    <div class="controls">
                      <label class="check">
                        <input type="checkbox"
                          data-kind="visible"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(fid)}"
                          ${visible ? "checked" : ""}>
                        顯示
                      </label>

                      <label class="check">
                        <input type="checkbox"
                          data-kind="pinned"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(fid)}"
                          ${pinned ? "checked" : ""} ${visible ? "" : "disabled"}>
                        置頂
                      </label>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;

        rolesGrid.insertAdjacentHTML("beforeend", html);
      });

      // bind
      rolesGrid.querySelectorAll("input[type=checkbox]").forEach(el => {
        el.addEventListener("change", () => {
          const kind = el.dataset.kind;
          const roleId = el.dataset.role;
          const fid = el.dataset.fid;
          const checked = !!el.checked;

          if (kind === "visible") {
            setRoleFeature(roleId, fid, { visible: checked });
            // visible 關掉 → pinned 一起關
            if (!checked) setRoleFeature(roleId, fid, { pinned: false });
            render();
            return;
          }

          if (kind === "pinned") {
            // pinned 只能在 visible=true 時成立
            const now = getRoleCfg(roleId)[fid] || {};
            if (now.visible !== true) {
              setRoleFeature(roleId, fid, { pinned: false });
              render();
              return;
            }
            setRoleFeature(roleId, fid, { pinned: checked });
          }
        });
      });
    }

    async function load(){
      const snap = await CFG_REF.get();
      cfg = snap.exists ? (snap.data() || {}) : { roles:{} };
      ensureCfgSkeleton();
      normalizeRoleCfg();
      render();
    }

    async function save(){
      saveBtn.disabled = true;
      const old = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";

      try{
        normalizeRoleCfg();

        await CFG_REF.set({
          roles: cfg.roles,
          updatedAt: new Date()
        }, { merge:true });

        AppUI.toast("已儲存", "ok");
      }catch(e){
        console.error(e);
        AppUI.toast("儲存失敗（可能是 Rules 權限不足）", "warn");
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = old;
      }
    }

    reloadBtn.onclick = load;
    saveBtn.onclick = save;

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        AppUI.showGate(gate, app, { title: "Dashboard 顯示設定", msg: "請先登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      try{
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists){
          AppUI.showGate(gate, app, { title: "等待授權", msg: "你的帳號尚未被系統授權為管理者。", showEmailLogin: false });
          return;
        }

        const u = snap.data() || {};
        if (u.enabled !== true){
          AppUI.showGate(gate, app, { title: "已停用", msg: "此帳號已被停用，請聯絡系統管理員。", showEmailLogin: false });
          return;
        }

        const currentRole = String(u.role || "").trim();
        document.getElementById("email").textContent = (u.email || user.email || "-");
        document.getElementById("role").textContent = currentRole || "-";

        // ✅ 只有 platform_super 可用
        if (currentRole !== "platform_super"){
          AppUI.showGate(gate, app, { title: "權限不足", msg: "此頁面僅限平台超級管理員使用。", showEmailLogin: false });
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }

        await load();

      }catch(err){
        console.error(err);
        AppUI.showGate(gate, app, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>
<script>
/* ── shared.js inlined ── */
(function () {
  "use strict";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  if (typeof firebase === "undefined") {
    console.error("shared.js 需要先載入 Firebase compat SDK");
    return;
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function norm(s) {
    return String(s ?? "").trim();
  }

  function tsToText(ts) {
    try {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString("zh-Hant", { hour12: false });
    } catch (e) {
      return "-";
    }
  }

  function pageIn(el) {
    if (!el) return;
    requestAnimationFrame(() => el.classList.add("on"));
  }

  function go(href, pageEl) {
    const root = pageEl || document.getElementById("pageRoot");
    if (root) root.classList.add("leaving");
    setTimeout(() => {
      location.href = href;
    }, 140);
  }

  function initPageLinks(pageEl) {
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href, pageEl);
    });
  }

  function toast(msg, type = "ok", duration = 3000) {
    let el = document.getElementById("_appToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "_appToast";
      el.style.cssText = [
        "position:fixed",
        "left:50%",
        "bottom:24px",
        "transform:translateX(-50%) translateY(10px)",
        "min-width:220px",
        "max-width:360px",
        "padding:12px 20px",
        "border-radius:999px",
        "box-shadow:0 10px 30px rgba(0,0,0,.15)",
        "font-size:14px",
        "font-weight:900",
        "text-align:center",
        "z-index:99999",
        "opacity:0",
        "pointer-events:none",
        "transition:opacity .2s ease, transform .2s ease"
      ].join(";");
      document.body.appendChild(el);
    }

    const theme = {
      ok: { bg: "#166534", color: "#fff" },
      warn: { bg: "#b91c1c", color: "#fff" },
      info: { bg: "#1d4ed8", color: "#fff" },
      neutral: { bg: "#111", color: "#fff" }
    }[type] || { bg: "#111", color: "#fff" };

    el.style.background = theme.bg;
    el.style.color = theme.color;
    el.textContent = msg;

    clearTimeout(el._timer);
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    });

    el._timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(10px)";
    }, duration);
  }

  function showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = true, extraBtns = "" } = {}) {
    if (!gateEl) return;
    if (appEl) appEl.style.display = "none";
    gateEl.style.display = "block";

    gateEl.innerHTML = `
      <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
      <div class="sub">${msg}</div>

      ${showEmailLogin ? `
        <div style="margin-top:16px; max-width:380px; display:grid; gap:10px;">
          <input id="_loginEmail" type="text" placeholder="帳號（Email）"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <input id="_loginPassword" type="password" placeholder="密碼"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <button class="btn btn-primary" id="_loginBtn" type="button">登入</button>
          <div id="_loginMsg" style="display:none; color:#b91c1c; font-size:13px;"></div>
        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
<script>
/* ── sidebar.js inlined ── */
(function () {
  "use strict";

  const NAV = [
    { e:"🏠", t:"總覽",           d:"系統狀態與提醒",         h:"dashboard.html" },
    { e:"🎟️", t:"活動管理",       d:"建立活動 / 票種",        h:"admin-events.html" },
    { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷",   h:"admin-event-orders.html" },
    { e:"🏫", t:"特約校園管理",     d:"校園設定 / 停用",        h:"partner-schools.html" },
    { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定",     h:"admin-studentslist-import.html" },
    { e:"🔎", t:"會員查詢",         d:"查詢帳號與驗證狀態",     h:"admin-member-lookup.html" },
    { e:"🧑‍💼", t:"後台帳號管理",   d:"建立、審核、派發",       h:"admin-staff-users.html" },
    { e:"🏢", t:"全組織管理",      d:"各校管理人員一覽",       h:"admin-org-overview.html" },
    { e:"👥", t:"組織團隊",        d:"管理員 / 服務員 / 組別", h:"org-team.html" },
    { e:"✅", t:"核銷掃碼",        d:"掃碼核銷指定活動",       h:"staff-checkin.html" },
    { e:"🛠️", t:"服務中心核銷",    d:"條碼槍查詢與核銷",       h:"admin-checkin-assist.html" },
    { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂",      h:"admin-dashboard-settings.html" },
    { e:"🧪", t:"身分測試切換",    d:"模擬其他帳號",            h:"admin-impersonate.html" },
    { e:"📝", t:"後台帳號申請",    d:"填寫申請",                h:"request-access.html" }
  ];

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[m]));

  const cur = location.pathname.split("/").pop() || "";

  function buildSidebar(role, email) {
    const nav = NAV.map((n) => `
      <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
        <div class="sb-item-icon">${n.e}</div>
        <div class="sb-item-text">
          <div class="sb-item-label">${esc(n.t)}</div>
          <div class="sb-item-desc">${esc(n.d)}</div>
        </div>
      </a>
    `).join("");

    const wrapper = document.createElement("aside");
    wrapper.id = "adminSidebar";
    wrapper.className = "sb-visible";
    wrapper.innerHTML = `
      <a class="sb-brand" href="dashboard.html">
        <div class="sb-brand-icon">🎤</div>
        <div>
          <div class="sb-brand-name">演唱會購票系統</div>
          <div class="sb-brand-sub">Admin Panel</div>
        </div>
      </a>

      <div class="sb-nav">
        ${nav}
      </div>

      <div class="sb-footer-info" id="sbFooterInfo">
        <div>${esc(email || "-")}</div>
        <div>角色：${esc(role || "-")}</div>
      </div>

      <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
    `;
    return wrapper;
  }

  function buildHamburger() {
    const btn = document.createElement("button");
    btn.id = "sbToggle";
    btn.type = "button";
    btn.setAttribute("aria-label", "開啟選單");
    btn.innerHTML = "☰";
    return btn;
  }

  function buildOverlay() {
    const overlay = document.createElement("div");
    overlay.id = "sbOverlay";
    return overlay;
  }

  function ensureLayout(role, email) {
    const app = document.getElementById("app");
    if (!app) return;

    if (document.getElementById("adminSidebar")) {
      updateSidebarInfo(email, role);
      return;
    }

    const appWrap = document.getElementById("appWrap");
    if (!appWrap) return;

    const sidebar = buildSidebar(role, email);
    const overlay = buildOverlay();
    const toggle = buildHamburger();

    app.insertBefore(toggle, app.firstChild);
    app.insertBefore(overlay, app.firstChild.nextSibling);
    app.insertBefore(sidebar, app.firstChild.nextSibling.nextSibling);

    document.body.classList.add("sidebar-layout");

    toggle.addEventListener("click", () => {
      sidebar.classList.toggle("sb-open");
      overlay.classList.toggle("sb-open");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("sb-open");
      overlay.classList.remove("sb-open");
    });

    const logoutBtn = document.getElementById("sbLogoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        try {
          if (typeof firebase !== "undefined" && firebase.auth) {
            await firebase.auth().signOut();
          }
        } catch (e) {
          console.error(e);
          alert("登出失敗");
        }
      });
    }

    updateSidebarInfo(email, role);
  }

  function updateSidebarInfo(email, role) {
    const footer = document.getElementById("sbFooterInfo");
    if (footer) {
      footer.innerHTML = `
        <div>${esc(email || "-")}</div>
        <div>角色：${esc(role || "-")}</div>
      `;
    }
  }

  window.SidebarShow = function (email, role) {
    document.body.classList.remove("gate-mode");
    document.body.classList.add("sidebar-layout");
    ensureLayout(role, email);

    const sidebar = document.getElementById("adminSidebar");
    if (sidebar) {
      sidebar.classList.add("sb-visible");
    }
  };

  window.SidebarHide = function () {
    const sidebar = document.getElementById("adminSidebar");
    const overlay = document.getElementById("sbOverlay");

    document.body.classList.remove("sidebar-layout");

    if (sidebar) {
      sidebar.classList.remove("sb-open");
    }

    if (overlay) {
      overlay.classList.remove("sb-open");
    }
  };
})();
</script>
</body>
