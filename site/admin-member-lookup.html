<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜會員查詢</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:48px 32px;
    }
    @media (max-width:640px){
      .wrap{ padding:28px 16px; }
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:22px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }
    .small{
      font-size:13px;
      color:var(--muted);
    }

    label{
      font-weight:900;
      display:block;
      margin-top:10px;
      margin-bottom:6px;
    }

    input[type="text"]{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      font-size:var(--btn-fs);
      cursor:pointer;
      color:#111;
      text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{
      box-shadow:0 10px 22px rgba(0,0,0,.08);
      transform:translateY(-1px);
    }
    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }
    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }
    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b) * 1.25);
      font-size:15px;
    }

    .form-actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      align-items:start;
    }
    @media (max-width:640px){
      .grid{ grid-template-columns:1fr; }
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .kv{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap:10px;
      padding:10px 0;
      border-top:1px solid var(--line);
    }
    .kv:first-child{ border-top:none; padding-top:0; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:#fff;
      font-size:13px;
      font-weight:900;
    }

    .ok{ color:#166534; font-weight:900; }
    .warn{ color:#b91c1c; font-weight:900; }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Gate -->
    <div id="loginGate" class="section"></div>

    <!-- App -->
    <div id="adminApp" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>會員查詢</h1>
            <div class="sub">用 Email 或 校園身分碼（verifyKey）查詢會員驗證狀態。</div>
          </div>

          <div style="text-align:right;">
            <div class="small" id="who"></div>
            <div style="margin-top:8px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
              <button class="btn btn-sm" id="logoutBtn">登出</button>
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label>Email（擇一填）</label>
            <input id="emailInput" type="text" placeholder="example@gmail.com" />

            <label style="margin-top:12px;">校園身分碼 verifyKey（擇一填）</label>
            <input id="keyInput" type="text" class="mono" placeholder="例如：112233｜A123456789" />

            <div class="form-actions">
              <button class="btn" id="clearBtn">清除</button>
              <button class="btn btn-primary" id="searchBtn">查詢</button>
            </div>

            <div class="small" style="margin-top:10px;">
              提醒：若 Firestore Rules 尚未放行平台端讀取 users，會查不到資料。
            </div>
          </div>

          <div>
            <label>快速提示</label>
            <div class="small" style="line-height:1.7;">
              1. Email 建議全小寫<br>
              2. verifyKey 要完全一致（包含分隔符號）<br>
              3. 查不到時，可能是尚未驗證或欄位未寫入<br>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>查詢結果</h2>
        <div id="resultBox" class="small" style="margin-top:10px;">尚未查詢</div>
      </div>
    </div>
  </div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    // ===== Firebase Init =====
    const db = window.db;

    // ===== DOM =====
    const loginGate = document.getElementById("loginGate");
    const adminApp  = document.getElementById("adminApp");
    const whoEl     = document.getElementById("who");

    const logoutBtn = document.getElementById("logoutBtn");
    const emailInput= document.getElementById("emailInput");
    const keyInput  = document.getElementById("keyInput");

    const clearBtn  = document.getElementById("clearBtn");
    const searchBtn = document.getElementById("searchBtn");

    const resultBox = document.getElementById("resultBox");

    // ===== Utils =====
    const norm = AppUI.norm;
    function lower(s){ return norm(s).toLowerCase(); }

    const escapeHtml = AppUI.esc;

    const doLogout = AppAuth.logout;
    logoutBtn.onclick = doLogout;

    function setResult(html){
      resultBox.innerHTML = html;
    }

    function renderUser(u){
      const email = norm(u.email);
      const verified = u.verified === true;
      const schoolName = norm(u.verifiedSchoolName);
      const schoolId = norm(u.verifiedSchoolId);
      const verifyKey = norm(u.verifyKey);
      const verifiedAt = u.verifiedAt ? u.verifiedAt.toDate?.() : null;

      const timeText = verifiedAt ? verifiedAt.toLocaleString() : "-";

      return `
        <div class="row" style="margin-bottom:10px;">
          <span class="pill">${verified ? `<span class="ok">已驗證</span>` : `<span class="warn">未驗證</span>`}</span>
        </div>

        <div class="kv">
          <div class="small">Email</div>
          <div><span class="mono">${escapeHtml(email || "-")}</span></div>
        </div>

        <div class="kv">
          <div class="small">學校</div>
          <div>${escapeHtml(schoolName || "-")}</div>
        </div>

        <div class="kv">
          <div class="small">schoolId</div>
          <div><span class="mono">${escapeHtml(schoolId || "-")}</span></div>
        </div>

        <div class="kv">
          <div class="small">verifyKey</div>
          <div><span class="mono">${escapeHtml(verifyKey || "-")}</span></div>
        </div>

        <div class="kv">
          <div class="small">驗證時間</div>
          <div>${escapeHtml(timeText)}</div>
        </div>
      `;
    }

    async function lookupByEmail(email){
      const q = await db.collection("users")
        .where("email", "==", email)
        .limit(5)
        .get();
      return q;
    }

    async function lookupByVerifyKey(verifyKey){
      const q = await db.collection("users")
        .where("verifyKey", "==", verifyKey)
        .limit(5)
        .get();
      return q;
    }

    async function doSearch(){
      const email = lower(emailInput.value);
      const verifyKey = norm(keyInput.value);

      if (!email && !verifyKey) {
        AppUI.toast("請輸入 Email 或 verifyKey 擇一", "warn");
        return;
      }
      if (email && verifyKey) {
        AppUI.toast("一次只查一個條件：Email 或 verifyKey（擇一）", "warn");
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "查詢中…";
      setResult(`<div class="small">查詢中…</div>`);

      try {
        const snap = email ? await lookupByEmail(email) : await lookupByVerifyKey(verifyKey);

        if (snap.empty) {
          setResult(`<div class="warn">查無資料</div><div class="small" style="margin-top:6px;">可能尚未驗證、或欄位未寫入。</div>`);
          return;
        }

        // 多筆時也顯示（避免 email 重複寫入造成混亂）
        const blocks = snap.docs.map((d) => {
          const u = d.data() || {};
          return `<div class="section" style="box-shadow:none; margin:12px 0 0; padding:14px;">${renderUser(u)}</div>`;
        });

        setResult(blocks.join(""));

      } catch (e) {
        console.error(e);
        setResult(
          `<div class="warn">查詢失敗</div>
           <div class="small" style="margin-top:6px;">
             code: <span class="mono">${escapeHtml(e.code || "(no code)")}</span><br>
             message: <span class="mono">${escapeHtml(e.message || String(e))}</span>
           </div>`
        );
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "查詢";
      }
    }

    clearBtn.onclick = () => {
      emailInput.value = "";
      keyInput.value = "";
      setResult("尚未查詢");
    };
    searchBtn.onclick = doSearch;

    // Enter 直接查
    emailInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });
    keyInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

    // ===== Auth Gate + Role Gate =====
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        whoEl.textContent = "";
        AppUI.showGate(loginGate, adminApp, { title: "會員查詢", msg: "請先登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      try {
        // 讀取使用者權限
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          AppUI.showGate(loginGate, adminApp, { title: "尚未授權", msg: "你的帳號尚未被授權為後台管理員。", showEmailLogin: false });
          return;
        }

        const u = userDoc.data() || {};
        if (u.enabled !== true) {
          AppUI.showGate(loginGate, adminApp, { title: "帳號已停用", msg: "此帳號已被停用，請聯絡系統管理員。", showEmailLogin: false });
          return;
        }

        // ✅ 只允許 platform_super / platform_admin
        const role = String(u.role || "").trim();
        if (!["platform_super", "platform_admin"].includes(role)) {
          AppUI.showGate(loginGate, adminApp, { title: "權限不足", msg: "你沒有權限使用會員查詢功能。", showEmailLogin: false });
          return;
        }

        whoEl.textContent = (user.email || "").toLowerCase();
        loginGate.style.display = "none";
        adminApp.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }
        setResult("尚未查詢");

      } catch (e) {
        console.error(e);
        AppUI.showGate(loginGate, adminApp, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
</html>
