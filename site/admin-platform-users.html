<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜平台帳號管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }
    .btn-sm{ height:40px; padding:8px 14px; font-size:15px; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:14px;
      background:#fff;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .warn{ color:#b91c1c; font-weight:900; }
    .ok{ color:#166534; font-weight:900; }

    input[type="text"], select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:12px;
    }
    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
      padding:14px;
    }
    .itemTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .title{
      font-weight:900;
      font-size:16px;
      margin:0;
      line-height:1.4;
    }
    .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .kvs{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    @media (max-width:720px){ .kvs{ grid-template-columns:1fr; } }

    .kv{
      border:1px dashed var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
    }
    .kv .k{ font-size:12px; color:var(--muted); font-weight:900; }
    .kv .v{ margin-top:4px; font-weight:900; font-size:14px; word-break:break-word; }

    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    details{
      margin-top:10px;
      border-top:1px dashed var(--line);
      padding-top:10px;
    }
    summary{
      cursor:pointer;
      font-weight:900;
      user-select:none;
    }
    pre{
      margin:10px 0 0;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      overflow:auto;
      font-size:12px;
      line-height:1.6;
    }

    /* 淡入轉場（跟你 dashboard 一致，不做花的） */
    .page{
      opacity:0;
      transform: translateY(6px);
      transition: opacity .22s ease, transform .22s ease;
    }
    .page.on{ opacity:1; transform: translateY(0); }
    .page.leaving{ opacity:0; transform: translateY(6px); }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">
    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>平台帳號管理</h1>
            <div class="sub">
              查看平台所有會員/成員：學校/不屬於學校、uid、姓名、帳號、註冊時間、驗證資訊等。<br/>
              登入：<span id="meEmail" class="mono">-</span>｜角色：<span id="meRole" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="pill">搜尋 / 篩選</div>
            <div class="sub" style="margin-top:8px;">
              資料來源：<span class="mono" id="sourceCol">-</span>（自動偵測）｜
              載入：<span class="mono" id="countTag">0</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn btn-sm" id="exportBtn">匯出 CSV</button>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 220px; gap:10px; margin-top:12px;">
          <input id="searchBox" type="text" placeholder="搜尋：email / uid / 姓名 / orgId / schoolId / verifyKey" />
          <select id="schoolFilter">
            <option value="">全部（含未歸屬學校）</option>
            <option value="__NONE__">只看：未歸屬學校</option>
          </select>
        </div>

        <div class="sub" style="margin-top:10px;" id="hint"></div>
      </div>

      <div class="card">
        <div class="pill">清單</div>
        <div id="list" class="list"></div>
        <div id="empty" class="sub" style="display:none; margin-top:10px;">
          <span class="warn">查無資料</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    // ===== Firebase init（沿用你專案）=====
    
    const db = window.db;

    // ===== page transition（淡入/淡出）=====
    const pageRoot = document.getElementById("pageRoot");
    // go() → AppUI.go()

    // ===== DOM =====
    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const meEmail = document.getElementById("meEmail");
    const meRole  = document.getElementById("meRole");
    const logoutBtn = document.getElementById("logoutBtn");

    const reloadBtn = document.getElementById("reloadBtn");
    const exportBtn = document.getElementById("exportBtn");
    const searchBox = document.getElementById("searchBox");
    const schoolFilter = document.getElementById("schoolFilter");

    const sourceCol = document.getElementById("sourceCol");
    const countTag  = document.getElementById("countTag");
    const hint      = document.getElementById("hint");
    const list      = document.getElementById("list");
    const empty     = document.getElementById("empty");

    // ===== helpers =====
    const esc = AppUI.esc;
    const norm = AppUI.norm;
    const tsToText = AppUI.tsToText;
    async function copyText(txt){
      try{
        await navigator.clipboard.writeText(String(txt||""));
        AppUI.toast("已複製", "ok");
      }catch{
        AppUI.toast("複製失敗（可能瀏覽器不支援）", "warn");
      }
    }

    const doLogout = AppAuth.logout;
    logoutBtn.onclick = doLogout;

    async function loadMyRole(uid){
      const doc = await db.collection("users").doc(uid).get();
      if (!doc.exists) return { ok:false, reason:"等待授權（users/{uid} 不存在）" };
      const u = doc.data() || {};
      if (u.enabled !== true) return { ok:false, reason:"帳號已停用" };
      const role = norm(u.role);
      return { ok:true, role, userData:u };
    }

    // ====== collection auto detect ======
    const CANDIDATE_COLLECTIONS = [
      "members",
      "platformUsers",
      "users_public",
      "users" // 最後才用（避免把後台帳號混進來）
    ];

    let ACTIVE_COL = "";
    let RAW = []; // all loaded
    let VIEW = []; // filtered

    async function tryCollection(colName){
      // 只要能成功讀到（就算 0 筆）也算可用
      // 但這裡用 limit(1) 先探測是否允許讀取
      const ref = db.collection(colName).limit(1);
      await ref.get();
      return true;
    }

    async function detectCollection(){
      for (const c of CANDIDATE_COLLECTIONS){
        try{
          await tryCollection(c);
          return c;
        }catch(e){
          // ignore and try next
        }
      }
      throw new Error("找不到可讀取的會員集合（Rules 不允許或集合不存在）");
    }

    function pick(d, keys){
      for (const k of keys){
        if (d && d[k] !== undefined && d[k] !== null && String(d[k]).trim() !== "") return d[k];
      }
      return "";
    }

    function normalizeMember(doc){
      const d = doc.data() || {};
      return {
        uid: doc.id,
        email: pick(d, ["email","accountEmail","mail"]),
        name:  pick(d, ["name","displayName","studentName","fullName"]),
        orgId: pick(d, ["orgId","organizationId","org"]),
        schoolId: pick(d, ["schoolId","school","campusId"]),
        verifyKey: pick(d, ["verifyKey","verify_code","verificationKey"]),
        verified: (d.verified === true) || (d.isVerified === true) || (d.verifyStatus === "verified"),
        createdAt: d.createdAt || d.created_time || d.created || null,
        updatedAt: d.updatedAt || d.updated_time || d.updated || null,
        raw: d
      };
    }

    async function loadAll(){
      list.innerHTML = "";
      empty.style.display = "none";
      hint.textContent = "載入中…";
      countTag.textContent = "0";
      sourceCol.textContent = "-";
      exportBtn.disabled = true;

      try{
        if (!ACTIVE_COL){
          ACTIVE_COL = await detectCollection();
        }
        sourceCol.textContent = ACTIVE_COL;

        // 先拉 300 筆（之後你要分頁我再幫你加）
        // 如果 collection 很大，這裡會需要分頁（你之後跟我說）
        const snap = await db.collection(ACTIVE_COL).orderBy("createdAt","desc").limit(300).get().catch(async () => {
          // 如果沒有 createdAt index/欄位，改成不排序
          return await db.collection(ACTIVE_COL).limit(300).get();
        });

        RAW = [];
        snap.forEach(doc => RAW.push(normalizeMember(doc)));

        // 建立 schoolId 下拉選單（動態補齊）
        const schools = Array.from(new Set(RAW.map(x => norm(x.schoolId)).filter(Boolean))).sort();
        const current = schoolFilter.value;
        schoolFilter.innerHTML = `
          <option value="">全部（含未歸屬學校）</option>
          <option value="__NONE__">只看：未歸屬學校</option>
          ${schools.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}
        `;
        if (schools.includes(current) || current === "" || current === "__NONE__") schoolFilter.value = current;

        applyFilter();
        hint.innerHTML = `已載入 <span class="mono">${RAW.length}</span> 筆（最多 300）。`;
        exportBtn.disabled = RAW.length === 0;

      }catch(e){
        console.error(e);
        hint.innerHTML = `<span class="warn">讀取失敗：</span><span class="mono">${esc(e.message || e)}</span>`;
        list.innerHTML = `
          <div class="item">
            <div class="title">⚠️ 無法讀取平台會員清單</div>
            <div class="meta">可能原因：Firestore Rules 不允許讀取、或集合名稱與你目前資料不一致。</div>
          </div>
        `;
      }
    }

    function matches(m, q){
      if (!q) return true;
      const t = q.toLowerCase();
      const hay = [
        m.uid, m.email, m.name, m.orgId, m.schoolId, m.verifyKey
      ].map(x => String(x || "").toLowerCase()).join(" | ");
      return hay.includes(t);
    }

    function applyFilter(){
      const q = norm(searchBox.value);
      const sf = schoolFilter.value;

      VIEW = RAW.filter(m => {
        if (!matches(m, q)) return false;

        if (sf === "__NONE__") return !norm(m.schoolId);
        if (sf) return norm(m.schoolId) === sf;

        return true;
      });

      countTag.textContent = String(VIEW.length);
      render();
    }

    function render(){
      list.innerHTML = "";
      empty.style.display = VIEW.length ? "none" : "block";

      VIEW.forEach(m => {
        const created = tsToText(m.createdAt);
        const updated = tsToText(m.updatedAt);

        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="itemTop">
            <div style="min-width:0;">
              <div class="title">👤 ${esc(m.name || "(未填姓名)")} <span class="mono" style="font-size:12px; color:rgba(17,17,17,.55);">${esc(m.uid)}</span></div>
              <div class="meta">
                Email：<span class="mono">${esc(m.email || "-")}</span><br/>
                註冊：<span class="mono">${esc(created)}</span>${updated !== "-" ? ` ｜ 更新：<span class="mono">${esc(updated)}</span>` : ``}
              </div>
            </div>
            <div class="pill">${m.verified ? "verified" : "unverified"}</div>
          </div>

          <div class="kvs">
            <div class="kv">
              <div class="k">歸屬</div>
              <div class="v">
                schoolId：<span class="mono">${esc(m.schoolId || "(無)")}</span><br/>
                orgId：<span class="mono">${esc(m.orgId || "(無)")}</span>
              </div>
            </div>
            <div class="kv">
              <div class="k">驗證</div>
              <div class="v">
                verifyKey：<span class="mono">${esc(m.verifyKey || "(無)")}</span><br/>
                verified：<span class="mono">${m.verified ? "true" : "false"}</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-sm" data-copy="uid">複製 UID</button>
            <button class="btn btn-sm" data-copy="email">複製 Email</button>
            <button class="btn btn-sm" data-copy="verifyKey">複製 verifyKey</button>
          </div>

          <details>
            <summary>查看完整資料（raw）</summary>
            <pre>${esc(JSON.stringify(m.raw || {}, null, 2))}</pre>
          </details>
        `;

        item.querySelectorAll("[data-copy]").forEach(btn => {
          btn.addEventListener("click", () => {
            const kind = btn.getAttribute("data-copy");
            if (kind === "uid") return copyText(m.uid);
            if (kind === "email") return copyText(m.email || "");
            if (kind === "verifyKey") return copyText(m.verifyKey || "");
          });
        });

        list.appendChild(item);
      });
    }

    function exportCSV(){
      if (!RAW.length) return;

      const rows = RAW.map(m => ({
        uid: m.uid || "",
        email: m.email || "",
        name: m.name || "",
        schoolId: m.schoolId || "",
        orgId: m.orgId || "",
        verifyKey: m.verifyKey || "",
        verified: m.verified ? "true" : "false",
        createdAt: tsToText(m.createdAt),
        updatedAt: tsToText(m.updatedAt)
      }));

      const headers = Object.keys(rows[0]);
      const escCSV = (v) => {
        const s = String(v ?? "");
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
        return s;
      };

      const csv = [
        headers.join(","),
        ...rows.map(r => headers.map(h => escCSV(r[h])).join(","))
      ].join("\n");

      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `platform-users_${ACTIVE_COL || "unknown"}_${Date.now()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    reloadBtn.onclick = () => loadAll();
    exportBtn.onclick = exportCSV;
    searchBox.addEventListener("input", applyFilter);
    schoolFilter.addEventListener("change", applyFilter);

    // ===== boot =====
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        AppUI.showGate(gate, app, { title: "平台帳號管理", msg: "請先登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      try{
        const r = await loadMyRole(user.uid);
        if (!r.ok){
          AppUI.showGate(gate, app, { title: "無法進入", msg: r.reason, showEmailLogin: false });
          return;
        }

        const role = r.role;
        meEmail.textContent = user.email || "-";
        meRole.textContent = role || "-";

        // 只有 platform_super / platform_admin
        if (!["platform_super","platform_admin"].includes(role)){
          AppUI.showGate(gate, app, { title: "權限不足", msg: "此頁僅限平台管理員使用。", showEmailLogin: false });
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }

        await loadAll();

      }catch(e){
        console.error(e);
        AppUI.showGate(gate, app, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
