<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>活動報名</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:#f6f7fb;
      color:#111;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
    }

    .card{
      background:#fff;
      border-radius:18px;
      padding:20px;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.05);
      margin-bottom:14px;
    }

    .title{
      font-size:24px;
      font-weight:900;
      line-height:1.35;
      margin:0;
    }

    .sub{
      margin-top:8px;
      font-size:14px;
      line-height:1.7;
      color:rgba(0,0,0,.65);
    }

    .meta{
      margin-top:12px;
      display:grid;
      gap:10px;
    }

    .meta-item{
      padding:12px 14px;
      border-radius:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      line-height:1.7;
      font-size:14px;
    }

    .label{
      font-weight:900;
      margin-right:6px;
    }

    .field{
      margin-top:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:900;
      margin-bottom:6px;
    }

    .field input,
    .field textarea{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.1);
      font-size:16px;
      outline:none;
      background:#fff;
      box-sizing:border-box;
    }

    .field textarea{
      min-height:110px;
      resize:vertical;
    }

    .small{
      margin-top:8px;
      font-size:13px;
      color:rgba(0,0,0,.6);
      line-height:1.6;
      white-space:pre-wrap;
    }

    .notice{
      border-radius:14px;
      padding:14px;
      font-size:14px;
      line-height:1.7;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
    }

    .notice.warn{
      background:#fff7f7;
      border-color:rgba(239,68,68,.2);
      color:#991b1b;
    }

    .notice.ok{
      background:#f6fff8;
      border-color:rgba(34,197,94,.2);
      color:#166534;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }

    .btn-primary{
      background:#111;
      border-color:#111;
      color:#fff;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .hidden{
      display:none !important;
    }

    .loading{
      font-size:14px;
      color:rgba(0,0,0,.55);
    }

    .pill-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      font-size:13px;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a id="backLink" class="back" href="events.html">← 返回活動</a>
    </div>

    <div id="loading" class="loading">載入中…</div>
    <div id="errorBox" class="notice warn hidden"></div>

    <div id="content" class="hidden">
      <div class="card">
        <h1 id="eventTitle" class="title">-</h1>
        <div class="sub" id="eventSub">-</div>

        <div class="pill-row">
          <div id="scopePill" class="pill">-</div>
          <div id="invitePill" class="pill">-</div>
        </div>

        <div class="meta">
          <div class="meta-item"><span class="label">活動地點：</span><span id="eventLocation">-</span></div>
          <div class="meta-item"><span class="label">活動時間：</span><span id="eventTime">-</span></div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0; font-size:18px;">登入狀態</h2>
        <div id="authInfo" class="small">尚未登入</div>

        <div class="field" id="loginFields">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="輸入 Email" autocomplete="username" />

          <label for="loginPassword" style="margin-top:12px;">密碼</label>
          <input id="loginPassword" type="password" placeholder="輸入密碼" autocomplete="current-password" />

          <div class="action-row">
            <button id="loginBtn" class="btn">登入</button>
            <button id="logoutBtn" class="btn hidden" type="button">登出</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0; font-size:18px;">報名資料</h2>

        <div class="field">
          <label for="studentName">姓名</label>
          <input id="studentName" type="text" placeholder="請輸入姓名" />
        </div>

        <div class="field">
          <label for="studentId">學號 / 身分識別</label>
          <input id="studentId" type="text" placeholder="請輸入學號或識別資料" />
        </div>

        <div class="field">
          <label for="phone">聯絡電話</label>
          <input id="phone" type="text" placeholder="請輸入聯絡電話" />
        </div>

        <div class="field">
          <label for="note">備註（選填）</label>
          <textarea id="note" placeholder="有需要補充的內容可以填在這裡"></textarea>
        </div>

        <div class="field">
          <label>邀請碼狀態</label>
          <div id="inviteInfo" class="small">-</div>
        </div>

        <div class="action-row">
          <button id="submitBtn" class="btn btn-primary" disabled>送出報名</button>
        </div>

        <div id="submitMsg" class="small"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    const db = window.db;
    const auth = firebase.auth();

    const loadingEl = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const contentEl = document.getElementById("content");

    const backLink = document.getElementById("backLink");
    const eventTitle = document.getElementById("eventTitle");
    const eventSub = document.getElementById("eventSub");
    const eventLocation = document.getElementById("eventLocation");
    const eventTime = document.getElementById("eventTime");
    const scopePill = document.getElementById("scopePill");
    const invitePill = document.getElementById("invitePill");

    const authInfo = document.getElementById("authInfo");
    const loginFields = document.getElementById("loginFields");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const studentName = document.getElementById("studentName");
    const studentId = document.getElementById("studentId");
    const phone = document.getElementById("phone");
    const note = document.getElementById("note");
    const inviteInfo = document.getElementById("inviteInfo");
    const submitBtn = document.getElementById("submitBtn");
    const submitMsg = document.getElementById("submitMsg");

    let currentEventId = "";
    let currentEvent = null;
    let currentInviteCode = "";
    let currentInviteVerified = false;
    let currentAuthUser = null;

    function esc(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function formatTime(ts){
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      if (isNaN(d.getTime())) return "-";
      return d.toLocaleString("zh-Hant", { hour12:false });
    }

    function formatRange(start, end){
      const a = formatTime(start);
      const b = formatTime(end);
      if (a === "-" && b === "-") return "-";
      return `${a} ～ ${b}`;
    }

    function showError(msg){
      loadingEl.classList.add("hidden");
      contentEl.classList.add("hidden");
      errorBox.classList.remove("hidden");
      errorBox.innerHTML = esc(msg);
    }

    function showContent(){
      loadingEl.classList.add("hidden");
      errorBox.classList.add("hidden");
      contentEl.classList.remove("hidden");
    }

    function updateInviteInfo(){
      if (!currentEvent) {
        inviteInfo.textContent = "活動資料尚未載入。";
        return;
      }

      if (currentEvent.inviteCodeEnabled !== true) {
        inviteInfo.textContent = "此活動不需要邀請碼。";
        return;
      }

      if (currentInviteVerified && currentInviteCode) {
        inviteInfo.textContent = `已通過邀請碼驗證：${currentInviteCode}`;
        return;
      }

      inviteInfo.textContent = "此活動需要邀請碼，但目前尚未驗證通過。請從活動詳情頁重新進入。";
    }

    function updateSubmitState(){
      const loggedIn = !!currentAuthUser;
      const hasName = String(studentName.value || "").trim().length > 0;
      const hasStudentId = String(studentId.value || "").trim().length > 0;
      const hasPhone = String(phone.value || "").trim().length > 0;
      const published = currentEvent && currentEvent.published === true;
      const approved = currentEvent && String(currentEvent.approvalStatus || "") === "approved";
      const inviteOk = currentEvent && currentEvent.inviteCodeEnabled === true
        ? currentInviteVerified
        : true;

      submitBtn.disabled = !(loggedIn && hasName && hasStudentId && hasPhone && published && approved && inviteOk);
    }

    async function loadEvent(){
      currentEventId = qs("eventId");
      currentInviteCode = String(qs("inviteCode") || "").trim().toUpperCase();
      currentInviteVerified = qs("inviteVerified") === "true";

      if (!currentEventId) {
        showError("缺少 eventId。");
        return false;
      }

      backLink.href = `event.html?id=${encodeURIComponent(currentEventId)}`;

      try {
        const doc = await db.collection("events").doc(currentEventId).get();

        if (!doc.exists) {
          showError("找不到這個活動。");
          return false;
        }

        const e = doc.data() || {};
        currentEvent = e;

        const published = e.published === true;
        const approved = String(e.approvalStatus || "") === "approved";

        if (!published || !approved) {
          showError("此活動目前尚未開放報名。");
          return false;
        }

        eventTitle.textContent = e.title || "未命名活動";
        eventSub.textContent = e.description || "請確認活動資料後再送出報名。";
        eventLocation.textContent = e.location || "-";
        eventTime.textContent = formatRange(e.eventStartAt, e.eventEndAt);
        scopePill.textContent = String(e.ownerSchoolId || "") === "__global__" ? "平台活動" : "校園活動";
        invitePill.textContent = e.inviteCodeEnabled === true ? "需要邀請碼" : "不用邀請碼";

        updateInviteInfo();
        showContent();
        updateSubmitState();
        return true;
      } catch (err) {
        console.error(err);
        showError("讀取活動失敗，請稍後再試。");
        return false;
      }
    }

    async function doLogin(){
      const email = String(loginEmail.value || "").trim();
      const password = String(loginPassword.value || "");

      if (!email) {
        authInfo.textContent = "請輸入 Email。";
        return;
      }

      if (!password) {
        authInfo.textContent = "請輸入密碼。";
        return;
      }

      loginBtn.disabled = true;
      authInfo.textContent = "登入中…";

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (err) {
        console.error(err);
        authInfo.textContent = "登入失敗：" + (err.message || err);
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function doLogout(){
      try {
        await auth.signOut();
      } catch (err) {
        console.error(err);
        authInfo.textContent = "登出失敗：" + (err.message || err);
      }
    }

    async function submitRegistration(){
      if (!currentAuthUser || !currentEventId || !currentEvent) return;

      const name = String(studentName.value || "").trim();
      const sid = String(studentId.value || "").trim();
      const phoneVal = String(phone.value || "").trim();
      const noteVal = String(note.value || "").trim();

      if (!name || !sid || !phoneVal) {
        submitMsg.textContent = "請先完整填寫資料。";
        submitMsg.style.color = "#991b1b";
        return;
      }

      if (currentEvent.inviteCodeEnabled === true && !currentInviteVerified) {
        submitMsg.textContent = "此活動需要邀請碼驗證。";
        submitMsg.style.color = "#991b1b";
        return;
      }

      submitBtn.disabled = true;
      submitMsg.textContent = "送出中…";
      submitMsg.style.color = "";

      try {
        const regId = `${currentEventId}_${currentAuthUser.uid}`;

        const exists = await db.collection("eventRegistrations").doc(regId).get();
        if (exists.exists) {
          submitMsg.textContent = "你已經報名過這個活動了。";
          submitMsg.style.color = "#991b1b";
          updateSubmitState();
          return;
        }

        await db.collection("eventRegistrations").doc(regId).set({
          registrationId: regId,
          eventId: currentEventId,
          eventTitle: currentEvent.title || "",
          uid: currentAuthUser.uid,
          email: currentAuthUser.email || "",
          name,
          studentId: sid,
          phone: phoneVal,
          note: noteVal,
          inviteCode: currentInviteCode || "",
          inviteVerified: currentInviteVerified === true,
          status: "registered",
          createdAt: new Date(),
          updatedAt: new Date()
        });

        submitMsg.textContent = "報名成功。";
        submitMsg.style.color = "#166534";
      } catch (err) {
        console.error(err);
        submitMsg.textContent = "送出失敗：" + (err.message || err);
        submitMsg.style.color = "#991b1b";
      } finally {
        updateSubmitState();
      }
    }

    loginBtn.addEventListener("click", doLogin);
    logoutBtn.addEventListener("click", doLogout);
    loginPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    [studentName, studentId, phone].forEach(el => {
      el.addEventListener("input", updateSubmitState);
    });

    submitBtn.addEventListener("click", submitRegistration);

    auth.onAuthStateChanged((user) => {
      currentAuthUser = user || null;

      if (currentAuthUser) {
        authInfo.textContent = `目前登入：${currentAuthUser.email || currentAuthUser.uid}`;
        logoutBtn.classList.remove("hidden");
      } else {
        authInfo.textContent = "尚未登入，請先登入後再報名。";
        logoutBtn.classList.add("hidden");
      }

      updateSubmitState();
    });

    loadEvent();
  </script>
</body>
</html>
