<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>活動入場｜Check-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    .wrap { max-width: 720px; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .stat-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
    }
    .stat-num  { font-size: 28px; font-weight: 900; line-height: 1.1; }
    .stat-label{ font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Log */
    .log-list { display: grid; gap: 8px; margin-top: 12px; }
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
      animation: slideIn .18s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .log-item.ok   { border-color: #86efac; background: #f0fdf4; }
    .log-item.warn { border-color: #fca5a5; background: #fff5f5; }
    .log-icon  { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .log-body  { flex: 1; }
    .log-title { font-weight: 900; }
    .log-detail{ color: var(--muted); font-size: 12px; margin-top: 2px; word-break: break-all; }
    .log-time  { font-size: 11px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }

    /* Code input */
    .code-input-wrap {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: stretch;
    }
    .code-input-wrap input {
      flex: 1;
      font-size: 18px;
      font-family: ui-monospace, monospace;
      font-weight: 900;
      border-radius: 14px;
    }

    /* Live badge */
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:.3; }
    }
  
/* ── shared.css inlined ── */
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }


/* ── topnav.css inlined ── */
/* topnav.css — 前台頂部導覽列 */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: #f5f7fb; }

#frontNav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.07);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.fn-brand {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: #111;
  font-size: 14px; font-weight: 900;
  flex-shrink: 0;
}
.fn-brand-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.fn-links {
  display: flex; align-items: center; gap: 2px;
  flex: 1; overflow: hidden;
}
.fn-link {
  padding: 6px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  text-decoration: none; color: #555;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.fn-link:hover { background: #f0f4ff; color: #3b82f6; }
.fn-link.fn-active { background: #eff6ff; color: #2563eb; font-weight: 800; }
.fn-user {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto; flex-shrink: 0;
}
.fn-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900;
}
.fn-email { font-size: 12px; color: #666; }
.fn-logout {
  padding: 5px 12px; border-radius: 8px;
  background: #f5f5f5; border: none;
  font-size: 12px; font-weight: 700; color: #555;
  cursor: pointer; transition: background .12s;
}
.fn-logout:hover { background: #ffe4e4; color: #b91c1c; }

/* 讓 .wrap 不再有很大的 margin-top */
body > .wrap, #frontWrap > .wrap {
  padding-top: 20px !important;
}
@media (max-width: 640px) {
  #frontNav { padding: 0 14px; }
  .fn-links { display: none; }
}

</style>
</head>
<body>
  <div class="wrap page" id="pageRoot">

    <!-- 頁首 -->
    <div class="card">
      <div class="row">
        <div>
          <h1 id="eventName">讀取中…</h1>
          <div class="sub">
            <span class="live-dot"></span>即時模式
            ｜活動 ID：<span id="eventId" class="mono">-</span>
          </div>
          <div class="small" id="who" style="margin-top:4px;"></div>
        </div>
        <div class="actions">
          <a class="btn btn-sm" href="dashboard.html">主選單</a>
        </div>
      </div>

      <!-- 輸入區 -->
      <div class="code-input-wrap">
        <input
          id="code"
          type="text"
          placeholder="掃描或輸入訂單 / 票碼"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="btn btn-primary" id="checkinBtn">入場 ✓</button>
      </div>
    </div>

    <!-- 統計 -->
    <div class="card">
      <div class="row row-center">
        <h2>入場統計</h2>
        <button class="btn btn-sm" id="reloadBtn">重新整理</button>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-box"><div class="stat-num" id="sTotal">-</div><div class="stat-label">總票數</div></div>
        <div class="stat-box"><div class="stat-num ok" id="sChecked">-</div><div class="stat-label">已入場</div></div>
        <div class="stat-box"><div class="stat-num" id="sRemain">-</div><div class="stat-label">未入場</div></div>
        <div class="stat-box"><div class="stat-num warn" id="sVoided">-</div><div class="stat-label">作廢</div></div>
      </div>
    </div>

    <!-- 記錄 -->
    <div class="card">
      <div class="row row-center" style="margin-bottom:8px;">
        <h2>本次記錄</h2>
        <button class="btn btn-sm" id="clearLogBtn">清除記錄</button>
      </div>
      <div id="logList" class="log-list">
        <div class="small" style="color:var(--muted); padding:8px 0;">等待掃描…</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script>
    const db = window.db;
    const { esc, norm, pageIn, initPageLinks } = AppUI;

    const pageRoot   = document.getElementById("pageRoot");
    const eventNameEl= document.getElementById("eventName");
    const eventIdEl  = document.getElementById("eventId");
    const whoEl      = document.getElementById("who");
    const codeEl     = document.getElementById("code");
    const checkinBtn = document.getElementById("checkinBtn");
    const reloadBtn  = document.getElementById("reloadBtn");
    const clearLogBtn= document.getElementById("clearLogBtn");
    const logListEl  = document.getElementById("logList");

    pageIn(pageRoot);
    initPageLinks(pageRoot);

    const sp      = new URLSearchParams(location.search);
    const eventId = norm(sp.get("eventId") || "");
    eventIdEl.textContent = eventId || "(未指定)";

    let unsubStats = null;

    // ── 即時統計（onSnapshot） ──
    function startStatsListener() {
      if (!eventId) return;
      if (unsubStats) unsubStats();

      unsubStats = db.collection("events").doc(eventId).collection("orders")
        .onSnapshot(snap => {
          let total = 0, checked = 0, voided = 0;
          snap.forEach(d => {
            total++;
            const o = d.data() || {};
            if (o.checkedIn === true) checked++;
            if (o.voided    === true) voided++;
          });
          const remain = total - checked - voided;
          document.getElementById("sTotal").textContent   = total;
          document.getElementById("sChecked").textContent = checked;
          document.getElementById("sRemain").textContent  = Math.max(0, remain);
          document.getElementById("sVoided").textContent  = voided;
        }, err => {
          // Fallback: try tickets collectionGroup
          console.warn("orders snapshot 失敗，改用 tickets：", err);
          loadStatsFallback();
        });
    }

    async function loadStatsFallback() {
      try {
        const snap = await db.collection("tickets")
          .where("eventId", "==", eventId).get();
        let total = 0, checked = 0, voided = 0;
        snap.forEach(d => {
          total++;
          const t = d.data() || {};
          const st = norm(t.status || "issued");
          if (st === "checked_in") checked++;
          if (st === "void") voided++;
        });
        document.getElementById("sTotal").textContent   = total;
        document.getElementById("sChecked").textContent = checked;
        document.getElementById("sRemain").textContent  = Math.max(0, total - checked - voided);
        document.getElementById("sVoided").textContent  = voided;
      } catch (e) {
        console.error(e);
      }
    }

    // ── Log ──
    let logCount = 0;
    function pushLog(type, title, detail) {
      if (logCount === 0) logListEl.innerHTML = "";
      logCount++;

      const now = new Date().toLocaleTimeString("zh-Hant", { hour12: false });
      const icon = type === "ok" ? "✅" : type === "warn" ? "⚠️" : "ℹ️";
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = `
        <div class="log-icon">${icon}</div>
        <div class="log-body">
          <div class="log-title">${esc(title)}</div>
          ${detail ? `<div class="log-detail">${esc(detail)}</div>` : ""}
        </div>
        <div class="log-time">${now}</div>
      `;
      logListEl.insertBefore(item, logListEl.firstChild);

      // Keep last 50
      while (logListEl.children.length > 50) {
        logListEl.removeChild(logListEl.lastChild);
      }
    }

    clearLogBtn.onclick = () => {
      logCount = 0;
      logListEl.innerHTML = `<div class="small" style="color:var(--muted); padding:8px 0;">等待掃描…</div>`;
    };

    // ── 入場 ──
    async function doCheckin() {
      const raw  = norm(codeEl.value);
      const code = raw;
      if (!code) return;
      if (!eventId) { AppUI.toast("缺少 eventId，請由正確連結進入", "warn"); return; }

      checkinBtn.disabled = true;
      const oldText = checkinBtn.textContent;
      checkinBtn.textContent = "處理中…";

      try {
        // Try orders first (by order ID)
        const orderRef = db.collection("events").doc(eventId).collection("orders").doc(code);
        const orderSnap = await orderRef.get();

        if (orderSnap.exists) {
          const o = orderSnap.data() || {};
          if (o.checkedIn === true) {
            const atStr = o.checkedInAt
              ? (o.checkedInAt.toDate ? o.checkedInAt.toDate() : new Date(o.checkedInAt))
                  .toLocaleString("zh-Hant", { hour12: false })
              : "未知時間";
            pushLog("warn", "重複入場", `訂單 ${code}｜已於 ${atStr} 入場`);
            AppUI.toast("⚠️ 此票已入場", "warn");
            codeEl.value = "";
            return;
          }
          await orderRef.update({
            checkedIn:      true,
            checkedInAt:    new Date(),
            checkedInBy:    firebase.auth().currentUser?.uid   || "",
            checkedInEmail: firebase.auth().currentUser?.email || "",
          });
          pushLog("ok", "入場成功", `訂單 ${code}｜${esc(o.email || "")}`);
          AppUI.toast("✅ 入場成功", "ok");
          codeEl.value = "";
          codeEl.focus();
          return;
        }

        // Fallback: try tickets collection
        const ticketRef  = db.collection("tickets").doc(code);
        const ticketSnap = await ticketRef.get();

        if (!ticketSnap.exists) {
          pushLog("warn", "找不到票", code);
          AppUI.toast("找不到此訂單/票碼", "warn");
          return;
        }

        const t = ticketSnap.data() || {};
        if (norm(t.eventId) !== eventId) {
          pushLog("warn", "活動不符", `此票屬於 ${t.eventId}`);
          AppUI.toast("活動不符：此票不屬於本活動", "warn");
          return;
        }
        if (norm(t.status || "issued") === "checked_in") {
          pushLog("warn", "重複入場", code);
          AppUI.toast("⚠️ 此票已入場", "warn");
          codeEl.value = "";
          return;
        }
        await ticketRef.update({
          status:      "checked_in",
          checkedInAt: new Date(),
          checkedInBy: firebase.auth().currentUser?.email || "",
        });
        pushLog("ok", "入場成功（票券）", code);
        AppUI.toast("✅ 入場成功", "ok");
        codeEl.value = "";
        codeEl.focus();

      } catch (e) {
        console.error(e);
        pushLog("error", "入場失敗", e.message || String(e));
        AppUI.toast("入場失敗：" + (e.message || e), "warn");
      } finally {
        checkinBtn.disabled   = false;
        checkinBtn.textContent = oldText;
      }
    }

    checkinBtn.onclick = doCheckin;
    codeEl.addEventListener("keydown", e => {
      if (e.key === "Enter") doCheckin();
    });
    reloadBtn.onclick = loadStatsFallback;

    // ── 載入活動資訊 ──
    async function loadEvent() {
      if (!eventId) {
        eventNameEl.textContent = "未指定活動";
        return;
      }
      try {
        const snap = await db.collection("events").doc(eventId).get();
        if (!snap.exists) { eventNameEl.textContent = "活動不存在"; return; }
        const d = snap.data() || {};
        eventNameEl.textContent = norm(d.title || d.name || "(未命名活動)");
      } catch (e) {
        eventNameEl.textContent = eventId;
      }
    }

    // ── Auth ──
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) { location.href = "dashboard.html"; return; }
      whoEl.textContent = user.email || "";
      await loadEvent();
      startStatsListener();
      codeEl.focus();
    });
  </script>
<script>
/* ── shared.js inlined ── */
(function () {
  "use strict";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  if (typeof firebase === "undefined") {
    console.error("shared.js 需要先載入 Firebase compat SDK");
    return;
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function norm(s) {
    return String(s ?? "").trim();
  }

  function tsToText(ts) {
    try {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString("zh-Hant", { hour12: false });
    } catch (e) {
      return "-";
    }
  }

  function pageIn(el) {
    if (!el) return;
    requestAnimationFrame(() => el.classList.add("on"));
  }

  function go(href, pageEl) {
    const root = pageEl || document.getElementById("pageRoot");
    if (root) root.classList.add("leaving");
    setTimeout(() => {
      location.href = href;
    }, 140);
  }

  function initPageLinks(pageEl) {
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href, pageEl);
    });
  }

  function toast(msg, type = "ok", duration = 3000) {
    let el = document.getElementById("_appToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "_appToast";
      el.style.cssText = [
        "position:fixed",
        "left:50%",
        "bottom:24px",
        "transform:translateX(-50%) translateY(10px)",
        "min-width:220px",
        "max-width:360px",
        "padding:12px 20px",
        "border-radius:999px",
        "box-shadow:0 10px 30px rgba(0,0,0,.15)",
        "font-size:14px",
        "font-weight:900",
        "text-align:center",
        "z-index:99999",
        "opacity:0",
        "pointer-events:none",
        "transition:opacity .2s ease, transform .2s ease"
      ].join(";");
      document.body.appendChild(el);
    }

    const theme = {
      ok: { bg: "#166534", color: "#fff" },
      warn: { bg: "#b91c1c", color: "#fff" },
      info: { bg: "#1d4ed8", color: "#fff" },
      neutral: { bg: "#111", color: "#fff" }
    }[type] || { bg: "#111", color: "#fff" };

    el.style.background = theme.bg;
    el.style.color = theme.color;
    el.textContent = msg;

    clearTimeout(el._timer);
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    });

    el._timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(10px)";
    }, duration);
  }

  function showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = true, extraBtns = "" } = {}) {
    if (!gateEl) return;
    if (appEl) appEl.style.display = "none";
    gateEl.style.display = "block";

    gateEl.innerHTML = `
      <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
      <div class="sub">${msg}</div>

      ${showEmailLogin ? `
        <div style="margin-top:16px; max-width:380px; display:grid; gap:10px;">
          <input id="_loginEmail" type="text" placeholder="帳號（Email）"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <input id="_loginPassword" type="password" placeholder="密碼"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <button class="btn btn-primary" id="_loginBtn" type="button">登入</button>
          <div id="_loginMsg" style="display:none; color:#b91c1c; font-size:13px;"></div>
        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
<script>
/* ── topnav.js inlined ── */
/**
 * topnav.js — 前台頂部導覽列
 * 自動注入，不改變頁面結構
 */
(function() {
  const LINKS = [
    { t: "首頁",     h: "index.html" },
    { t: "活動報名", h: "event-register.html" },
    { t: "我的票券", h: "member.html" },
    { t: "邀請碼",   h: "guest.html" },
  ];
  const cur = location.pathname.split("/").pop() || "index.html";
  const esc = s => String(s??"").replace(/[&<>"']/g,
    m=>({  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));

  function inject() {
    if (document.getElementById("frontNav")) return;

    const nav = document.createElement("nav");
    nav.id = "frontNav";
    nav.innerHTML = `
      <a class="fn-brand" href="index.html">
        <div class="fn-brand-icon">🎤</div>
        校園演唱會
      </a>
      <div class="fn-links">
        ${LINKS.map(l=>`
          <a class="fn-link${cur===l.h?" fn-active":""}" href="${esc(l.h)}">${esc(l.t)}</a>
        `).join("")}
      </div>
      <div class="fn-user" id="fnUser">
        <button class="fn-logout" id="fnLogin">登入</button>
      </div>`;

    document.body.insertBefore(nav, document.body.firstChild);

    // Auth 監聽
    if (typeof firebase !== "undefined") {
      firebase.auth().onAuthStateChanged(user => {
        const userEl = document.getElementById("fnUser");
        if (!userEl) return;
        if (user) {
          userEl.innerHTML = `
            <div class="fn-avatar">${(user.email||"?")[0].toUpperCase()}</div>
            <span class="fn-email">${esc(user.email||"")}</span>
            <button class="fn-logout" onclick="firebase.auth().signOut()">登出</button>`;
        } else {
          userEl.innerHTML = `<button class="fn-logout" id="fnLogin" onclick="location.href='member.html'">登入</button>`;
        }
      });
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", inject);
  } else {
    inject();
  }
})();

</script>
