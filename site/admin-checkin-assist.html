<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜服務中心查詢與人工核銷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 16px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:22px;
    }
    .header{
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:12px; margin-bottom:12px;
    }
    h1{ margin:0; font-size:22px; letter-spacing:.2px; }
    h2{ margin:0; font-size:16px; font-weight:900; }
    .sub{ margin-top:6px; color:var(--muted); line-height:1.6; font-size:14px; }
    .small{ font-size:13px; color:var(--muted); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      height:var(--btn-h); padding:var(--btn-a) var(--btn-x);
      border-radius:999px; border:1px solid var(--line);
      background:#fff; color:#111; font-weight:900; font-size:var(--btn-fs);
      cursor:pointer; text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform:translateY(-1px); }
    .btn:active{ transform:translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

    .btn-primary{ background:#111; color:#fff; border-color:#111; }
    .btn-sm{ height:40px; padding:8px calc(var(--btn-b) * 1.25); font-size:15px; }

    label{ font-weight:900; display:block; margin:12px 0 6px; }
    input[type="text"], select{
      width:100%; padding:12px; border-radius:14px;
      border:1px solid var(--line); background:#fff; font-size:16px;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .grid{ display:grid; grid-template-columns: 1.1fr .9fr; gap:12px; }
    @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }

    .box{
      border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff;
    }

    .ok{ color:#166534; font-weight:900; }
    .warn{ color:#b91c1c; font-weight:900; }
    .pill{
      display:inline-flex; padding:6px 10px;
      border:1px solid var(--line); border-radius:999px; font-size:13px; background:#fff;
    }

    .list{ display:grid; gap:12px; margin-top:12px; }
    .item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }
    .itemTop{
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
    }
    .meta{ margin-top:6px; color:var(--muted); font-size:13px; line-height:1.6; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="section" id="gate"></div>

    <div id="app" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>服務中心｜查詢與人工核銷</h1>
            <div class="sub">使用條碼槍掃描票券代碼查詢，並可由管理員人工核銷。</div>
            <div class="sub small">登入：<span id="who" class="mono">-</span>｜角色：<span id="roleText" class="mono">-</span></div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button class="btn btn-sm" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="grid">
          <div>
            <h2>查詢</h2>
            <div class="sub">
              服務中心建議用 <span class="pill">ticketId</span>（條碼槍掃描結果）。也支援 orderId / email / uid。
            </div>

            <label>查詢類型</label>
            <select id="mode">
              <option value="ticketId">ticketId（條碼槍掃描結果）</option>
              <option value="orderId">orderId</option>
              <option value="email">email（orders.buyerEmail）</option>
              <option value="uid">uid（orders.buyerUid）</option>
            </select>

            <label>查詢內容（條碼槍掃描到這裡）</label>
            <input id="q" type="text" class="mono" placeholder="請用條碼槍掃描，或貼上代碼" autocomplete="off" />

            <div class="row" style="margin-top:12px; justify-content:flex-end;">
              <button class="btn" id="clearBtn">清除</button>
              <button class="btn btn-primary" id="searchBtn">開始查詢</button>
            </div>

            <div id="hint" class="small" style="margin-top:10px;"></div>
          </div>

          <div>
            <h2>掃不到怎麼辦？</h2>
            <div class="box">
              <div class="sub" style="margin-top:0;">
                若條碼掃不過或查無資料：
              </div>
              <div class="small" style="line-height:1.8; margin-top:8px;">
                1. 請確認條碼是否清晰、亮度是否足夠。<br>
                2. 仍無法辨識：請至服務中心由管理員協助查詢。<br>
                3. 管理員可用 orderId / email / uid 進一步查詢。
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>查詢結果</h2>
        <div id="result" class="sub" style="margin-top:8px;"></div>
        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    const db = window.db;

    // DOM
    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const whoEl = document.getElementById("who");
    const roleText = document.getElementById("roleText");
    const logoutBtn = document.getElementById("logoutBtn");

    const modeEl = document.getElementById("mode");
    const qEl = document.getElementById("q");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");

    const hintEl = document.getElementById("hint");
    const resultEl = document.getElementById("result");
    const listEl = document.getElementById("list");

    const esc = AppUI.esc;
    const norm = AppUI.norm;

    const doLogout = AppAuth.logout;

    async function getTicketsByOrderRef(orderRef){
      const tSnap = await orderRef.collection("tickets").get();
      return tSnap.docs.map(d => ({ ref:d.ref, id:d.id, data:d.data() || {}, orderRef }));
    }

    function renderTicketCard(t){
      const d = t.data || {};
      const ticketId = t.id;
      const eventId = String(d.eventId || "").trim();
      const checkedIn = d.checkedIn === true;

      const checkedAt = d.checkedInAt ? String(d.checkedInAt.toDate ? d.checkedInAt.toDate() : d.checkedInAt) : "-";
      const checkedBy = String(d.checkedInByEmail || d.checkedInBy || "-");

      const orderPath = t.orderRef?.path || "(unknown)";
      const ticketPath = t.ref?.path || "(unknown)";

      return `
        <div class="item">
          <div class="itemTop">
            <div style="min-width:0;">
              <div style="font-weight:900;">票券：<span class="mono">${esc(ticketId)}</span></div>
              <div class="meta">
                eventId：<span class="mono">${esc(eventId || "-")}</span><br>
                狀態：${checkedIn ? `<span class="warn">已核銷</span>` : `<span class="ok">未核銷</span>`}<br>
                核銷時間：<span class="mono">${esc(checkedAt)}</span><br>
                核銷人：<span class="mono">${esc(checkedBy)}</span><br>
                order：<span class="mono">${esc(orderPath)}</span>
              </div>
            </div>

            <div class="row" style="justify-content:flex-end;">
              <button class="btn btn-sm btn-primary" onclick="checkInTicket('${esc(ticketPath)}')" ${checkedIn ? "disabled" : ""}>
                核銷入場
              </button>
            </div>
          </div>
        </div>
      `;
    }

    window.checkInTicket = async (ticketPath) => {
      if (!ticketPath) return;

      if (!confirm("確定要核銷此票券入場嗎？")) return;

      try{
        const ref = db.doc(ticketPath);
        const snap = await ref.get();

        if (!snap.exists){
          AppUI.toast("票券不存在或已被刪除", "warn");
          return;
        }

        const d = snap.data() || {};
        if (d.checkedIn === true){
          AppUI.toast("此票券已核銷", "warn");
          return;
        }

        await ref.update({
          checkedIn: true,
          checkedInAt: new Date(),
          checkedInBy: firebase.auth().currentUser?.uid || "",
          checkedInByEmail: firebase.auth().currentUser?.email || ""
        });

        AppUI.toast("✅ 核銷成功", "ok");
        await runSearch();
      }catch(e){
        console.error(e);
        AppUI.toast("核銷失敗：" + (e.message || e), "warn");
      }
    };

    async function searchByTicketId(ticketId){
      const q = await db
        .collectionGroup("tickets")
        .where(firebase.firestore.FieldPath.documentId(), "==", ticketId)
        .limit(10)
        .get();

      if (q.empty) return [];

      return q.docs.map(doc => {
        const orderRef = doc.ref.parent?.parent || null;
        return { ref:doc.ref, id:doc.id, data:doc.data() || {}, orderRef };
      });
    }

    async function searchByOrderId(orderId){
      const ref = db.collection("orders").doc(orderId);
      const snap = await ref.get();
      if (!snap.exists) return [];
      return await getTicketsByOrderRef(ref);
    }

    async function searchOrdersByField(field, value){
      const snap = await db.collection("orders").where(field, "==", value).limit(10).get();
      const orders = snap.docs.map(d => ({ id:d.id, ref:d.ref, data:d.data() || {} }));
      const allTickets = [];
      for (const o of orders){
        const tickets = await getTicketsByOrderRef(o.ref);
        allTickets.push(...tickets);
      }
      return allTickets;
    }

    async function runSearch(){
      const mode = modeEl.value;
      const q = norm(qEl.value);

      setHint("");
      setResult("");
      setList("");

      if (!q){
        setResult(`<span class="warn">請輸入查詢內容</span>`);
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "查詢中…";
      setResult(`<span class="small">查詢中…</span>`);

      try{
        let tickets = [];

        if (mode === "ticketId"){
          tickets = await searchByTicketId(q);
        } else if (mode === "orderId"){
          tickets = await searchByOrderId(q);
        } else if (mode === "email"){
          tickets = await searchOrdersByField("buyerEmail", q.toLowerCase());
        } else if (mode === "uid"){
          tickets = await searchOrdersByField("buyerUid", q);
        }

        if (!tickets.length){
          setResult(`
            <div class="warn">查無資料</div>
            <div class="small">
              可能原因：代碼錯誤 / 尚未建立訂單或票券資料 / 欄位名稱不同（buyerEmail / buyerUid）。<br>
              若仍有疑問，請由平台/校方管理員確認資料。
            </div>
          `);
          return;
        }

        setResult(`<div class="ok">找到 ${tickets.length} 張票券</div>`);
        setList(tickets.map(renderTicketCard).join(""));

      }catch(e){
        console.error(e);
        setResult(`
          <div class="warn">查詢失敗</div>
          <div class="small mono">${esc(e.code || "")} ${esc(e.message || String(e))}</div>
        `);
      }finally{
        searchBtn.disabled = false;
        searchBtn.textContent = "開始查詢";
      }
    }

    searchBtn.onclick = runSearch;

    clearBtn.onclick = () => {
      qEl.value = "";
      setHint("");
      setResult("");
      setList("");
      qEl.focus();
    };

    // ✅ 條碼槍最佳化：
    // - 條碼槍通常會「輸入完後送 Enter」
    // - 我們支援 Enter 直接查詢
    qEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        runSearch();
      }
    });

    // - 也支援：一旦輸入很快（像條碼槍）就自動查
    let autoTimer = null;
    qEl.addEventListener("input", () => {
      const v = norm(qEl.value);
      if (!v) return;
      clearTimeout(autoTimer);
      autoTimer = setTimeout(() => {
        // 預設只對 ticketId 做自動查（避免 email 亂觸發）
        if (modeEl.value === "ticketId") runSearch();
      }, 180);
    });

    // Auth gate
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        AppUI.showGate(gate, app, { title: "後台管理", msg: "請先登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      const r = await loadUserRole(user.uid);
      if (!r.ok){
        AppUI.showGate(gate, app, {
          title: "無法進入",
          msg: '<span class="warn"></span>',
        });
;
return;
      }

      const role = r.role;

      // ✅ 服務中心：平台/校方管理員
      const allowed = ["platform_super","platform_admin","org_super","org_admin"];
      if (!allowed.includes(role)){
        AppUI.showGate(gate, app, {
          title: "權限不足",
          msg: '<span class="warn"></span>',
        });
;
return;
      }

      gate.style.display = "none";
      app.style.display = "block";
      if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }
      whoEl.textContent = user.email || "";
      roleText.textContent = role || "-";

      setResult(`<span class="small">請用條碼槍掃描到「查詢內容」，系統會自動查詢（ticketId）。</span>`);
      qEl.focus();
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
</html>
