<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜人事派發與審核</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />

  <style id="standalone-sidebar-style">
    body{margin:0;background:#eef0f4;}
    body.gate-mode{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef0f4;}
    body.sidebar-layout{min-height:100vh;background:#eef0f4;}
    #app{width:100%;min-height:100vh;display:none;}
    body.sidebar-layout #app{display:flex !important;align-items:stretch;gap:18px;padding:18px;}
    #adminSidebar{width:260px;flex:0 0 260px;background:#fff;border:1px solid #ececec;border-radius:22px;padding:14px;display:none;flex-direction:column;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.05);z-index:1000;overflow:hidden;min-height:calc(100vh - 36px);}
    #adminSidebar.sb-visible{display:flex;}
    .sb-brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#111;padding:8px 8px 14px;border-bottom:1px solid #f0f0f0;}
    .sb-brand-icon{width:42px;height:42px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .sb-brand-name{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-brand-sub{font-size:11px;color:#888;margin-top:2px;}
    .sb-nav{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:auto;padding-right:4px;}
    .sb-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:16px;text-decoration:none;color:#111;transition:background .15s ease, transform .12s ease;}
    .sb-item:hover{background:#f3f4f6;transform:translateY(-1px);}
    .sb-active{background:#3b82f6;color:#fff;box-shadow:0 10px 24px rgba(59,130,246,.18);}
    .sb-item-icon{width:28px;min-width:28px;text-align:center;font-size:20px;line-height:1.2;margin-top:1px;}
    .sb-item-text{min-width:0;}
    .sb-item-label{font-size:14px;font-weight:900;line-height:1.25;}
    .sb-item-desc{font-size:11px;opacity:.72;margin-top:3px;line-height:1.35;}
    .sb-footer-info{margin-top:auto;border-top:1px solid #f0f0f0;padding:12px 2px 4px;font-size:12px;color:#888;line-height:1.65;word-break:break-word;}
    .sb-logout{margin-top:8px;width:100%;border:none;background:#3b82f6;color:#fff;border-radius:14px;height:44px;font-size:14px;font-weight:900;cursor:pointer;}
    .sb-logout:hover{background:#2563eb;}
    #appWrap{flex:1 1 auto;min-width:0;min-height:calc(100vh - 36px);background:#fff;border:1px solid #ececec;border-radius:22px;padding:26px 28px;box-shadow:0 10px 30px rgba(0,0,0,.05);display:block;}
    #adminMain{width:100%;min-width:0;min-height:auto;padding:0;margin:0;display:block;overflow:visible;}
    #sbToggle{position:fixed;top:14px;left:14px;z-index:1100;width:42px;height:42px;border:none;border-radius:12px;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.12);font-size:20px;cursor:pointer;display:none;}
    #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:999;display:none;}
    #sbOverlay.sb-open{display:block;}
    @media (min-width:769px){
      #sbToggle{display:none !important;}
      #sbOverlay{display:none !important;}
      #adminSidebar{position:sticky;top:18px;height:calc(100vh - 36px);}
    }
    @media (max-width:768px){
      body.sidebar-layout #app{display:block !important;padding:0;}
      #adminSidebar{position:fixed;top:0;left:0;height:100vh;min-height:100vh;border-radius:0 22px 22px 0;transform:translateX(-100%);transition:transform .22s ease;}
      #adminSidebar.sb-open{transform:translateX(0);}
      #sbToggle{display:block;}
      #appWrap{min-height:100vh;border-radius:0;border:none;box-shadow:none;padding:64px 14px 18px;}
    }
  </style>

<style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#111; --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10); --shadow:0 14px 40px rgba(0,0,0,.08);
      --btn-a:10px; --btn-b:14px; --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px; --btn-fs:16px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif; }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 16px; }
    .section{
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      box-shadow:var(--shadow); padding:16px; margin-bottom:16px;
    }
    .header{ display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    h1{ margin:0; font-size:22px; letter-spacing:.2px; }
    h2{ margin:0; font-size:16px; font-weight:900; }
    .sub{ margin-top:6px; color:var(--muted); line-height:1.7; font-size:14px; }
    .small{ font-size:13px; color:var(--muted); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      height:var(--btn-h); padding:var(--btn-a) var(--btn-x); border-radius:999px;
      border:1px solid var(--line); background:#fff; font-weight:900; font-size:var(--btn-fs);
      cursor:pointer; color:#111; text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform:translateY(-1px); }
    .btn:active{ transform:translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }
    .btn-primary{ background:#111; color:#fff; border-color:#111; }
    .btn-sm{ height:40px; padding:8px calc(var(--btn-b)*1.25); font-size:15px; }
    .btn-danger{ border-color:rgba(239,68,68,.35); color:#b91c1c; background:#fff; }

    input[type="text"], select{
      width:100%; padding:12px; border-radius:14px; border:1px solid var(--line);
      background:#fff; font-size:16px;
    }
    label{ font-weight:900; display:block; margin:10px 0 6px; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }

    .list{ display:grid; gap:12px; margin-top:12px; }
    .item{
      border:1px solid var(--line); border-radius:18px; padding:14px; background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
    }
    .item-top{ display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .warn{ color:#b91c1c; font-weight:900; }
    .ok{ color:#166534; font-weight:900; }
    .pill{ display:inline-flex; border:1px solid var(--line); border-radius:999px; padding:6px 10px; font-size:13px; background:#fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="gate" class="section"></div>

    <div id="app" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>人事派發與審核</h1>
            <div class="sub">審核申請、派發到校園、設定角色與啟用狀態。</div>
            <div class="small">登入：<span id="who" class="mono">-</span>｜角色：<span id="roleText" class="mono">-</span></div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button class="btn btn-sm" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <!-- 待審核 -->
      <div class="section">
        <h2>待審核申請</h2>
        <div class="sub">申請會寫入 <span class="mono">accessRequests</span>，由平台超級管理員核准後寫回 <span class="mono">users/{uid}</span>。</div>
        <div class="row" style="margin-top:12px; justify-content:flex-end;">
          <button class="btn" id="reloadReqBtn">重新載入</button>
        </div>
        <div class="list" id="reqList"></div>
      </div>

      <!-- 使用者查找 / 派發 -->
      <div class="section">
        <h2>使用者查找與派發</h2>
        <div class="sub">用 email 查找對應的 users 文件（需平台端已建立/或先用申請核准建立）。</div>

        <div class="grid" style="margin-top:12px;">
          <div>
            <label>email</label>
            <input id="emailQ" type="text" placeholder="someone@example.com" />
          </div>
          <div class="row" style="align-items:flex-end;">
            <button class="btn btn-primary" id="searchBtn">查詢</button>
          </div>
        </div>

        <div id="userBox" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    AppUI.initPageLinks(document.getElementById("pageRoot") || document.body);
    
    const db = window.db;

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const whoEl = document.getElementById("who");
    const roleText = document.getElementById("roleText");
    const logoutBtn = document.getElementById("logoutBtn");

    const reqList = document.getElementById("reqList");
    const reloadReqBtn = document.getElementById("reloadReqBtn");

    const emailQ = document.getElementById("emailQ");
    const searchBtn = document.getElementById("searchBtn");
    const userBox = document.getElementById("userBox");

    let currentRole = "";
    let currentUser = null;

    const esc = AppUI.esc;

    const doLogout = AppAuth.logout;

    async function loadMyRole(uid){
      const snap = await db.collection("users").doc(uid).get();
      if (!snap.exists) return { ok:false, reason:"等待授權" };
      const u = snap.data() || {};
      if (u.enabled !== true) return { ok:false, reason:"帳號已停用" };
      const role = String(u.role || "").trim();
      return { ok:true, role, me:u };
    }

    const tsToText = AppUI.tsToText;

    async function loadRequests(){
      reqList.innerHTML = `<div class="small">載入中…</div>`;

      const snap = await db.collection("accessRequests")
        .where("status","==","pending")
        .orderBy("createdAt","desc")
        .limit(50)
        .get();

      if (snap.empty){
        reqList.innerHTML = `<div class="small">目前沒有待審核申請</div>`;
        return;
      }

      reqList.innerHTML = snap.docs.map(d=>{
        const r = d.data() || {};
        return `
          <div class="item" id="req-${d.id}">
            <div class="item-top">
              <div style="min-width:0;">
                <div style="font-weight:900;">${esc(r.email || "(no email)")}</div>
                <div class="small" style="margin-top:4px;">
                  申請角色：<span class="pill">${esc(r.requestedRole || "-")}</span>
                  校園：<span class="pill">${esc(r.requestedSchoolId || "(空)")}</span>
                </div>
                <div class="small" style="margin-top:6px;">備註：${esc(r.note || "-")}</div>
                <div class="small" style="margin-top:6px;">申請時間：${esc(tsToText(r.createdAt))}</div>
                <div class="small">uid：<span class="mono">${esc(r.uid || "-")}</span></div>
              </div>
              <div class="row" style="justify-content:flex-end;">
                <button class="btn btn-sm" onclick="approveReq('${d.id}')">核准</button>
                <button class="btn btn-sm btn-danger" onclick="rejectReq('${d.id}')">拒絕</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.approveReq = async (reqId) => {
      if (currentRole !== "platform_super"){
        AppUI.toast("只有 platform_super 可核准", "warn");
        return;
      }
      const ref = db.collection("accessRequests").doc(reqId);
      const snap = await ref.get();
      if (!snap.exists) return AppUI.toast("申請不存在", "warn");

      const r = snap.data() || {};
      const ok = confirm(
        `核准申請？\n\nemail：${r.email || "-"}\nrole：${r.requestedRole || "-"}\nschoolId：${r.requestedSchoolId || "(空)"}`
      );
      if (!ok) return;

      try{
        await db.runTransaction(async (tx) => {
          const now = await tx.get(ref);
          if (!now.exists) throw new Error("申請已不存在");
          const data = now.data() || {};
          if (data.status !== "pending") throw new Error("申請已被處理");

          const uid = String(data.uid || "").trim();
          if (!uid) throw new Error("缺少 uid");

          // ✅ 寫回 users/{uid}
          tx.set(db.collection("users").doc(uid), {
            email: data.email || "",
            enabled: true,
            role: data.requestedRole || "org_staff",
            schoolId: data.requestedSchoolId || "",
            updatedAt: new Date()
          }, { merge:true });

          // ✅ 更新申請狀態
          tx.update(ref, {
            status: "approved",
            handledAt: new Date(),
            handledByUid: currentUser.uid
          });
        });

        AppUI.toast("已核准並派發", "ok");
        await loadRequests();
      }catch(e){
        console.error(e);
        AppUI.toast("核准失敗：" + (e.message || e), "warn");
      }
    };

    window.rejectReq = async (reqId) => {
      if (currentRole !== "platform_super"){
        AppUI.toast("只有 platform_super 可拒絕", "warn");
        return;
      }
      const ok = confirm("確定要拒絕此申請嗎？");
      if (!ok) return;

      try{
        await db.collection("accessRequests").doc(reqId).update({
          status: "rejected",
          handledAt: new Date(),
          handledByUid: currentUser.uid
        });
        await loadRequests();
      }catch(e){
        console.error(e);
        AppUI.toast("拒絕失敗：" + (e.message || e), "warn");
      }
    };

    async function findUserByEmail(email){
      const q = await db.collection("users").where("email","==",email).limit(10).get();
      if (q.empty) return null;
      // 理論上 email 應該唯一；先取第一筆
      const d = q.docs[0];
      return { id:d.id, data:d.data() || {} };
    }

    function renderUserEditor(uid, u){
      const role = String(u.role || "").trim();
      const enabled = u.enabled === true;
      const schoolId = String(u.schoolId || "").trim();
      const orgGroup = String(u.orgGroup || "").trim();

      userBox.innerHTML = `
        <div class="item">
          <div style="font-weight:900;">查詢結果</div>
          <div class="small" style="margin-top:6px;">
            uid：<span class="mono">${esc(uid)}</span><br>
            email：<span class="mono">${esc(u.email || "-")}</span>
          </div>

          <div class="grid" style="margin-top:12px;">
            <div>
              <label>enabled</label>
              <select id="uEnabled">
                <option value="true" ${enabled ? "selected" : ""}>true</option>
                <option value="false" ${!enabled ? "selected" : ""}>false</option>
              </select>
            </div>

            <div>
              <label>role</label>
              <select id="uRole">
                <option value="platform_super" ${role==="platform_super"?"selected":""}>platform_super</option>
                <option value="platform_admin" ${role==="platform_admin"?"selected":""}>platform_admin</option>
                <option value="org_super" ${role==="org_super"?"selected":""}>org_super</option>
                <option value="org_admin" ${role==="org_admin"?"selected":""}>org_admin</option>
                <option value="org_staff" ${role==="org_staff"?"selected":""}>org_staff</option>
              </select>
              <div class="small">※ 建議只給 platform_super 調整平台角色</div>
            </div>
          </div>

          <div class="grid" style="margin-top:12px;">
            <div>
              <label>schoolId（可留空＝平台人員）</label>
              <input id="uSchoolId" type="text" value="${esc(schoolId)}" />
            </div>
            <div>
              <label>orgGroup（例：公關組／事務組）</label>
              <input id="uOrgGroup" type="text" value="${esc(orgGroup)}" />
            </div>
          </div>

          <div class="row" style="margin-top:14px; justify-content:flex-end;">
            <button class="btn btn-primary" id="saveUserBtn">儲存</button>
          </div>

          <div class="small" id="saveMsg" style="margin-top:10px;"></div>
        </div>
      `;

      document.getElementById("saveUserBtn").onclick = async () => {
        if (currentRole !== "platform_super"){
          AppUI.toast("只有 platform_super 可儲存修改", "warn");
          return;
        }
        const newEnabled = document.getElementById("uEnabled").value === "true";
        const newRole = document.getElementById("uRole").value;
        const newSchoolId = String(document.getElementById("uSchoolId").value || "").trim();
        const newOrgGroup = String(document.getElementById("uOrgGroup").value || "").trim();

        const msg = document.getElementById("saveMsg");
        msg.textContent = "儲存中…";

        try{
          await db.collection("users").doc(uid).set({
            enabled: newEnabled,
            role: newRole,
            schoolId: newSchoolId,
            orgGroup: newOrgGroup,
            updatedAt: new Date()
          }, { merge:true });

          msg.innerHTML = `<span class="ok">✅ 已儲存</span>`;
        }catch(e){
          console.error(e);
          msg.innerHTML = `<span class="warn">儲存失敗：</span> ${esc(e.message || e)}`;
        }
      };
    }

    searchBtn.onclick = async () => {
      const email = String(emailQ.value || "").trim();
      if (!email) return AppUI.toast("請輸入 email", "warn");
      userBox.innerHTML = `<div class="small">查詢中…</div>`;

      try{
        const res = await findUserByEmail(email);
        if (!res){
          userBox.innerHTML = `<div class="item"><span class="warn">找不到此 email 的 users 文件</span></div>`;
          return;
        }
        renderUserEditor(res.id, res.data);
      }catch(e){
        console.error(e);
        userBox.innerHTML = `<div class="item"><span class="warn">查詢失敗：</span>${esc(e.message || e)}</div>`;
      }
    };

    reloadReqBtn.onclick = loadRequests;

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;
      if (!user){
        AppUI.showGate(gate, app, { title: "人事派發與審核", msg: "請先登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      try{
        const r = await loadMyRole(user.uid);
        if (!r.ok){
          AppUI.showGate(gate, app, { title: r.reason, msg: "你的帳號尚未被授權為管理者。", showEmailLogin: false });
          return;
        }

        currentRole = r.role;
        whoEl.textContent = user.email || "-";
        roleText.textContent = currentRole || "-";

        // ✅ 只有 platform_super / platform_admin 可進
        if (!["platform_super","platform_admin"].includes(currentRole)){
          AppUI.showGate(gate, app, { title: "權限不足", msg: "此頁僅限平台管理員使用。", showEmailLogin: false });
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }

        await loadRequests();

      }catch(e){
        console.error(e);
        AppUI.showGate(gate, app, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>

  <script id="standalone-sidebar-script">
    (function () {
      "use strict";

      const NAV = [
        { e:"🏠", t:"總覽", d:"系統狀態與提醒", h:"dashboard.html" },
        { e:"🎟️", t:"活動管理", d:"建立活動 / 票種", h:"admin-events.html" },
        { e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷", h:"admin-event-orders.html" },
        { e:"🏫", t:"特約校園管理", d:"校園設定 / 停用", h:"partner-schools.html" },
        { e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定", h:"admin-studentslist-import.html" },
        { e:"🔎", t:"會員查詢", d:"查詢帳號與驗證狀態", h:"admin-member-lookup.html" },
        { e:"🧑‍💼", t:"後台帳號管理", d:"建立、審核、派發", h:"admin-staff-users.html" },
        { e:"🏢", t:"全組織管理", d:"各校管理人員一覽", h:"admin-org-overview.html" },
        { e:"👥", t:"組織團隊", d:"管理員 / 服務員 / 組別", h:"org-team.html" },
        { e:"✅", t:"核銷掃碼", d:"掃碼核銷指定活動", h:"staff-checkin.html" },
        { e:"🛠️", t:"服務中心核銷", d:"條碼槍查詢與核銷", h:"admin-checkin-assist.html" },
        { e:"⚙️", t:"Dashboard 設定", d:"各角色顯示 / 置頂", h:"admin-dashboard-settings.html" },
        { e:"🧪", t:"身分測試切換", d:"模擬其他帳號", h:"admin-impersonate.html" },
        { e:"📝", t:"後台帳號申請", d:"填寫申請", h:"request-access.html" }
      ];

      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));

      const cur = location.pathname.split("/").pop() || "";

      function buildSidebar(email, role) {
        const navHtml = NAV.map((n) => `
          <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
            <div class="sb-item-icon">${n.e}</div>
            <div class="sb-item-text">
              <div class="sb-item-label">${esc(n.t)}</div>
              <div class="sb-item-desc">${esc(n.d)}</div>
            </div>
          </a>
        `).join("");

        const el = document.createElement("aside");
        el.id = "adminSidebar";
        el.innerHTML = `
          <a class="sb-brand" href="dashboard.html">
            <div class="sb-brand-icon">🎤</div>
            <div>
              <div class="sb-brand-name">演唱會購票系統</div>
              <div class="sb-brand-sub">Admin Panel</div>
            </div>
          </a>

          <div class="sb-nav">${navHtml}</div>

          <div class="sb-footer-info" id="sbFooterInfo">
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          </div>

          <button class="sb-logout" id="sbLogoutBtn" type="button">登出</button>
        `;
        return el;
      }

      function buildHamburger() {
        const btn = document.createElement("button");
        btn.id = "sbToggle";
        btn.type = "button";
        btn.setAttribute("aria-label", "開啟選單");
        btn.innerHTML = "☰";
        return btn;
      }

      function buildOverlay() {
        const overlay = document.createElement("div");
        overlay.id = "sbOverlay";
        return overlay;
      }

      function updateSidebarInfo(email, role) {
        const footer = document.getElementById("sbFooterInfo");
        if (footer) {
          footer.innerHTML = `
            <div>${esc(email || "-")}</div>
            <div>角色：${esc(role || "-")}</div>
          `;
        }
      }

      function ensureLayout(email, role) {
        const app = document.getElementById("app");
        if (!app) return;

        let sidebar = document.getElementById("adminSidebar");
        let toggle = document.getElementById("sbToggle");
        let overlay = document.getElementById("sbOverlay");

        if (!sidebar) {
          sidebar = buildSidebar(email, role);
          toggle = buildHamburger();
          overlay = buildOverlay();

          app.prepend(sidebar);
          app.prepend(overlay);
          app.prepend(toggle);

          toggle.addEventListener("click", () => {
            sidebar.classList.toggle("sb-open");
            overlay.classList.toggle("sb-open");
          });

          overlay.addEventListener("click", () => {
            sidebar.classList.remove("sb-open");
            overlay.classList.remove("sb-open");
          });

          const logoutBtn = sidebar.querySelector("#sbLogoutBtn");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
              try {
                if (typeof firebase !== "undefined" && firebase.auth) {
                  await firebase.auth().signOut();
                }
              } catch (e) {
                console.error(e);
                alert("登出失敗");
              }
            });
          }
        }

        updateSidebarInfo(email, role);
      }

      window.SidebarShow = function(email, role) {
        ensureLayout(email, role);
        document.body.classList.remove("gate-mode");
        document.body.classList.add("sidebar-layout");
        const sidebar = document.getElementById("adminSidebar");
        if (sidebar) sidebar.classList.add("sb-visible");
      };

      window.SidebarHide = function() {
        const sidebar = document.getElementById("adminSidebar");
        const overlay = document.getElementById("sbOverlay");
        if (sidebar) sidebar.classList.remove("sb-open");
        if (overlay) overlay.classList.remove("sb-open");
        document.body.classList.remove("sidebar-layout");
        document.body.classList.add("gate-mode");
      };
    })();
  </script>

</body>
</html>
