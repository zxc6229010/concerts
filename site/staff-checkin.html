<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>核銷｜掃描入場</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    body { background: #0a0a0a; color: #fff; }
    .wrap { max-width: 540px; padding: 20px 16px; }

    /* Header */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .event-title {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 8px; }

    /* Scanner viewport */
    .scanner-frame {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      aspect-ratio: 1;
      max-height: 360px;
    }
    #reader {
      width: 100% !important;
      height: 100% !important;
    }
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    /* Hide html5-qrcode default UI noise */
    #reader img, #reader__dashboard, #reader__filescan_input { display: none !important; }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-box {
      width: 200px;
      height: 200px;
      border: 3px solid rgba(255,255,255,.8);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.45);
    }
    .scan-line {
      position: absolute;
      top: calc(50% - 97px);
      left: calc(50% - 97px);
      width: 194px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scanLine 1.8s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(194px); opacity: 0; }
    }

    /* Result flash */
    .result-flash {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    .result-flash.ok   { background: rgba(34,197,94,.35); }
    .result-flash.warn { background: rgba(239,68,68,.35); }
    .result-flash.show { opacity: 1; }

    /* Status bar */
    .status-bar {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      font-size: 14px;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-bar .icon { font-size: 22px; flex-shrink: 0; }
    .status-bar .msg  { flex: 1; line-height: 1.5; }
    .status-bar.ok    { border-color: #166534; background: #052e16; }
    .status-bar.warn  { border-color: #7f1d1d; background: #1c0d0d; }
    .status-bar.info  { border-color: #1e3a5f; background: #0c1f35; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .stat-num   { font-size: 26px; font-weight: 900; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

    /* Scan btn */
    .scan-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .scan-btn-row .btn {
      border-radius: 14px;
      background: #1e1e1e;
      border-color: #333;
      color: #fff;
      height: 52px;
      font-size: 15px;
    }
    .scan-btn-row .btn.active {
      background: #166534;
      border-color: #166534;
    }

    /* Manual input */
    .manual-wrap {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .manual-wrap input {
      flex: 1;
      background: #1a1a1a;
      border-color: #2a2a2a;
      color: #fff;
      border-radius: 14px;
    }
    .manual-wrap input::placeholder { color: #555; }
    .manual-wrap .btn {
      background: #22c55e;
      border-color: #22c55e;
      color: #000;
      font-weight: 900;
      border-radius: 14px;
      padding: 0 20px;
      flex-shrink: 0;
    }

    /* Log */
    .log-section { margin-top: 16px; }
    .log-title {
      font-size: 12px;
      color: #666;
      font-weight: 900;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .log-list { display: grid; gap: 6px; }
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #222;
      font-size: 13px;
      animation: fadeInDown .15s ease;
    }
    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-4px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .log-item.ok   { border-color: #14532d; }
    .log-item.warn { border-color: #7f1d1d; }
    .log-icon { flex-shrink: 0; font-size: 16px; }
    .log-body { flex: 1; }
    .log-main { font-weight: 900; color: #e5e7eb; }
    .log-sub  { color: #6b7280; font-size: 12px; margin-top: 2px; word-break: break-all; }
    .log-time { font-size: 11px; color: #4b5563; flex-shrink: 0; white-space: nowrap; }

    /* Gate */
    #gate { background: #111; border-color: #222; color: #fff; }
    #gate .sub, #gate .hint { color: #888; }
    #gate input {
      background: #1a1a1a; border-color: #333; color: #fff;
    }
    #gate .btn { background: #1a1a1a; border-color: #333; color: #fff; }
    #gate .btn-primary { background: #22c55e; border-color: #22c55e; color: #000; }

    /* Live dot */
    .live { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:#22c55e; }
    .live-dot {
      width:7px; height:7px; border-radius:50%; background:#22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  
/* ── shared.css inlined ── */
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }

</style>
</head>
<body>
  <div class="wrap">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">

      <!-- Top bar -->
      <div class="top-bar">
        <div class="event-title" id="eventTitle">讀取中…</div>
        <div class="top-actions">
          <span class="live"><span class="live-dot"></span>即時</span>
          <button class="btn btn-sm" style="background:#1a1a1a; border-color:#333; color:#fff; border-radius:10px;" id="logoutBtn">登出</button>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-frame" id="scannerFrame">
        <div id="reader"></div>
        <div class="scan-overlay">
          <div class="scan-box"></div>
          <div class="scan-line" id="scanLine" style="display:none;"></div>
        </div>
        <div class="result-flash" id="resultFlash"></div>
      </div>

      <!-- Status -->
      <div class="status-bar info" id="statusBar">
        <span class="icon">📷</span>
        <span class="msg">按「開始掃描」啟動相機</span>
      </div>

      <!-- Scan controls -->
      <div class="scan-btn-row">
        <button class="btn" id="startBtn">▶ 開始掃描</button>
        <button class="btn" id="stopBtn" disabled>■ 停止</button>
      </div>

      <!-- Manual input (backup) -->
      <div class="manual-wrap">
        <input type="text" id="manualCode" placeholder="或手動輸入訂單 ID"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn" id="manualBtn">核銷</button>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="sTotal">-</div>
          <div class="stat-label">總票數</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:#22c55e;" id="sChecked">-</div>
          <div class="stat-label">已入場</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="sRemain">-</div>
          <div class="stat-label">未入場</div>
        </div>
      </div>

      <!-- Log -->
      <div class="log-section">
        <div class="log-title">本次記錄</div>
        <div class="log-list" id="logList">
          <div style="font-size:13px; color:#444; padding:6px 0;">等待掃描…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
  <script>
    const db = window.db;
    const { esc, norm, pageIn, showGate } = AppUI;

    const gate        = document.getElementById("gate");
    const app         = document.getElementById("app");
    const eventTitleEl= document.getElementById("eventTitle");
    const logoutBtn   = document.getElementById("logoutBtn");
    const startBtn    = document.getElementById("startBtn");
    const stopBtn     = document.getElementById("stopBtn");
    const statusBar   = document.getElementById("statusBar");
    const resultFlash = document.getElementById("resultFlash");
    const scanLine    = document.getElementById("scanLine");
    const manualCode  = document.getElementById("manualCode");
    const manualBtn   = document.getElementById("manualBtn");
    const logListEl   = document.getElementById("logList");

    logoutBtn.onclick = AppAuth.logout;

    let currentUser       = null;
    let myAssignedEventId = "";
    let qr                = null;
    let scanning          = false;
    let busy              = false;
    let logCount          = 0;
    let unsubStats        = null;

    // ── Audio feedback ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    function beep(freq = 880, dur = 120, type = "sine", gain = 0.3) {
      if (!AudioCtx) return;
      try {
        const ctx  = new AudioCtx();
        const osc  = ctx.createOscillator();
        const vol  = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        vol.gain.value = gain;
        osc.connect(vol);
        vol.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur / 1000);
        setTimeout(() => ctx.close(), dur + 100);
      } catch (_) {}
    }
    const okBeep   = () => { beep(880, 80); setTimeout(() => beep(1200, 100), 90); };
    const warnBeep = () => { beep(300, 200, "square", 0.15); };

    // ── Flash overlay ──
    let flashTimer = null;
    function flash(type) {
      resultFlash.className = `result-flash ${type} show`;
      resultFlash.textContent = type === "ok" ? "✓" : "✗";
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        resultFlash.className = `result-flash ${type}`;
      }, 500);
    }

    // ── Status bar ──
    function setStatus(type, icon, msg) {
      statusBar.className = `status-bar ${type}`;
      statusBar.innerHTML = `<span class="icon">${icon}</span><span class="msg">${msg}</span>`;
    }

    // ── Log ──
    function pushLog(type, main, sub) {
      if (logCount === 0) logListEl.innerHTML = "";
      logCount++;
      const now  = new Date().toLocaleTimeString("zh-Hant", { hour12: false });
      const icon = type === "ok" ? "✅" : "⚠️";
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = `
        <span class="log-icon">${icon}</span>
        <div class="log-body">
          <div class="log-main">${esc(main)}</div>
          ${sub ? `<div class="log-sub">${esc(sub)}</div>` : ""}
        </div>
        <span class="log-time">${now}</span>
      `;
      logListEl.insertBefore(item, logListEl.firstChild);
      while (logListEl.children.length > 30) logListEl.removeChild(logListEl.lastChild);
    }

    // ── Live stats ──
    function startStats(eventId) {
      if (unsubStats) unsubStats();
      unsubStats = db.collection("events").doc(eventId).collection("orders")
        .onSnapshot(snap => {
          let total = 0, checked = 0;
          snap.forEach(d => {
            total++;
            if ((d.data() || {}).checkedIn === true) checked++;
          });
          document.getElementById("sTotal").textContent   = total;
          document.getElementById("sChecked").textContent = checked;
          document.getElementById("sRemain").textContent  = total - checked;
        }, () => {});
    }

    // ── Core checkin ──
    async function doCheckin(rawCode) {
      const code = norm(rawCode);
      if (!code) return;

      setStatus("info", "⏳", `讀取：${code}`);

      try {
        // Try orders collection first
        const orderRef  = db.collection("events").doc(myAssignedEventId).collection("orders").doc(code);
        const orderSnap = await orderRef.get();

        if (orderSnap.exists) {
          const o = orderSnap.data() || {};
          if (o.checkedIn === true) {
            const atStr = o.checkedInAt
              ? (o.checkedInAt.toDate ? o.checkedInAt.toDate() : new Date(o.checkedInAt))
                  .toLocaleTimeString("zh-Hant", { hour12: false })
              : "未知";
            flash("warn"); warnBeep();
            setStatus("warn", "⚠️", `重複入場（${atStr} 已核銷）`);
            pushLog("warn", "重複入場", `${code} 已於 ${atStr} 入場`);
            return;
          }
          await orderRef.update({
            checkedIn:      true,
            checkedInAt:    new Date(),
            checkedInBy:    currentUser.uid,
            checkedInEmail: currentUser.email || "",
          });
          flash("ok"); okBeep();
          setStatus("ok", "✅", "入場成功！");
          pushLog("ok", "入場成功", `訂單 ${code}`);
          return;
        }

        // Fallback: tickets collectionGroup
        const q = await db.collectionGroup("tickets")
          .where(firebase.firestore.FieldPath.documentId(), "==", code)
          .limit(1).get();

        if (q.empty) {
          flash("warn"); warnBeep();
          setStatus("warn", "❌", "找不到此票券");
          pushLog("warn", "找不到票", code);
          return;
        }

        const tDoc = q.docs[0];
        const t    = tDoc.data() || {};

        if (myAssignedEventId && norm(t.eventId) !== myAssignedEventId) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票不屬於本活動");
          pushLog("warn", "活動不符", code);
          return;
        }
        if (t.checkedIn === true) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票已核銷");
          pushLog("warn", "重複核銷", code);
          return;
        }
        await tDoc.ref.update({
          checkedIn:        true,
          checkedInAt:      new Date(),
          checkedInBy:      currentUser.uid,
          checkedInByEmail: currentUser.email || "",
        });
        flash("ok"); okBeep();
        setStatus("ok", "✅", "入場成功！");
        pushLog("ok", "入場成功（票券）", code);

      } catch (e) {
        console.error(e);
        flash("warn"); warnBeep();
        setStatus("warn", "❌", "核銷失敗：" + (e.message || e));
        pushLog("warn", "核銷失敗", e.message || String(e));
      }
    }

    // ── Scanner ──
    async function startScan() {
      if (scanning) return;
      if (!myAssignedEventId) {
        setStatus("warn", "⚠️", "你尚未被指派活動，請聯絡管理員");
        return;
      }
      setStatus("info", "📷", "啟動相機…");
      try {
        if (!qr) qr = new Html5Qrcode("reader");
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras?.length) {
          setStatus("warn", "❌", "找不到相機，請改用手動輸入");
          return;
        }
        // Prefer back camera
        const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
        scanning = true;
        startBtn.disabled = true; startBtn.classList.add("active");
        stopBtn.disabled  = false;
        scanLine.style.display = "block";

        await qr.start(
          cam.id,
          { fps: 15, qrbox: { width: 220, height: 220 } },
          async decoded => {
            if (busy) return;
            busy = true;
            try { await doCheckin(decoded); }
            finally { setTimeout(() => { busy = false; }, 1000); }
          },
          () => {}
        );
        setStatus("info", "🎯", "對準 QR Code 即可核銷");
      } catch (e) {
        console.error(e);
        scanning = false;
        startBtn.disabled = false; startBtn.classList.remove("active");
        stopBtn.disabled  = true;
        scanLine.style.display = "none";
        setStatus("warn", "❌", "相機啟動失敗，請確認 https 及相機權限");
      }
    }

    async function stopScan() {
      if (!qr || !scanning) return;
      try { await qr.stop(); await qr.clear(); } catch (_) {}
      scanning = false;
      qr = null;
      startBtn.disabled = false; startBtn.classList.remove("active");
      stopBtn.disabled  = true;
      scanLine.style.display = "none";
      setStatus("info", "📷", "已停止掃描");
    }

    startBtn.onclick = startScan;
    stopBtn.onclick  = stopScan;

    manualBtn.onclick = () => { doCheckin(manualCode.value); manualCode.value = ""; };
    manualCode.addEventListener("keydown", e => {
      if (e.key === "Enter") { doCheckin(manualCode.value); manualCode.value = ""; }
    });

    // ── Auth ──
    firebase.auth().onAuthStateChanged(async user => {
      currentUser = user || null;
      if (!user) {
        AppUI.showGate(gate, app, {
          title: "入場核銷",
          msg:   "請先登入帳號以繼續。",
          showEmailLogin: true,
        });
        return;
      }

      try {
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists) {
          AppUI.showGate(gate, app, { title: "無法進入", msg: "此帳號尚未授權。" });
          return;
        }
        const u = snap.data() || {};
        if (u.enabled !== true) {
          AppUI.showGate(gate, app, { title: "帳號已停用", msg: "請聯絡管理員。" });
          return;
        }
        const role = norm(u.role);
        const VALID_ROLES = ["platform_super","platform_admin","org_super","org_admin","org_staff"];
        if (!VALID_ROLES.includes(role)) {
          AppUI.showGate(gate, app, { title: "權限不足", msg: `角色 "${role}" 無法使用核銷功能。` });
          return;
        }

        myAssignedEventId = norm(u.assignedEventId || "");

        // Load event name
        let evtName = myAssignedEventId || "(未指派活動)";
        if (myAssignedEventId) {
          try {
            const es = await db.collection("events").doc(myAssignedEventId).get();
            if (es.exists) evtName = norm(es.data()?.title || myAssignedEventId);
          } catch (_) {}
          startStats(myAssignedEventId);
        }

        eventTitleEl.textContent = evtName;
        gate.style.display = "none";
        app.style.display  = "block";

        if (!myAssignedEventId) {
          setStatus("warn", "⚠️", "你尚未被指派活動，請聯絡管理員");
        } else {
          setStatus("info", "📷", "按「開始掃描」啟動相機");
        }

      } catch (e) {
        console.error(e);
        AppUI.showGate(gate, app, { title: "載入失敗", msg: e.message || String(e) });
      }
    });
  </script>
<script>
/* ── shared.js inlined ── */
(function () {
  "use strict";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  if (typeof firebase === "undefined") {
    console.error("shared.js 需要先載入 Firebase compat SDK");
    return;
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function norm(s) {
    return String(s ?? "").trim();
  }

  function tsToText(ts) {
    try {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString("zh-Hant", { hour12: false });
    } catch (e) {
      return "-";
    }
  }

  function pageIn(el) {
    if (!el) return;
    requestAnimationFrame(() => el.classList.add("on"));
  }

  function go(href, pageEl) {
    const root = pageEl || document.getElementById("pageRoot");
    if (root) root.classList.add("leaving");
    setTimeout(() => {
      location.href = href;
    }, 140);
  }

  function initPageLinks(pageEl) {
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href, pageEl);
    });
  }

  function toast(msg, type = "ok", duration = 3000) {
    let el = document.getElementById("_appToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "_appToast";
      el.style.cssText = [
        "position:fixed",
        "left:50%",
        "bottom:24px",
        "transform:translateX(-50%) translateY(10px)",
        "min-width:220px",
        "max-width:360px",
        "padding:12px 20px",
        "border-radius:999px",
        "box-shadow:0 10px 30px rgba(0,0,0,.15)",
        "font-size:14px",
        "font-weight:900",
        "text-align:center",
        "z-index:99999",
        "opacity:0",
        "pointer-events:none",
        "transition:opacity .2s ease, transform .2s ease"
      ].join(";");
      document.body.appendChild(el);
    }

    const theme = {
      ok: { bg: "#166534", color: "#fff" },
      warn: { bg: "#b91c1c", color: "#fff" },
      info: { bg: "#1d4ed8", color: "#fff" },
      neutral: { bg: "#111", color: "#fff" }
    }[type] || { bg: "#111", color: "#fff" };

    el.style.background = theme.bg;
    el.style.color = theme.color;
    el.textContent = msg;

    clearTimeout(el._timer);
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    });

    el._timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(10px)";
    }, duration);
  }

  function showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = true, extraBtns = "" } = {}) {
    if (!gateEl) return;
    if (appEl) appEl.style.display = "none";
    gateEl.style.display = "block";

    gateEl.innerHTML = `
      <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
      <div class="sub">${msg}</div>

      ${showEmailLogin ? `
        <div style="margin-top:16px; max-width:380px; display:grid; gap:10px;">
          <input id="_loginEmail" type="text" placeholder="帳號（Email）"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <input id="_loginPassword" type="password" placeholder="密碼"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <button class="btn btn-primary" id="_loginBtn" type="button">登入</button>
          <div id="_loginMsg" style="display:none; color:#b91c1c; font-size:13px;"></div>
        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
</body>
</html>
