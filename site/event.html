<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>活動詳情</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:#f6f7fb;
      color:#111;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:12px;
      flex-wrap:wrap;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
    }

    .card{
      background:#fff;
      border-radius:18px;
      padding:20px;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.05);
      margin-bottom:14px;
    }

    .title{
      font-size:26px;
      font-weight:900;
      line-height:1.35;
      margin:0;
    }

    .meta{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .meta-item{
      padding:12px 14px;
      border-radius:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      line-height:1.7;
      font-size:14px;
    }

    .label{
      font-weight:900;
      margin-right:6px;
    }

    .desc{
      white-space:pre-wrap;
      line-height:1.8;
      font-size:15px;
      color:rgba(17,17,17,.9);
    }

    .pill-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      font-size:13px;
      font-weight:900;
    }

    .notice{
      border-radius:14px;
      padding:14px;
      font-size:14px;
      line-height:1.7;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
    }

    .notice.warn{
      background:#fff7f7;
      border-color:rgba(239,68,68,.2);
      color:#991b1b;
    }

    .notice.ok{
      background:#f6fff8;
      border-color:rgba(34,197,94,.2);
      color:#166534;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }

    .btn-primary{
      background:#111;
      border-color:#111;
      color:#fff;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .hidden{
      display:none !important;
    }

    .field{
      margin-top:12px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:900;
      margin-bottom:6px;
    }

    .field input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.1);
      font-size:16px;
      outline:none;
      background:#fff;
    }

    .small{
      margin-top:8px;
      font-size:13px;
      color:rgba(0,0,0,.6);
      line-height:1.6;
    }

    .loading{
      font-size:14px;
      color:rgba(0,0,0,.55);
    }
  
/* ── shared.css inlined ── */
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }

</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="events.html">← 返回活動列表</a>
    </div>

    <div id="loading" class="loading">載入中…</div>

    <div id="errorBox" class="notice warn hidden"></div>

    <div id="content" class="hidden">
      <div class="card">
        <h1 id="title" class="title">-</h1>

        <div class="pill-row">
          <div id="scopePill" class="pill">-</div>
          <div id="publishedPill" class="pill">-</div>
          <div id="invitePill" class="pill">-</div>
        </div>

        <div class="meta">
          <div class="meta-item"><span class="label">活動地點：</span><span id="location">-</span></div>
          <div class="meta-item"><span class="label">搶票時間：</span><span id="saleTime">-</span></div>
          <div class="meta-item"><span class="label">活動時間：</span><span id="eventTime">-</span></div>
          <div class="meta-item"><span class="label">名額：</span><span id="capacity">-</span></div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 12px; font-size:18px;">活動說明</h2>
        <div id="description" class="desc">-</div>
      </div>

      <div id="inviteSection" class="card hidden">
        <h2 style="margin:0 0 10px; font-size:18px;">邀請碼驗證</h2>
        <div class="small">此活動需要邀請碼才能繼續報名 / 購票。</div>

        <div class="field">
          <label for="inviteCodeInput">邀請碼</label>
          <input id="inviteCodeInput" type="text" placeholder="請輸入邀請碼" />
        </div>

        <div class="action-row">
          <button id="checkInviteBtn" class="btn">驗證邀請碼</button>
        </div>

        <div id="inviteMsg" class="small"></div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 10px; font-size:18px;">報名 / 購票</h2>
        <div id="actionHint" class="small">-</div>

        <div class="action-row">
          <button id="goRegisterBtn" class="btn btn-primary" disabled>立即報名 / 購票</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const db = window.db;

    const loadingEl = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const contentEl = document.getElementById("content");

    const titleEl = document.getElementById("title");
    const scopePill = document.getElementById("scopePill");
    const publishedPill = document.getElementById("publishedPill");
    const invitePill = document.getElementById("invitePill");

    const locationEl = document.getElementById("location");
    const saleTimeEl = document.getElementById("saleTime");
    const eventTimeEl = document.getElementById("eventTime");
    const capacityEl = document.getElementById("capacity");
    const descriptionEl = document.getElementById("description");

    const inviteSection = document.getElementById("inviteSection");
    const inviteCodeInput = document.getElementById("inviteCodeInput");
    const checkInviteBtn = document.getElementById("checkInviteBtn");
    const inviteMsg = document.getElementById("inviteMsg");

    const actionHint = document.getElementById("actionHint");
    const goRegisterBtn = document.getElementById("goRegisterBtn");

    let currentEventId = "";
    let currentEvent = null;
    let inviteVerified = false;

    function esc(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function formatTime(ts){
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      if (isNaN(d.getTime())) return "-";
      return d.toLocaleString("zh-Hant", { hour12:false });
    }

    function formatRange(start, end){
      const a = formatTime(start);
      const b = formatTime(end);
      if (a === "-" && b === "-") return "-";
      return `${a} ～ ${b}`;
    }

    function showError(msg){
      loadingEl.classList.add("hidden");
      contentEl.classList.add("hidden");
      errorBox.classList.remove("hidden");
      errorBox.innerHTML = esc(msg);
    }

    function showContent(){
      loadingEl.classList.add("hidden");
      errorBox.classList.add("hidden");
      contentEl.classList.remove("hidden");
    }

    function updateActionState(){
      if (!currentEvent) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "活動資料尚未載入。";
        return;
      }

      const published = currentEvent.published === true;
      const approved = String(currentEvent.approvalStatus || "") === "approved";
      const inviteEnabled = currentEvent.inviteCodeEnabled === true;

      if (!published || !approved) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "此活動目前尚未開放。";
        return;
      }

      if (inviteEnabled && !inviteVerified) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "請先完成邀請碼驗證。";
        return;
      }

      goRegisterBtn.disabled = false;
      actionHint.textContent = "你可以繼續進入報名 / 購票流程。";
    }

    async function verifyInviteCode(){
      if (!currentEventId) return;
      const code = String(inviteCodeInput.value || "").trim().toUpperCase();

      if (!code) {
        inviteMsg.textContent = "請輸入邀請碼。";
        inviteMsg.style.color = "#991b1b";
        return;
      }

      checkInviteBtn.disabled = true;
      inviteMsg.textContent = "驗證中…";
      inviteMsg.style.color = "";

      try {
        const doc = await db
          .collection("events")
          .doc(currentEventId)
          .collection("inviteCodes")
          .doc(code)
          .get();

        if (!doc.exists) {
          inviteVerified = false;
          inviteMsg.textContent = "邀請碼不存在。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        const data = doc.data() || {};
        const enabled = data.enabled !== false;
        const maxUses = Number(data.maxUses || 0);
        const usedCount = Number(data.usedCount || 0);

        if (!enabled) {
          inviteVerified = false;
          inviteMsg.textContent = "此邀請碼已停用。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        if (maxUses > 0 && usedCount >= maxUses) {
          inviteVerified = false;
          inviteMsg.textContent = "此邀請碼已達使用上限。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        inviteVerified = true;
        inviteMsg.textContent = "邀請碼驗證成功，可以繼續。";
        inviteMsg.style.color = "#166534";
        updateActionState();
      } catch (err) {
        console.error(err);
        inviteVerified = false;
        inviteMsg.textContent = "驗證失敗，請稍後再試。";
        inviteMsg.style.color = "#991b1b";
        updateActionState();
      } finally {
        checkInviteBtn.disabled = false;
      }
    }

    async function loadEvent(){
      currentEventId = qs("id");

      if (!currentEventId) {
        showError("缺少活動 id。");
        return;
      }

      try {
        const doc = await db.collection("events").doc(currentEventId).get();

        if (!doc.exists) {
          showError("找不到這個活動。");
          return;
        }

        const e = doc.data() || {};
        currentEvent = e;

        const published = e.published === true;
        const approved = String(e.approvalStatus || "") === "approved";

        if (!published || !approved) {
          showError("此活動目前尚未公開。");
          return;
        }

        titleEl.textContent = e.title || "未命名活動";
        scopePill.textContent = String(e.ownerSchoolId || "") === "__global__" ? "平台活動" : "校園活動";
        publishedPill.textContent = published ? "已公開" : "未公開";
        invitePill.textContent = e.inviteCodeEnabled === true ? "需要邀請碼" : "不用邀請碼";

        locationEl.textContent = e.location || "-";
        saleTimeEl.textContent = formatRange(e.saleStartAt, e.saleEndAt);
        eventTimeEl.textContent = formatRange(e.eventStartAt, e.eventEndAt);
        capacityEl.textContent = (e.capacity ?? "") === "" ? "未設定" : String(e.capacity);
        descriptionEl.textContent = e.description || "尚無活動說明。";

        if (e.inviteCodeEnabled === true) {
          inviteSection.classList.remove("hidden");
        } else {
          inviteSection.classList.add("hidden");
          inviteVerified = true;
        }

        updateActionState();
        showContent();
      } catch (err) {
        console.error(err);
        showError("讀取活動失敗，請稍後再試。");
      }
    }

    checkInviteBtn.addEventListener("click", verifyInviteCode);
    inviteCodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") verifyInviteCode();
    });

    goRegisterBtn.addEventListener("click", () => {
      if (!currentEventId) return;

      const url = new URL("register.html", window.location.origin);
      url.searchParams.set("eventId", currentEventId);

      if (inviteVerified && currentEvent && currentEvent.inviteCodeEnabled === true) {
        url.searchParams.set("inviteVerified", "true");
        url.searchParams.set("inviteCode", String(inviteCodeInput.value || "").trim().toUpperCase());
      }

      window.location.href = url.toString();
    });

    loadEvent();

<script>
/* ── shared.js inlined ── */
(function () {
  "use strict";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  if (typeof firebase === "undefined") {
    console.error("shared.js 需要先載入 Firebase compat SDK");
    return;
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function norm(s) {
    return String(s ?? "").trim();
  }

  function tsToText(ts) {
    try {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString("zh-Hant", { hour12: false });
    } catch (e) {
      return "-";
    }
  }

  function pageIn(el) {
    if (!el) return;
    requestAnimationFrame(() => el.classList.add("on"));
  }

  function go(href, pageEl) {
    const root = pageEl || document.getElementById("pageRoot");
    if (root) root.classList.add("leaving");
    setTimeout(() => {
      location.href = href;
    }, 140);
  }

  function initPageLinks(pageEl) {
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http") || href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href, pageEl);
    });
  }

  function toast(msg, type = "ok", duration = 3000) {
    let el = document.getElementById("_appToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "_appToast";
      el.style.cssText = [
        "position:fixed",
        "left:50%",
        "bottom:24px",
        "transform:translateX(-50%) translateY(10px)",
        "min-width:220px",
        "max-width:360px",
        "padding:12px 20px",
        "border-radius:999px",
        "box-shadow:0 10px 30px rgba(0,0,0,.15)",
        "font-size:14px",
        "font-weight:900",
        "text-align:center",
        "z-index:99999",
        "opacity:0",
        "pointer-events:none",
        "transition:opacity .2s ease, transform .2s ease"
      ].join(";");
      document.body.appendChild(el);
    }

    const theme = {
      ok: { bg: "#166534", color: "#fff" },
      warn: { bg: "#b91c1c", color: "#fff" },
      info: { bg: "#1d4ed8", color: "#fff" },
      neutral: { bg: "#111", color: "#fff" }
    }[type] || { bg: "#111", color: "#fff" };

    el.style.background = theme.bg;
    el.style.color = theme.color;
    el.textContent = msg;

    clearTimeout(el._timer);
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    });

    el._timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(10px)";
    }, duration);
  }

  function showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = true, extraBtns = "" } = {}) {
    if (!gateEl) return;
    if (appEl) appEl.style.display = "none";
    gateEl.style.display = "block";

    gateEl.innerHTML = `
      <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
      <div class="sub">${msg}</div>

      ${showEmailLogin ? `
        <div style="margin-top:16px; max-width:380px; display:grid; gap:10px;">
          <input id="_loginEmail" type="text" placeholder="帳號（Email）"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <input id="_loginPassword" type="password" placeholder="密碼"
            style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;" />
          <button class="btn btn-primary" id="_loginBtn" type="button">登入</button>
          <div id="_loginMsg" style="display:none; color:#b91c1c; font-size:13px;"></div>
        </div>
      ` : ""}

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        ${extraBtns || ""}
        ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" type="button">登出</button>` : ""}
      </div>
    `;

    const loginBtn = document.getElementById("_loginBtn");
    if (loginBtn) {
      const doLogin = async () => {
        const email = norm(document.getElementById("_loginEmail")?.value);
        const password = document.getElementById("_loginPassword")?.value || "";
        const msgEl = document.getElementById("_loginMsg");

        if (!email || !password) {
          if (msgEl) {
            msgEl.textContent = "請輸入帳號與密碼";
            msgEl.style.display = "block";
          }
          return;
        }

        loginBtn.disabled = true;
        const oldText = loginBtn.textContent;
        loginBtn.textContent = "登入中…";
        if (msgEl) msgEl.style.display = "none";

        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          console.error(e);
          if (msgEl) {
            msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
            msgEl.style.display = "block";
          } else {
            alert("登入失敗，請確認帳號密碼是否正確");
          }
          loginBtn.disabled = false;
          loginBtn.textContent = oldText;
          return;
        }
      };

      loginBtn.onclick = doLogin;
      ["_loginEmail", "_loginPassword"].forEach((id) => {
        document.getElementById(id)?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });
    }

    const logoutBtn = document.getElementById("_logoutBtn");
    if (logoutBtn) logoutBtn.onclick = () => AppAuth.logout();
  }

  window.AppUI = {
    esc,
    norm,
    tsToText,
    pageIn,
    go,
    initPageLinks,
    toast,
    showGate
  };

  const impersonate = {
    get uid() { return sessionStorage.getItem("impersonateUid") || ""; },
    get email() { return sessionStorage.getItem("impersonateEmail") || ""; },
    get role() { return sessionStorage.getItem("impersonateRole") || ""; },
    get orgId() { return sessionStorage.getItem("impersonateOrgId") || ""; },
    get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
    get active() { return !!sessionStorage.getItem("impersonateUid"); },
    start({ uid, email, role, orgId, schoolId, team }) {
      sessionStorage.setItem("impersonateUid", uid || "");
      sessionStorage.setItem("impersonateEmail", email || "");
      sessionStorage.setItem("impersonateRole", role || "");
      sessionStorage.setItem("impersonateOrgId", orgId || "");
      sessionStorage.setItem("impersonateSchoolId", schoolId || "");
      sessionStorage.setItem("impersonateTeam", team || "");
      sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
    },
    stop() {
      [
        "impersonateUid", "impersonateEmail", "impersonateRole",
        "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
        "impersonateStartedAt"
      ].forEach((k) => sessionStorage.removeItem(k));
    },
    getActingUid(realUser) {
      return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
    }
  };

  async function logout() {
    try {
      impersonate.stop();
      await firebase.auth().signOut();
      if (typeof window.SidebarHide === "function") window.SidebarHide();
    } catch (e) {
      console.error(e);
      alert("登出失敗（請看 Console）");
    }
  }

  async function loadUser(uid) {
    const snap = await window.db.collection("users").doc(uid).get();
    if (!snap.exists) return null;
    return { id: snap.id, ...snap.data() };
  }

  function isPlatform(role) { return role === "platform_super" || role === "platform_admin"; }
  function isPlatformSuper(role) { return role === "platform_super"; }
  function isOrgRole(role) { return ["org_super", "org_admin", "org_staff"].includes(norm(role)); }
  function isProtectedSuper(u) { return norm(u?.role) === "platform_super"; }

  function renderImpersonateBanner(onStop) {
    const banner = document.getElementById("impersonateBanner");
    if (!banner) return;
    if (!impersonate.active) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "flex";
    banner.innerHTML = `
      <div style="flex:1;">
        <div style="font-weight:900;">⚠ 目前正在模擬帳號</div>
        <div class="sub" style="margin-top:6px;">
          模擬：<span class="mono">${esc(impersonate.email || impersonate.uid)}</span><br>
          role：<span class="mono">${esc(impersonate.role || "-")}</span>｜
          orgId：<span class="mono">${esc(impersonate.orgId || "-")}</span>｜
          schoolId：<span class="mono">${esc(impersonate.schoolId || "-")}</span>
        </div>
      </div>
      <div><button class="btn btn-danger btn-sm" id="_stopImpersonateBtn" type="button">結束模擬</button></div>
    `;
    document.getElementById("_stopImpersonateBtn")?.addEventListener("click", () => {
      impersonate.stop();
      if (typeof onStop === "function") onStop();
      else location.reload();
    });
  }

  window.AppAuth = {
    logout,
    loadUser,
    isPlatform,
    isPlatformSuper,
    isOrgRole,
    isProtectedSuper,
    impersonate,
    renderImpersonateBanner
  };
})();

</script>
