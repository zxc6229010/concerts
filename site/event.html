<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>活動詳情</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:#f6f7fb;
      color:#111;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:12px;
      flex-wrap:wrap;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
    }

    .card{
      background:#fff;
      border-radius:18px;
      padding:20px;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.05);
      margin-bottom:14px;
    }

    .title{
      font-size:26px;
      font-weight:900;
      line-height:1.35;
      margin:0;
    }

    .meta{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .meta-item{
      padding:12px 14px;
      border-radius:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      line-height:1.7;
      font-size:14px;
    }

    .label{
      font-weight:900;
      margin-right:6px;
    }

    .desc{
      white-space:pre-wrap;
      line-height:1.8;
      font-size:15px;
      color:rgba(17,17,17,.9);
    }

    .pill-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      font-size:13px;
      font-weight:900;
    }

    .notice{
      border-radius:14px;
      padding:14px;
      font-size:14px;
      line-height:1.7;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
    }

    .notice.warn{
      background:#fff7f7;
      border-color:rgba(239,68,68,.2);
      color:#991b1b;
    }

    .notice.ok{
      background:#f6fff8;
      border-color:rgba(34,197,94,.2);
      color:#166534;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.1);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }

    .btn-primary{
      background:#111;
      border-color:#111;
      color:#fff;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .hidden{
      display:none !important;
    }

    .field{
      margin-top:12px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:900;
      margin-bottom:6px;
    }

    .field input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.1);
      font-size:16px;
      outline:none;
      background:#fff;
    }

    .small{
      margin-top:8px;
      font-size:13px;
      color:rgba(0,0,0,.6);
      line-height:1.6;
    }

    .loading{
      font-size:14px;
      color:rgba(0,0,0,.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="events.html">← 返回活動列表</a>
    </div>

    <div id="loading" class="loading">載入中…</div>

    <div id="errorBox" class="notice warn hidden"></div>

    <div id="content" class="hidden">
      <div class="card">
        <h1 id="title" class="title">-</h1>

        <div class="pill-row">
          <div id="scopePill" class="pill">-</div>
          <div id="publishedPill" class="pill">-</div>
          <div id="invitePill" class="pill">-</div>
        </div>

        <div class="meta">
          <div class="meta-item"><span class="label">活動地點：</span><span id="location">-</span></div>
          <div class="meta-item"><span class="label">搶票時間：</span><span id="saleTime">-</span></div>
          <div class="meta-item"><span class="label">活動時間：</span><span id="eventTime">-</span></div>
          <div class="meta-item"><span class="label">名額：</span><span id="capacity">-</span></div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 12px; font-size:18px;">活動說明</h2>
        <div id="description" class="desc">-</div>
      </div>

      <div id="inviteSection" class="card hidden">
        <h2 style="margin:0 0 10px; font-size:18px;">邀請碼驗證</h2>
        <div class="small">此活動需要邀請碼才能繼續報名 / 購票。</div>

        <div class="field">
          <label for="inviteCodeInput">邀請碼</label>
          <input id="inviteCodeInput" type="text" placeholder="請輸入邀請碼" />
        </div>

        <div class="action-row">
          <button id="checkInviteBtn" class="btn">驗證邀請碼</button>
        </div>

        <div id="inviteMsg" class="small"></div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 10px; font-size:18px;">報名 / 購票</h2>
        <div id="actionHint" class="small">-</div>

        <div class="action-row">
          <button id="goRegisterBtn" class="btn btn-primary" disabled>立即報名 / 購票</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

  <script>
    const db = window.db;

    const loadingEl = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const contentEl = document.getElementById("content");

    const titleEl = document.getElementById("title");
    const scopePill = document.getElementById("scopePill");
    const publishedPill = document.getElementById("publishedPill");
    const invitePill = document.getElementById("invitePill");

    const locationEl = document.getElementById("location");
    const saleTimeEl = document.getElementById("saleTime");
    const eventTimeEl = document.getElementById("eventTime");
    const capacityEl = document.getElementById("capacity");
    const descriptionEl = document.getElementById("description");

    const inviteSection = document.getElementById("inviteSection");
    const inviteCodeInput = document.getElementById("inviteCodeInput");
    const checkInviteBtn = document.getElementById("checkInviteBtn");
    const inviteMsg = document.getElementById("inviteMsg");

    const actionHint = document.getElementById("actionHint");
    const goRegisterBtn = document.getElementById("goRegisterBtn");

    let currentEventId = "";
    let currentEvent = null;
    let inviteVerified = false;

    function esc(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function formatTime(ts){
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      if (isNaN(d.getTime())) return "-";
      return d.toLocaleString("zh-Hant", { hour12:false });
    }

    function formatRange(start, end){
      const a = formatTime(start);
      const b = formatTime(end);
      if (a === "-" && b === "-") return "-";
      return `${a} ～ ${b}`;
    }

    function showError(msg){
      loadingEl.classList.add("hidden");
      contentEl.classList.add("hidden");
      errorBox.classList.remove("hidden");
      errorBox.innerHTML = esc(msg);
    }

    function showContent(){
      loadingEl.classList.add("hidden");
      errorBox.classList.add("hidden");
      contentEl.classList.remove("hidden");
    }

    function updateActionState(){
      if (!currentEvent) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "活動資料尚未載入。";
        return;
      }

      const published = currentEvent.published === true;
      const approved = String(currentEvent.approvalStatus || "") === "approved";
      const inviteEnabled = currentEvent.inviteCodeEnabled === true;

      if (!published || !approved) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "此活動目前尚未開放。";
        return;
      }

      if (inviteEnabled && !inviteVerified) {
        goRegisterBtn.disabled = true;
        actionHint.textContent = "請先完成邀請碼驗證。";
        return;
      }

      goRegisterBtn.disabled = false;
      actionHint.textContent = "你可以繼續進入報名 / 購票流程。";
    }

    async function verifyInviteCode(){
      if (!currentEventId) return;
      const code = String(inviteCodeInput.value || "").trim().toUpperCase();

      if (!code) {
        inviteMsg.textContent = "請輸入邀請碼。";
        inviteMsg.style.color = "#991b1b";
        return;
      }

      checkInviteBtn.disabled = true;
      inviteMsg.textContent = "驗證中…";
      inviteMsg.style.color = "";

      try {
        const doc = await db
          .collection("events")
          .doc(currentEventId)
          .collection("inviteCodes")
          .doc(code)
          .get();

        if (!doc.exists) {
          inviteVerified = false;
          inviteMsg.textContent = "邀請碼不存在。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        const data = doc.data() || {};
        const enabled = data.enabled !== false;
        const maxUses = Number(data.maxUses || 0);
        const usedCount = Number(data.usedCount || 0);

        if (!enabled) {
          inviteVerified = false;
          inviteMsg.textContent = "此邀請碼已停用。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        if (maxUses > 0 && usedCount >= maxUses) {
          inviteVerified = false;
          inviteMsg.textContent = "此邀請碼已達使用上限。";
          inviteMsg.style.color = "#991b1b";
          updateActionState();
          return;
        }

        inviteVerified = true;
        inviteMsg.textContent = "邀請碼驗證成功，可以繼續。";
        inviteMsg.style.color = "#166534";
        updateActionState();
      } catch (err) {
        console.error(err);
        inviteVerified = false;
        inviteMsg.textContent = "驗證失敗，請稍後再試。";
        inviteMsg.style.color = "#991b1b";
        updateActionState();
      } finally {
        checkInviteBtn.disabled = false;
      }
    }

    async function loadEvent(){
      currentEventId = qs("id");

      if (!currentEventId) {
        showError("缺少活動 id。");
        return;
      }

      try {
        const doc = await db.collection("events").doc(currentEventId).get();

        if (!doc.exists) {
          showError("找不到這個活動。");
          return;
        }

        const e = doc.data() || {};
        currentEvent = e;

        const published = e.published === true;
        const approved = String(e.approvalStatus || "") === "approved";

        if (!published || !approved) {
          showError("此活動目前尚未公開。");
          return;
        }

        titleEl.textContent = e.title || "未命名活動";
        scopePill.textContent = String(e.ownerSchoolId || "") === "__global__" ? "平台活動" : "校園活動";
        publishedPill.textContent = published ? "已公開" : "未公開";
        invitePill.textContent = e.inviteCodeEnabled === true ? "需要邀請碼" : "不用邀請碼";

        locationEl.textContent = e.location || "-";
        saleTimeEl.textContent = formatRange(e.saleStartAt, e.saleEndAt);
        eventTimeEl.textContent = formatRange(e.eventStartAt, e.eventEndAt);
        capacityEl.textContent = (e.capacity ?? "") === "" ? "未設定" : String(e.capacity);
        descriptionEl.textContent = e.description || "尚無活動說明。";

        if (e.inviteCodeEnabled === true) {
          inviteSection.classList.remove("hidden");
        } else {
          inviteSection.classList.add("hidden");
          inviteVerified = true;
        }

        updateActionState();
        showContent();
      } catch (err) {
        console.error(err);
        showError("讀取活動失敗，請稍後再試。");
      }
    }

    checkInviteBtn.addEventListener("click", verifyInviteCode);
    inviteCodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") verifyInviteCode();
    });

    goRegisterBtn.addEventListener("click", () => {
      if (!currentEventId) return;

      const url = new URL("register.html", window.location.origin);
      url.searchParams.set("eventId", currentEventId);

      if (inviteVerified && currentEvent && currentEvent.inviteCodeEnabled === true) {
        url.searchParams.set("inviteVerified", "true");
        url.searchParams.set("inviteCode", String(inviteCodeInput.value || "").trim().toUpperCase());
      }

      window.location.href = url.toString();
    });

    loadEvent();
  </script>
</body>
</html>
